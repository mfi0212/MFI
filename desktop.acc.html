    <script>
        let currentUser = null;
        let currentLoanIndex = null;
        let filteredLoans = [];
        let currentPassword = null;   // To identify user for storage

        function formatMoney(amount) {
            return `₹${amount.toLocaleString('en-IN')}`;
        }

        function calculateDaysLeft(endDateStr) {
            const clean = endDateStr.split('(')[0].trim();
            const end = new Date(clean.split('-').reverse().join('-'));
            const now = new Date();
            now.setHours(0,0,0,0);
            return Math.ceil((end - now) / 86400000);
        }

        // Load saved purposes for current user
        function loadPurposes() {
            if (!currentPassword || !currentUser) return;
            
            const savedPurposes = JSON.parse(localStorage.getItem('loanPurposes')) || {};
            const userPurposes = savedPurposes[currentPassword] || [];

            currentUser.loans.forEach((loan, index) => {
                if (userPurposes[index] !== undefined) {
                    loan.purpose = userPurposes[index];
                }
            });
        }

        // Save purposes to localStorage
        function savePurposes() {
            if (!currentPassword || !currentUser) return;
            
            const savedPurposes = JSON.parse(localStorage.getItem('loanPurposes')) || {};
            savedPurposes[currentPassword] = currentUser.loans.map(loan => loan.purpose || "");
            
            localStorage.setItem('loanPurposes', JSON.stringify(savedPurposes));
        }

        function displayLoanDetails(loan, index) {
            currentLoanIndex = index;
            const now = new Date();
            const cleanEndDate = loan.endDate.split('(')[0].trim();
            const endDate = new Date(cleanEndDate.split('-').reverse().join('-'));
            const daysLeft = Math.ceil((endDate - now) / 86400000);
            let overdueFine = daysLeft < 0 ? Math.abs(daysLeft) * loan.fineRate : 0;
            const totalPayable = loan.takenAmount + loan.interest + overdueFine;

            const html = `
                <div class="loan-entry">
                    <div class="details" style="display:flex;justify-content:center;align-items:center;">
                        <input type="text" class="purpose-input" placeholder="Enter your purpose here..." 
                               value="${loan.purpose || ''}" 
                               onchange="updatePurpose(${index}, this.value)">
                    </div>
                    <div class="totaldetails">
                        <p style="font-size:60px;font-weight:600;font-family:'Anton',sans-serif;letter-spacing:4.5px;margin:5px;color:${overdueFine>0?'#ff0000':daysLeft<=2?'#ff0000':daysLeft<=6?'#ff8c00':'#00d423'}">
                            ${formatMoney(totalPayable)}
                        </p>
                        <hr><h3>Total Amount</h3>
                    </div>
                    <div class="details"><div class="leftflow">Service</div><p>${loan.takenFrom}</p></div>
                    <div class="details"><div class="leftflow">Borrowed on</div><p>${loan.planDate}</p></div>
                    <div class="details"><div class="leftflow">Return on</div><p style="color:${daysLeft<=2?'#ff1100':daysLeft<=6?'#ff8c00':'#00d423'}">${cleanEndDate}</p></div>
                    <div class="details"><div class="leftflow">Borrowed Amount</div><p>${formatMoney(loan.takenAmount)}</p></div>
                    <div class="details"><div class="leftflow">Interest</div><p>${formatMoney(loan.interest)}</p></div>
                    <div class="details"><div class="leftflow">Overdue Fine</div><p style="color:#ff0000">${formatMoney(overdueFine)}</p></div>
                </div>
            `;

            document.getElementById("loanDetails").innerHTML = html;
        }

        function updatePurpose(index, value) {
            if (currentUser) {
                currentUser.loans[index].purpose = value.trim();
                savePurposes();                    // Auto-save
                renderLoanList();                  // Refresh list to show updated purpose
            }
        }

        function renderLoanList() {
            const container = document.getElementById('loanList');
            container.innerHTML = '';
            filteredLoans.forEach((loan, i) => {
                const days = calculateDaysLeft(loan.endDate);
                const div = document.createElement('div');
                div.className = `chat-item ${i === currentLoanIndex ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="avatar">&</div>
                    <div class="chat-info">
                        <div class="chat-name">${loan.takenFrom}</div>
                        <div class="chat-preview">${loan.purpose || 'No purpose'} • ${days} days</div>
                    </div>
                    <div class="amount-tag">${formatMoney(loan.takenAmount)}</div>
                `;
                div.onclick = () => {
                    currentLoanIndex = i;
                    document.querySelectorAll('.chat-item').forEach(c => c.classList.remove('active'));
                    div.classList.add('active');
                    displayLoanDetails(loan, i);
                };
                container.appendChild(div);
            });
        }

        function filterLoans() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            filteredLoans = currentUser.loans.filter(l => 
                l.takenFrom.toLowerCase().includes(q) || 
                (l.purpose && l.purpose.toLowerCase().includes(q))
            );
            renderLoanList();
        }

        function verifyPassword() {
            const pass = document.getElementById('passInput').value.trim();
            if (usersDB[pass]) {
                currentPassword = pass;
                currentUser = JSON.parse(JSON.stringify(usersDB[pass])); // Deep copy

                // Load saved purposes
                loadPurposes();

                filteredLoans = [...currentUser.loans];

                // Save password for auto-fill
                localStorage.setItem('savedPassword', pass);

                document.getElementById('userHint').textContent = currentUser.name;
                document.getElementById('mainUserName').textContent = currentUser.name;
                document.getElementById('rightName').textContent = currentUser.name;
                document.getElementById('rightCoins').textContent = currentUser.coins;

                document.getElementById('passwordScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';

                renderLoanList();
                if (filteredLoans.length) displayLoanDetails(filteredLoans[0], 0);

                showDueReminder();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => document.getElementById('errorMsg').style.display = 'none', 2000);
            }
        }

        function showDueReminder() {
            if (!currentUser || !currentUser.loans) return;

            const urgentLoans = currentUser.loans.filter(loan => {
                const daysLeft = calculateDaysLeft(loan.endDate);
                return daysLeft > 0 && daysLeft <= 3;
            });

            if (urgentLoans.length === 0) return;

            let content = '<p><strong>Loans due within 3 days:</strong></p>';
            urgentLoans.forEach(loan => {
                const days = calculateDaysLeft(loan.endDate);
                content += `
                    <div style="background:#212121;
    padding: 12px;
    border-radius: 25px;
    margin: 8px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    width: 100%;
    gap: 10px;">
                        <strong>${loan.takenFrom}</strong>
                        <small>Due in <span style="color:#ff4444">${days} day${days>1?'s':''}</span></small>
                        <small style='color: gray;'>Return before the return date.</small>
                        <strong>${formatMoney(loan.takenAmount + loan.interest)}</strong>
                    </div>`;
            });

            document.getElementById('reminderContent').innerHTML = content;
            document.getElementById('reminderPopup').style.display = 'block';
        }

        function hideReminder() {
            document.getElementById('reminderPopup').style.display = 'none';
        }

        function logout() {
            currentUser = null;
            currentPassword = null;
            currentLoanIndex = null;
            filteredLoans = [];
            
            document.getElementById('passInput').value = '';
            document.getElementById('searchInput').value = '';
            
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('passwordScreen').style.display = 'flex';
            document.getElementById('loanDetails').innerHTML = '';
            document.getElementById('reminderPopup').style.display = 'none';
        }

        function showRightPopup() {
            document.getElementById('rightPopup').style.display = 'block';
        }

        function hideRightPopup() {
            document.getElementById('rightPopup').style.display = 'none';
        }

        // Auto-paste saved password on load
        window.onload = function() {
            const savedPass = localStorage.getItem('savedPassword');
            if (savedPass) {
                document.getElementById('passInput').value = savedPass;
            }
            document.getElementById('passInput').focus();
        };

        document.getElementById('passInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') verifyPassword();
        });
    </script>
    <script src="amoutdetails.js"></script>
</body>
</html>

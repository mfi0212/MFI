<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> BS&MFI House | Quantam</title>

<link rel="icon" href="onlyvipsitelogo.png" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #ffffff;
  color: #1a1a1a;
  
}
* {
    -webkit-tap-highlight-color: transparent;
}
body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

header {
  text-align: center;
    padding: 30px 0 10px 0;
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    position: sticky;
    top: 0;
    background: #ffffff00;
    backdrop-filter: blur(20px);
}
span {
    font-size: 10px;
    font-family: 'Inter', sans-serif;
    display: block;
}

.container {
   display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 25px;
    padding: 20px;
}

.card {
    text-align: center;
    border-radius: 30px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: #0000000f;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.card.selected {
   background: linear-gradient(180deg, #ffb1006b, #eeeeee);
    transform: scale(1.05);
    color: white;
}

.card img {
   width: 70%;
}

.card h3 {
 font-weight: 500;
    font-size: 15px;
    text-transform: uppercase;
    background: #0000001f;
    padding: 5px;
    border-radius: 9999px;
    width: fit-content;
}

.price {
    color: #333;
    font-size: 14px;
    font-weight: 600;
    justify-content: left;
    align-items: center;
    gap: 8px;
    display: flex;
}

/* Bottom Bar */
.bottom-bar {
    position: sticky;
    bottom: 20px;
    background: linear-gradient(0deg, #ffb1006b, #d3d3d3);
    color: white;
    padding: 15px;
    display: none;
    flex-direction: column;
    gap: 12px;
    z-index: 1000;
    backdrop-filter: blur(10px);
    margin: 15px;
    border-radius: 40px;
}

.bottom-bar.show {
    display: flex;
    text-align: center;
}

.selected-info {
    font-size: 14px;
    font-weight: 100;
    letter-spacing: 0.4px;
    line-height: 20px;
}

#selectedIds {
    background: black;
    padding: 7px 10px;
    border-radius: 999px;
    overflow: scroll;
    white-space: nowrap;
    font-size: 12px;
    scrollbar-width: none;
}

.currency-selector {
    display: flex;
    background: rgba(0,0,0,0.2);
    border-radius: 999px;
    padding: 4px;
    width: fit-content;
    margin: 0 auto;
}

.currency-btn {
padding: 7px;
    border-radius: 999px;
    border: none;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
    background: transparent;
    font-size: 10px;
}

.currency-btn.active {
    background: white;
    color: black;
}

.total {
color: black;
    display: flex;
    justify-content: space-around;
    align-items: center;
}
.currency {
    display: flex;
    justify-content: center;
    align-items: baseline;
    flex-direction: column;
}
.buttons {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 9999px;
    border: none;
    cursor: pointer;
    font-size: 17px;
    font-weight: 500;
    transition: 0.2s;
    letter-spacing: 0.4px;
}

button.copy {
    background: #ffffff;
    color: #000;
}

button.buy {
    background: #000;
    color: #fff;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>
<body>

<div class="helperbtm" style="position: fixed; top: 0; right: 0; background: #111111; color: white; padding: 5px 9px; z-index: 1001; border-radius: 0 0 0 13px;">
  <a onclick="window.open('')">Help</a>
</div>

<header>Quantam
  <br><span>BS&MFI House</span>
</header>

    justify-content: center;
    align-items: center;
    position: fixed;
    top: 50%;
    transform: translate(-50%, -50%);
    left: 50%;
    font-size: 20px;

  Sold Out

<!-- <div class="allitems" style="    filter: blur(10px);"> -->
<div class="allitems" >
  
<div class="container" id="giftContainer"></div>

<!-- Bottom Bar -->
<div class="bottom-bar" id="bottomBar">
  <div class="selected-info">
    <span id="selectedIds">Selected item id</span>
  </div>

  <div class="currency-selector">
    <button class="currency-btn active" id="btnSwans" onclick="setCurrency('swans')">Swans</button>
    <button class="currency-btn" id="btnStars" onclick="setCurrency('stars')">Stars</button>
  </div>

  <div class="total">
    <div class="label">
        Total
    </div>
    <div class="currency">
        <span id="totalAmount">0</span> 
        <span id="currencyLabel">Swans</span>
    </div>
  </div>
  
  <div class="buttons">
    <button class="copy" onclick="copySelection()">Copy</button>
    <button class="buy" onclick="buySelected()">Buy Now</button>
  </div>
</div>

</div>
<script>
const formLink = "https://forms.gle/nwhjN54BzxjXqzo48";

const gifts = [
  {id: 'SWU#F/Q@GIF01', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_001.webp'},
  {id: 'SWU#F/Q@GIF02', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_005.webp'},
  {id: 'SWU#F/Q@GIF03', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_007.webp'},
  {id: 'SWU#F/Q@GIF04', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_011.webp'},
  {id: 'SWU#F/Q@GIF05', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_012.webp'},
  {id: 'SWU#F/Q@GIF06', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_013.webp'},
  {id: 'SWU#F/Q@GIF07', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_014.webp'},
  {id: 'SWU#F/Q@GIF08', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_022.webp'},
  {id: 'SWU#F/Q@GIF09', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_025.webp'},
  {id: 'SWU#F/Q@GIF10', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_026.webp'},
  {id: 'SWU#F/Q@GIF11', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_028.webp'},
  {id: 'SWU#F/Q@GIF12', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_030.webp'},
  {id: 'SWU#F/Q@GIF13', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_033.webp'},
  {id: 'SWU#F/Q@GIF14', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_034.webp'},
  {id: 'SWU#F/Q@GIF15', priceses: 100, gif: 'https://data.chpic.su/stickers/e/Easteregggifts_by_EmojiRu_Bot/Easteregggifts_by_EmojiRu_Bot_035.webp'},

 ];
// document.addEventListener('contextmenu', e => e.preventDefault());
let selectedGifts = [];
let currentCurrency = 'swans'; // default

function renderGifts() {
  const container = document.getElementById('giftContainer');
  container.innerHTML = '';

  gifts.forEach((gift, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.index = index;

    div.innerHTML = `
      <img src="${gift.gif}">
      <h3>${gift.id}</h3>
      
      <div class="price">
        <img style="width: 25px;" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Telegram-Animated-Emojis/refs/heads/main/Animals%20and%20Nature/Glowing%20Star.webp" alt="">
        ${gift.priceses}
      </div>
    `;

    div.addEventListener('click', () => toggleSelect(gift, index, div));
    container.appendChild(div);
  });
}

function toggleSelect(gift, index, cardElement) {
  const isSelected = selectedGifts.some(item => item.index === index);

  if (isSelected) {
    selectedGifts = selectedGifts.filter(item => item.index !== index);
    cardElement.classList.remove('selected');
  } else {
    selectedGifts.push({...gift, index});
    cardElement.classList.add('selected');
  }

  updateBottomBar();
}

function setCurrency(currency) {
  currentCurrency = currency;
  
  document.getElementById('btnSwans').classList.toggle('active', currency === 'swans');
  document.getElementById('btnStars').classList.toggle('active', currency === 'stars');
  
  document.getElementById('currencyLabel').textContent = currency === 'swans' ? 'Swans' : 'Stars';
  
  updateBottomBar();
}

function updateBottomBar() {
  const bottomBar = document.getElementById('bottomBar');
  const selectedIdsEl = document.getElementById('selectedIds');
  const totalAmountEl = document.getElementById('totalAmount');

  if (selectedGifts.length > 0) {
    bottomBar.classList.add('show');

    const ids = selectedGifts.map(g => g.id).join(', ');
    selectedIdsEl.textContent = ids;

    let total = 0;
    if (currentCurrency === 'swans') {
      total = selectedGifts.reduce((sum, gift) => sum + gift.price, 0);
    } else {
      total = selectedGifts.reduce((sum, gift) => sum + gift.priceses, 0);
    }

    totalAmountEl.textContent = total;
  } else {
    bottomBar.classList.remove('show');
  }
}

function copySelection() {
  if (selectedGifts.length === 0) return;

  const ids = selectedGifts.map(g => g.id).join(', ');
  navigator.clipboard.writeText(ids).then(() => {
    const copyBtn = document.querySelector('.copy');
    const originalText = copyBtn.textContent;
    copyBtn.textContent = '✅ Copied!';
    setTimeout(() => copyBtn.textContent = originalText, 2000);
  });
}

function buySelected() {
  if (selectedGifts.length === 0) return;
  
  let total = 0;
  if (currentCurrency === 'swans') {
    total = selectedGifts.reduce((sum, g) => sum + g.price, 0);
  } else {
    total = selectedGifts.reduce((sum, g) => sum + g.priceses, 0);
  }

  const currencyName = currentCurrency === 'swans' ? 'Swans' : 'Stars';

  alert(`You are buying ${selectedGifts.length} gift(s):\n\n${selectedGifts.map(g => g.id).join(', ')}\nTotal: ${total} ${currencyName}\n\nRedirecting to form...`);
  
  window.open(formLink);
}

renderGifts();
</script>

</body>
</html>

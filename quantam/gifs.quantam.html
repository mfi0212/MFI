document.addEventListener('contextmenu', e => e.preventDefault());

let selectedGifts = [];
let sortMode = 'default';

function getSortedGifts() {
  let sorted = [...gifts];
  
  if (sortMode === 'high-low') {
    sorted.sort((a, b) => b.priceses - a.priceses);
  } else if (sortMode === 'low-high') {
    sorted.sort((a, b) => a.priceses - b.priceses);
  }
  // default: original order
  
  return sorted;
}

function renderGifts() {
  const container = document.getElementById('giftContainer');
  container.innerHTML = '';

  const sortedGifts = getSortedGifts();

  sortedGifts.forEach((gift) => {
    const originalIndex = gifts.findIndex(g => g.id === gift.id);
    
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.index = originalIndex;

    div.innerHTML = `
      <img src="${gift.gif}">
      <h3>${gift.id}</h3>
      <div class="price">
        <img style="width: 25px;" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Telegram-Animated-Emojis/refs/heads/main/Animals%20and%20Nature/Glowing%20Star.webp" alt="">
        ${gift.priceses}
      </div>
    `;

    div.addEventListener('click', () => toggleSelect(gift, originalIndex, div));
    container.appendChild(div);
  });
}

function toggleSelect(gift, index, cardElement) {
  const isSelected = selectedGifts.some(item => item.index === index);

  if (isSelected) {
    selectedGifts = selectedGifts.filter(item => item.index !== index);
    cardElement.classList.remove('selected');
  } else {
    selectedGifts.push({...gift, index});
    cardElement.classList.add('selected');
  }

  updateBottomBar();
}

function updateBottomBar() {
  const bottomBar = document.getElementById('bottomBar');
  const selectedIdsEl = document.getElementById('selectedIds');
  const totalAmountEl = document.getElementById('totalAmount');

  if (selectedGifts.length > 0) {
    bottomBar.classList.add('show');

    const ids = selectedGifts.map(g => g.id).join(', ');
    selectedIdsEl.textContent = ids;

    const total = selectedGifts.reduce((sum, gift) => sum + gift.priceses, 0);
    totalAmountEl.textContent = total;
  } else {
    bottomBar.classList.remove('show');
  }
}

function copySelection() {
  if (selectedGifts.length === 0) return;

  const ids = selectedGifts.map(g => g.id).join(', ');
  navigator.clipboard.writeText(ids).then(() => {
    const copyBtn = document.querySelector('.copy');
    const originalText = copyBtn.textContent;
    copyBtn.textContent = '✅ Copied!';
    setTimeout(() => copyBtn.textContent = originalText, 2000);
  });
}

function buySelected() {
  if (selectedGifts.length === 0) return;
  
  const total = selectedGifts.reduce((sum, g) => sum + g.priceses, 0);

  alert(`You are buying ${selectedGifts.length} gift(s):\n\n${selectedGifts.map(g => g.id).join(', ')}\nTotal: ${total} Stars\n\nRedirecting to form...`);
  
  window.open(formLink);
}

// Filter functions
function toggleFilterMenu() {
  const menu = document.getElementById('filterMenu');
  menu.classList.toggle('show');
}

function setSortMode(mode) {
  sortMode = mode;
  
  document.querySelectorAll('.filter-option').forEach(opt => {
    opt.classList.toggle('active', opt.dataset.sort === mode);
  });
  
  const sortText = document.getElementById('currentSortText');
  if (mode === 'high-low') {
    sortText.textContent = '↑↓';
  } else if (mode === 'low-high') {
    sortText.textContent = '↓↑';
  } else {
    sortText.textContent = 'Sort';
  }
  
  document.getElementById('filterMenu').classList.remove('show');
  
  renderGifts();
}

// Event listeners
document.getElementById('filterBtn').addEventListener('click', toggleFilterMenu);

document.addEventListener('click', function(e) {
  const filterBtn = document.getElementById('filterBtn');
  const filterMenu = document.getElementById('filterMenu');
  
  if (!filterBtn.contains(e.target) && !filterMenu.contains(e.target)) {
    filterMenu.classList.remove('show');
  }
});

renderGifts();

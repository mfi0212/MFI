<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragment | Account</title>
<link rel="icon" href="quantam.fragment.logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Didot&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            scrollbar-width: none;
            font-family: 'Poppins', sans-serif;
        }
        :root {
            --hermes-orange:    #080404e0;    
            --hermes-orange-dark: #080404e0;
            --bg:              #ffffff;
            --text:             #000000;
            --text-muted:       #4a4a4a;
            --neutral-light:    white;  
            --border-subtle:    #e0deda;
            --radius:           0.375rem;
        }
        body {
            --c-glass: #bbbbbc;
            --c-light: #fff;
            --c-dark: #000;
            --c-content: #224;
            --c-action: #0052f5;
            --c-bg: #E8E8E9;
            --glass-reflex-dark: 1;
            --glass-reflex-light: 1;
            --saturation: 150%;
        }
        body:has(input[value="dark"]:checked) {
            --c-glass: #bbbbbc;
            --c-light: #fff;
            --c-dark: #000;
            --c-content: #e1e1e1;
            --c-action: #03d5ff;
            --c-bg: #1b1b1d;
        }
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            font-family: Georgia, "Times New Roman", Times, serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 10px 100px 10px;
            line-height: 1.58;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 95%;
            max-width: 420px;
        }

        .section {
            max-width: 400px;
            position: relative;
            left: 50%;
            transform: translate(-50%);
            backdrop-filter: blur(5px);
            width: 100%;
            padding: 20px;
            margin: 20px 0;
            border-radius: 40px;
            background: #00000026;
        } 

        .minimal-input {
            font-family: 'Poppins', sans-serif;
            width: 100%;
            cursor: pointer;
            letter-spacing: 0.5px;
            font-size: 18px;
            outline: none;
            font-weight: 100;
            text-align: center;
            color: #000000;
            backdrop-filter: blur(5px);
            border-radius: 100px;
            transition: all 0.3s ease;
            background: #00000026;
            padding: 10px;
        }

        .minimal-input:active{
            transform: scale(0.90); 
        } 

        .btn-hermes {
            color: white;
            padding: 10px;
            width: 100%;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
            border-radius: 1000px;
            transition: all 0.3s ease;
            font-weight: 100;
            background: var(--hermes-orange);
            filter: drop-shadow(1px 0px 4px lightgray);
        }

        .btn-hermes:active{
            transform: scale(0.90); 
        } 

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            font-size: 17px;
            color: var(--text-muted);
            position: fixed;
            top: 0;
            z-index: 10;
            background: linear-gradient(180deg, #ffffff 10%, transparent);
            padding: 20px 10px 30px 10px;
            width: 100%;
            left: 0;
        }

        .userslide {
            backdrop-filter: blur(5px);
            border-radius: 100px;
            padding: 5px 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            background: var(--hermes-orange);
            font-size: 16px;
            height: 44px;
            fill: #ffffff;
            color: #ffffff;
            font-weight: 100;
            filter: drop-shadow(1px 0px 4px lightgray);
        }

        .userslide:active{
            transform: scale(0.90); 
        } 

        .switch {
            cursor: pointer;
            backdrop-filter: blur(5px);
            border-radius: 100px;
            padding: 10px;
            transition: all 0.3s ease;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            background: var(--hermes-orange);
            filter: drop-shadow(1px 0px 4px lightgray);
            fill: white;
        }

        .switch:active{
            transform: scale(0.90); 
        } 

        .offer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 10px;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 1rem;
            opacity: 100%;
            transition: all 0.3s ease;
        }

        .offer-item:active{
            transform: scale(0.90); 
        } 

        .offer-item:last-child {
            border-bottom: none;
        }

        .offer-num {
            color: #000000;
            font-weight: 500;
            min-width: 3rem;
            font-family: 'Poppins', sans-serif;
        }

        .logo {
            font-size: 2.25rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            font-family: 'Playfair Display', serif;
        }

        .gifs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Login -->
        <div id="login" class="section" style="padding: 125px 0 0 0; border: none; width: 95%; filter: none; background: transparent;">
            <div class="text-center">
                <div class="logo">Quantam</div>
            </div>

            <div style="margin: 0rem 0 1rem;">
                <input 
                    id="pass"
                    type="password"
                    placeholder="Enter password"
                    class="minimal-input">
            </div>

            <button onclick="unlock()" class="btn-hermes">Continue</button>

            <p style="text-align:center; margin-top:1.5rem; font-size:0.8125rem; color:var(--text-muted);">
                Powered by BS&MFI House
            </p>
        </div>

        <!-- Dashboard -->
        <div id="dash" class="hidden">

            <div class="header">
                <div class="userslide">
                    <p>⚡</p>
                    <span class="user" id="username">USER_01</span>
                    <svg xmlns="http://www.w3.org/2000/svg" style="width: 20px; height: 20px;" id="Outline" viewBox="0 0 24 24" width="512" height="512"><path d="M15.4,9.88,10.81,5.29a1,1,0,0,0-1.41,0,1,1,0,0,0,0,1.42L14,11.29a1,1,0,0,1,0,1.42L9.4,17.29a1,1,0,0,0,1.41,1.42l4.59-4.59A3,3,0,0,0,15.4,9.88Z"/></svg>
                </div>
                <span class="switch" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 24 24" width="512" height="512"><path d="M11.476,15a1,1,0,0,0-1,1v3a3,3,0,0,1-3,3H5a3,3,0,0,1-3-3V5A3,3,0,0,1,5,2H7.476a3,3,0,0,1,3,3V8a1,1,0,0,0,2,0V5a5.006,5.006,0,0,0-5-5H5A5.006,5.006,0,0,0,0,5V19a5.006,5.006,0,0,0,5,5H7.476a5.006,5.006,0,0,0,5-5V16A1,1,0,0,0,11.476,15Z"/><path d="M22.867,9.879,18.281,5.293a1,1,0,1,0-1.414,1.414l4.262,4.263L6,11a1,1,0,0,0,0,2H6l15.188-.031-4.323,4.324a1,1,0,1,0,1.414,1.414l4.586-4.586A3,3,0,0,0,22.867,9.879Z"/></svg>
                </span>
            </div>

            <!-- Offers Section -->
            <div class="section" style="display: none; padding: 20px 0 0 0; margin: 0; border-radius: 0; filter: none; background: transparent;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                    <div class="label">Offers ID</div>
                    <span id="user-offer-count" style="font-size: 0.875rem; color: #ffffff; background: #ffa300; padding: 5px; border-radius: 100px;">
                        0 offers
                    </span>
                </div>
                <div id="offers-list"></div>
            </div>

            <!-- New Gifs Section -->
            <div class="section">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                    <div class="label">SWU Gifs</div>
                    <span id="gifs-count" style="font-size: 0.875rem; color: #ffffff; background: #ffa300; padding: 5px; border-radius: 100px;">
                        0 gifs
                    </span>
                </div>
                <div id="gifs-list" class="gifs-grid"></div>
            </div>   
            <p style="text-align:center; font-size:0.8125rem;color:var(--text-muted);">
                © BS&MFI House. All rights reserved.
            </p>
        </div>
    </div>

    <script>
        const userData = {
           "Mahesh Muthinti": {
                password: "Mahesh888*",
                // swans: 0,
                // houseId: 'SMSH-001(90 swans/mon), SEM-002(100 swans/mon)',
                // offers: [
                //     // { num: '', text: "" },
                // ],
                 gifs: [
                    {
                        id: 1,
                        url: "https://data.chpic.su/stickers/n/NewTGGifts/NewTGGifts_002.webp",
                        title: "28-09-26"
                    },
                ]
            },
        };

        let currentUser = "";
        const passInput = document.getElementById('pass');
        const STORAGE_KEY = "bsmansion_last_password";

        // Load saved password on page load
        function loadSavedPassword() {
            const savedPass = localStorage.getItem(STORAGE_KEY);
            if (savedPass) {
                passInput.value = savedPass;
            }
        }

        // Save password as user types
        function savePassword() {
            if (passInput.value.trim() !== "") {
                localStorage.setItem(STORAGE_KEY, passInput.value.trim());
            }
        }

        window.addEventListener('load', loadSavedPassword);
        passInput.addEventListener('input', savePassword);

        function findUserByPassword(inputPass) {
            const pass = (inputPass || "").trim();
            for (const [username, data] of Object.entries(userData)) {
                if (data.password === pass) {
                    return username;
                }
            }
            return null;
        }

        function renderOffers() {
            const list = document.getElementById('offers-list');
            const countEl = document.getElementById('user-offer-count');
            list.innerHTML = '';

            if (!currentUser || !userData[currentUser]) return;

            const offers = userData[currentUser].offers || [];
            countEl.textContent = `${offers.length} offer${offers.length !== 1 ? 's' : ''}`;

            offers.forEach(offer => {
                const div = document.createElement('div');
                div.className = 'offer-item';
                div.innerHTML = `
                    <span class="offer-num">${offer.num || '#'}</span>
                    <span>${offer.text || ''}</span>
                `;
                list.appendChild(div);
            });
        }

        function renderGifs() {
            const container = document.getElementById('gifs-list');
            const countEl = document.getElementById('gifs-count');
            container.innerHTML = '';

            if (!currentUser || !userData[currentUser]) return;

            const gifs = userData[currentUser].gifs || [];
            countEl.textContent = `${gifs.length} gif${gifs.length !== 1 ? 's' : ''}`;

            if (gifs.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#666; padding:20px;">No gifs yet</p>`;
                return;
            }

            gifs.forEach(gif => {
                const div = document.createElement('div');
                div.className = 'gif-card';
                div.innerHTML = `
                    <img src="${gif.url}" alt="${gif.title}">
                    <div style="padding:8px; text-align:center; font-size:13px; font-weight:500;">${gif.title}</div>
                `;
                container.appendChild(div);
            });
        }

        function unlock() {
            const pass = passInput.value.trim();

            if (!pass) {
                alert("Enter a password first.");
                passInput.focus();
                return;
            }

            currentUser = findUserByPassword(pass);

            if (!currentUser) {
                alert("Invalid password. Try again.");
                passInput.value = '';
                localStorage.removeItem(STORAGE_KEY);
                passInput.focus();
                return;
            }

            document.getElementById('username').textContent = currentUser;
            document.getElementById('login').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');

            renderOffers();
            renderGifs();
        }

        function logout() {
            currentUser = "";
            document.getElementById('dash').classList.add('hidden');
            document.getElementById('login').classList.remove('hidden');
            passInput.value = '';
            passInput.focus();
        }

        // Enter key support
        passInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                unlock();
            }
        });
    </script>
</body>
</html>

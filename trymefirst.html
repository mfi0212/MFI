<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BsMansion | Account</title>
    <link rel="icon" href="mansion.mfi.logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Didot&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            scrollbar-width: none;font-family: 'Poppins', sans-serif;
        }
        :root {
            --hermes-orange:    #1c1c1c;    
            --hermes-orange-dark: #080404e0;
            --bg:              #f9f6e2;
            --text:             #000000;
            --text-muted:       #4a4a4a;
            --neutral-light:    white;  
            --border-subtle:    #e0deda;
            --radius:           0.375rem;
        }
body {
  --c-glass: #bbbbbc;
  --c-light: #fff;
  --c-dark: #000;
  
  --c-content: #224;
  --c-action: #0052f5;
  
  --c-bg: #E8E8E9;
  
  --glass-reflex-dark: 1;
  --glass-reflex-light: 1;
  
  --saturation: 150%;
}
body:has(input[value="dark"]:checked) {
  --c-glass: #bbbbbc;
  --c-light: #fff;
  --c-dark: #000;
  
  --c-content: #e1e1e1;
  --c-action: #03d5ff;
  
  --c-bg: #1b1b1d;
}
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            font-family: Georgia, "Times New Roman", Times, serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 10px 120px 10px;
            line-height: 1.58;
            -webkit-font-smoothing: antialiased;
        }

        h1, .big-number {
            font-weight: 400;
            letter-spacing: -0.02em;
            font-family: 'Poppins', sans-serif;
        }

        p {
            font-family: 'Poppins', sans-serif;
        }

        .container {
            width: 95%;
            max-width: 420px;
        }

        .section {
max-width: 500px;
    position: relative;
    left: 50%;
    transform: translate(-50%);
    backdrop-filter: blur(5px);
    top: 50%;
    width:97%;
    padding: 15px;
    margin: 20px 0;
    border: solid 2px #0000001c;
    border-radius: 40px;
        } 

        .minimal-input {
           font-family: 'Poppins', sans-serif;
    margin-top: 35px;
    width: 100%;
    cursor: pointer;
    letter-spacing: 0.5px;
    font-size: 18px;
    outline: none;
    font-weight: 100;
    text-align: center;
    color: #000000;
    backdrop-filter: blur(5px);
    border-radius: 100px;
    transition: all 0.3s ease;
    background: #ffffff;
    filter: drop-shadow(0px 0px 10px #00000017);
    padding: 10px;
  }

        .minimal-input:active{
              transform: scale(0.90); 
        } 


        .btn-hermes {
           background: var(--hermes-orange);
    color: white;
    padding: 10px;
    transition: background 0.25s ease;
    width: 100%;
    font-size: 18px;
    font-family: 'Poppins', sans-serif;
    filter: saturate(2);
    border-radius: 1000px;
    transition: all 0.3s ease;
    font-weight: 100;
  }

        .btn-hermes:active{
              transform: scale(0.90); 
        } 
svg#Layer_1 {
    width: 20px;
    height: 20px;
}
        .label {
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            display: block;
            text-align: center;
            font-family: 'Poppins', sans-serif;
        }

        .header {
display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2.5rem;
    font-size: 17px;
    color: var(--text-muted);
    position: fixed;
    top: 0;
    z-index: 10;
    background: linear-gradient(180deg, #f9f6e2 10%, transparent);
    padding: 20px 15px 30px 15px;
    width: 100%;
    left: 0;
        }

svg#Outline {
    width: 20px;
    height: 20px;
}.userslide {
backdrop-filter: blur(5px);
    border-radius: 100px;
    padding: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
    background: var(--hermes-orange);
    filter: saturate(4);
    font-size: 18px;
    height: 44px;
    fill: white;
    color: white;
    font-weight: 100;
  }

        .userslide:active{
              transform: scale(0.90); 
        } 
       .switch {
        cursor: pointer;
    backdrop-filter: blur(5px);
    border: solid 1px #ffffff00;
    border-radius: 100px;
    padding: 10px;
    transition: all 0.3s ease;
    width: 44px;
    height: 44px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--hermes-orange);
    border: none;
      }
.switch svg{
    fill: white;
}
        .switch:active{
              transform: scale(0.90); 
        } 

        .swan-big {
            font-size: 6.5rem;
    font-weight: 300;
    line-height: 80px;
    text-align: center;
    color: #ffa300;
       transition: all 0.3s ease;}

        .swan-big:active{
              transform: scale(0.90); 
        } 

        .offer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 1rem;opacity: 100%;
        transition: all 0.3s ease;}

        .offer-item:active{
              transform: scale(0.90); 
        } 

        .offer-item:last-child {
            border-bottom: none;
        }

        .offer-num {
            color: var(--hermes-orange);
            font-weight: 500;
            min-width: 3rem;
            font-family: 'Poppins', sans-serif;
        }

        .live-result {
            color: #000000;
    font-weight: 500;
    text-align: center;
    font-size: 15px;
    background: #ffcf92;
    border-radius: 100px;
    padding: 10px;
    margin: 0;
       transition: all 0.3s ease;}

        .live-result:active{
              transform: scale(0.90); 
        } 

        .logo {
            font-size: 2.25rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            font-family: 'Playfair Display', serif;
        }

        .logo span {
            color: var(--hermes-orange);
        }

        .options {
   position: sticky;
    bottom: 15px;
    width: 100%;
    display: flex;
    justify-content: center;
}.mainoptions {
   display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 400px;
    flex-direction: row-reverse;
    padding: 13px 15px 25px 15px;
    background: linear-gradient(0deg, #f9f7e3 10%, transparent);
    position: fixed;
    bottom: 0px;
}
.options a {
    display: contents;
}
.options button{
margin-top: 35px;
    cursor: pointer;
    padding: 10px;
    color: #ffffff;
    font-size: 18px;
    font-weight: 100;
    border-radius: 100px;
    backdrop-filter: blur(2px);
    background: var(--hermes-orange);
    filter: saturate(4);
    transition: all 0.3s ease;
    border: none;
}

        .options button:active{
              transform: scale(0.90); 
        } 
    </style>
</head>
<body>

    <div class="container">

        <!-- Login -->
        <div id="login" class="section" style="padding: 125px 0 0 0;
    border: none;">
            <div class="text-center">
                <div class="logo">BsMansion</div>
                <p style="font-size:0.95rem; color:var(--text-muted);">My Account</p>
            </div>

            <div style="margin: 0rem 0 1rem;">
                <input 
                    id="pass"
                    placeholder="Enter password"
                    class="minimal-input">
            </div>

            <button onclick="unlock()" class="btn-hermes">Verify Now</button>

            <p style="text-align:center; margin-top:1.5rem; font-size:0.8125rem; color:var(--text-muted);">
                Powered by BS&MFI House
            </p>
        </div>

        <!-- Dashboard -->
        <div id="dash" class="hidden">

            <div class="header">
                <a href="https://mfi0212.github.io/MFI/masoin-rental"><div class="userslide">
                    <p>⚡</p>
                    <span class="user" id="username">USER_01</span>
                    <svg xmlns="http://www.w3.org/2000/svg" id="Outline" viewBox="0 0 24 24" width="512" height="512"><path d="M15.4,9.88,10.81,5.29a1,1,0,0,0-1.41,0,1,1,0,0,0,0,1.42L14,11.29a1,1,0,0,1,0,1.42L9.4,17.29a1,1,0,0,0,1.41,1.42l4.59-4.59A3,3,0,0,0,15.4,9.88Z"/></svg>
                </div></a>
                <span class="switch" onclick="logout()"><svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 24 24" width="512" height="512"><path d="M11.476,15a1,1,0,0,0-1,1v3a3,3,0,0,1-3,3H5a3,3,0,0,1-3-3V5A3,3,0,0,1,5,2H7.476a3,3,0,0,1,3,3V8a1,1,0,0,0,2,0V5a5.006,5.006,0,0,0-5-5H5A5.006,5.006,0,0,0,0,5V19a5.006,5.006,0,0,0,5,5H7.476a5.006,5.006,0,0,0,5-5V16A1,1,0,0,0,11.476,15Z"/><path d="M22.867,9.879,18.281,5.293a1,1,0,1,0-1.414,1.414l4.262,4.263L6,11a1,1,0,0,0,0,2H6l15.188-.031-4.323,4.324a1,1,0,1,0,1.414,1.414l4.586-4.586A3,3,0,0,0,22.867,9.879Z"/></svg></span>
            </div>

            <div class="section text-center" style="margin: 100px 0 0 0;">
                <div class="label">Swans Earned</div>
                <div id="swans" class="swan-big">1842</div>
            </div>
           <div class="section">
                <div class="label">Convert Swans to Stars</div>

                <div style="display:flex; gap:1.5rem; align-items:center; margin:1.75rem 0;">
                    <div style="flex:1;">
                        <div class="label">Swans</div>
                        <input style="margin-top: 25px;"
                            type="number" 
                            id="swan-input"
                            value="50"
                            oninput="calculateStars()"
                            class="minimal-input">
                    </div>

                    <div style="font-size:2.25rem; color:var(--text-muted);">=</div>

                    <div>
                        <div class="label">Stars</div>
                        <div id="stars-result" class="minimal-input" style="color:var(--hermes-orange); font-weight:400;">
                            25
                        </div>
                    </div>
                </div>

                <div id="live-text" class="live-result">
                    50 swans = 25 stars
                </div>
            </div>
            <p style="text-align: center;
                width: 100%;
                font-size: 14px;
                padding: 0 26px;
                margin: 0px;">Note : In this section, you can find out how many swans turn into how many stars.</p>
            <div class="section">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                    <div class="label">Offers ID</div>
                    <span id="user-offer-count" style="font-size:0.875rem; color:var(--hermes-orange);">
                        0 offers
                    </span>
                </div>

                <div id="offers-list"></div>
            </div>
           <div class="options">
                <div class="mainoptions">
                    <a href="https://forms.gle/5dHJnzYJDAyUm5xq9"><button class="close">Apply, Convert Swans to Stars now</button></a>
                </div>    
            </div>
            <p style="text-align:center; font-size:0.8125rem;margin-top: 30px;color:var(--text-muted);">
                © BS&MFI House. All rights reserved.
            </p>
        </div>
    </div>

    <script>
        const userData = {
            "Mahesh Muthinti": {
                password: "Mahesh888*",
                swans: 0,
                offers: [
                    { num: '0', text: "No stored offer" },
                ]
            }
        };
// document.addEventListener('contextmenu', e => e.preventDefault());
        let currentUser = "";

        function findUserByPassword(inputPass) {
            const pass = (inputPass || "").trim();

            for (const [username, data] of Object.entries(userData)) {
                if (data.password === pass) {
                    return username;
                }
            }
            return null;
        }

        function renderOffers() {
            const list = document.getElementById('offers-list');
            const countEl = document.getElementById('user-offer-count');
            list.innerHTML = '';

            if (!currentUser || !userData[currentUser]) return;

            const offers = userData[currentUser].offers || [];
            countEl.textContent = `${offers.length} offer${offers.length !== 1 ? 's' : ''}`;

            offers.forEach(offer => {
                const div = document.createElement('div');
                div.className = 'offer-item';
                div.innerHTML = `
                    <span class="offer-num">${offer.num}</span>
                    <span>${offer.text}</span>
                `;
                list.appendChild(div);
            });
        }

        function calculateStars() {
            const input  = document.getElementById('swan-input');
            const result = document.getElementById('stars-result');
            const live   = document.getElementById('live-text');

            let swans = parseInt(input.value) || 0;
            let stars = Math.floor(swans / 2);

            result.textContent = stars;
            live.textContent   = `${swans} swans = ${stars} stars`;
        }

        function unlock() {
            const passInput = document.getElementById('pass');
            const pass = passInput.value.trim();

            if (!pass) {
                alert("Enter a password first.");
                passInput.focus();
                return;
            }

            currentUser = findUserByPassword(pass);

            if (!currentUser) {
                alert("Invalid password. Try again.");
                passInput.value = '';
                passInput.focus();
                return;
            }

            // Load dashboard
            document.getElementById('username').textContent = currentUser;
            document.getElementById('swans').textContent = userData[currentUser].swans;

            document.getElementById('login').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');

            renderOffers();
            calculateStars();
        }

        function logout() {
            currentUser = "";
            document.getElementById('dash').classList.add('hidden');
            document.getElementById('login').classList.remove('hidden');
            document.getElementById('pass').value = '';
            document.getElementById('pass').focus();
        }

        // Enter key support
        document.getElementById('pass').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                unlock();
            }
        });
    </script>
</body>
</html>

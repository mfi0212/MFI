}

    text-align: center;
    border: none;

      input:focus {

      }

      button {
        background: white;

        font-size: 18px;

      div#modal-total {

      }

      div#modal-rate {

        font-size: 20px;
      }

      #main-app {
        display: none;
        padding: 15px 0 0 0;

      /* Pool Entries */
      .pool-card {
        background: #232b3e;
    border-radius: 8px;
    padding: 5px;
    cursor: pointer;
    height: fit-content;
    width: 95%;
      }

      /* Modal */
      #entry-detail-modal {
            display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 5px;
    background: #000000b0;
    align-items: end;
    justify-content: center;
    z-index: 1000;
      }

      .modal-content {
        width: 98%;
        max-width: 480px;
        background: transparent;
        border: none;
        overflow: hidden;
      }

      .modal-header {
        padding: 10px 15px;
        border-bottom: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .topoptios {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        position: fixed;
        top: 0px;
        padding: 15px 10px;
        left: 0;
        z-index: 1000;
        background: linear-gradient(180deg, black, transparent);
      }

      .closebtn {
        background: #232b3e;
    color: white;
    font-size: 18px;
    font-weight: 300;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2px 8px;
    backdrop-filter: blur(4px);
    border-radius: 999px;
      }

      .servicelogo {
        width: 90px;
        height: 90px;
        background: #1300ff;
        border-radius: 25px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 60px 0 10px;
        padding: 15px;
      }

      .modal-body {
        padding: 15px;
        width: 100%;
        max-width: 480px;
        background: #191f2d;
        border: none;
        border-radius: 20px 20px 40px 40px;
        overflow: hidden;
      }

      .pool-summary {
        margin-bottom: 24px;
      }

      .split-row {
        background: #232b3e;
        border: none;
        border-radius: 30px;
        padding: 5px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 300;
        font-size: 13px;
        color: #ffffffc9;
      }

      .back-btn {
        position: fixed;
        top: 20px;
        left: 10px;
        width: fit-content;

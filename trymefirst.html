<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BS&MFI Services</title>
  <link rel="icon" href="mfi.logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    * { 
      margin:0; 
      padding:0; 
      box-sizing:border-box; 
      font-family: "Red Hat Display", sans-serif; 
    }

    body {
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ================== LOADING SCREEN ================== */
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    .loader-content {
      text-align: center;
    }

    .loader-logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(45deg, #0021ff, #00d0ff);
      padding: 6px;
      animation: pulse 2s infinite ease-in-out;
      margin-bottom: 20px;
    }

    .loader-logo img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .loader-text {
      color: #aaaaaa;
      font-size: 15px;
      letter-spacing: 1px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* Main Content */
    #mainContent {
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      z-index: 100;
      padding: 12px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f0f0f;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mficolblogo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(45deg, #0021ff, #00d0ff);
      padding: 4px;
    }

    .search-container {
      position: fixed;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      padding: 10px 5px;
      z-index: 90;
      background: #0f0f0f;
    }

    #searchInput {
      width: 100%;
      padding: 14px 20px;
      font-size: 17px;
      border: none;
      border-radius: 30px;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    #searchInput:focus {
      outline: none;
      background: rgba(255,255,255,0.15);
    }

    #sectionsContainer {
      padding-top: 135px;
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: 100px;
    }

    .section h2 {
      font-size: 15px;
      font-weight: 600;
      margin: 25px 15px 8px;
      color: #aaaaaa;display: none;
    }

    .site-list {
      overflow: hidden;
    }

    .site-item {
      display: flex;
      align-items: center;
      padding: 14px 15px;
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .site-item:hover, .site-item.pinned {
      background: rgba(255, 255, 255, 0.08);
    }

    .letter-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .pin-icon {
      position: absolute;
      right: -50px;
      width: 28px;
      height: 28px;
      transition: right 0.4s ease;
      opacity: 0.9;
    }

    .site-item.show-pin .pin-icon {
      right: 15px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 320px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      padding: 8px 10px;
      z-index: 200;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #ffffff;
      font-size: 11px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 9999px;
      transition: all 0.3s;
    }

    .nav-item.active {
      background-color: #0021ff;
      color: white;
    }

    .nav-item i { font-size: 22px; margin-bottom: 3px; }
  </style>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loadingScreen">
    <div class="loader-content">
      <div class="loader-logo">
        <img src="https://github.com/goforbg/telegram-emoji-gifs/blob/master/thunder.gif?raw=true" alt="BS&MFI Logo">
      </div>
      <div class="loader-text">Loading BS&MFI Services...</div>
    </div>
  </div>

  <!-- MAIN CONTENT (Hidden initially) -->
  <div id="mainContent">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <img class="mficolblogo" src="https://github.com/goforbg/telegram-emoji-gifs/blob/master/thunder.gif?raw=true" alt="">
        <strong>BS&MFI Services</strong>
      </div>
    </div>

    <!-- Search -->
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search services..." autocomplete="off"/>
    </div>

    <div id="sectionsContainer"></div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item active" id="nav-all" onclick="showAll()">
        <i class="fas fa-th-large"></i>
        <span>All</span>
      </div>
      <div class="nav-item" id="nav-pinned" onclick="showPinnedOnly()">
        <i class="fas fa-thumbtack"></i>
        <span>Pinned</span>
      </div>
      <div class="nav-item" onclick="window.location.href='https://mfi0212.github.io/MFI/applydivert'">
        <svg style="width: 28px; height: 24px;" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
          <path d="M240.77-190.77Q137.15-220.08 78.96-302T20.77-480q0-96.08 58.19-178t161.81-111.23V-706q-71 24-115.5 86t-44.5 140q0 78 44.5 140t115.5 86v63.23Zm320 10.77q-124.92 0-212.46-87.54T260.77-480q0-124.92 87.54-212.46T560.77-780q60.23 0 113.81 22.31 53.57 22.31 94.88 62.08l-42.15 42.15q-32.62-31.46-74.96-49Q610-720 560.77-720q-100 0-170 70t-70 170q0 100 70 170t170 70q49.23 0 91.58-17.54 42.34-17.54 74.96-49l42.15 42.15q-41.31 39.77-94.88 62.08Q621-180 560.77-180Zm232.31-153.85L750.92-376l74-74H523.08v-60h301.84l-74-74 42.16-42.15L939.23-480 793.08-333.85Z"/>
        </svg>
        <span>Borrow</span>
      </div>
      <div class="nav-item" onclick="window.location.href='https://mfi0212.github.io/MFI/accverify'">
        <img style="height: 20px; border-radius: 100px; width: 19px;" src="https://i.pinimg.com/736x/68/3d/8f/683d8f58c98a715130b1251a9d59d1b9.jpg" alt=""> 
        <span>Account</span>
      </div>
    </div>
  </div>

<script>

window.addEventListener('load', () => {
  setTimeout(() => {
    const loadingScreen = document.getElementById('loadingScreen');
    const mainContent = document.getElementById('mainContent');

    loadingScreen.style.opacity = '0';

    setTimeout(() => {
      loadingScreen.style.display = 'none';
      mainContent.style.opacity = '1';
      renderCurrentView();        // Render content after loading
    }, 600); // Wait for fade out animation
  }, 2000); // 2 seconds loading time
});
const siteGroups = [
  { heading: "Return Management", sites: [
    { name: "BS&MFI Solutions", desc: "Return date extender", url: "https://mfi0212.github.io/swan/offer/solution" },
    { name: "BsRora - Atdo", desc: "Return date extender", url: "" }
  ]},
  { heading: "New in & issue", sites: [
    { name: "Enterance Form", desc: "New members form", url: "https://mfi0212.github.io/MFI/entrysheet" },
    { name: "Helper", desc: "I have issue form", url: "https://mfi0212.github.io/MFI/abt.hlp" }
  ]},
  { heading: "Offer & Earns", sites: [
    { name: "Lendlink-Mid", desc: "Turn your money into income", url: "https://mfi0212.github.io/swan/lndlnk-mid" },
    { name: "BsGames", desc: "Exclusive rewards and benefits for BS&MFI members.", url: "https://blackswan19.github.io/golden/Bs%20Games/bsgames" },
    { name: "Stars", desc: "Interest reducer.", url: "https://blackswan19.github.io/golden/FM/starspage" }
  ]},
  { heading: "For VIPs Only Services", sites: [
    { name: "BsMansion", desc: "Store offer to use after", url: "https://mfi0212.github.io/MFI/bsmansion" },
    { name: "Chloennaouii", desc: "Discover Your Discount", url: "https://mfi0212.github.io/MFI/cholennaouii.main" }
  ]},
  { heading: "Services", sites: [
    { name: "All Services", desc: "All service from BS&MFI", url: "https://blackswan19.github.io/BS/bslends" },
    { name: "BsLends", desc: "A service from BS&MFI", url: "https://mfi0212.github.io/MFI/rate" },
    { name: "Myootive", desc: "A service from BS&MFI", url: "https://blackswan19.github.io/golden/FM/themain" },
    { name: "Vintage Lender(VIPs)", desc: "VIPs only site", url: "" },
    { name: "Short Term Loan", desc: "Quick amounts for 1 to 15 days.", url: "https://mfi0212.github.io/MFI/1.5.days" }
  ]},
  { heading: "Collaboration", sites: [
    { name: "BsPsgenerater", desc: "Password generator", url: "https://blackswan19.github.io/Educate/password" },
    { name: "BsReminder", desc: "Date wise notes", url: "https://blackswan19.github.io/bscrop/reminder" },
    { name: "BsBookpad", desc: "Download the notes", url: "https://blackswan19.github.io/Educate/bookpad" },
    { name: "BsAdstoper", desc: "Ad blocker", url: "https://blackswan19.github.io/Educate/stoper" }
  ]}
];

let pinnedSites = JSON.parse(localStorage.getItem('pinnedBSMFI')) || [];
let currentView = 'all';

// Helper Functions
function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 75%, 58%)`;
}

function getInitial(name) {
  return name.trim()[0]?.toUpperCase() || "?";
}

function isPinned(name) {
  return pinnedSites.some(p => p.name === name);
}

function togglePin(site) {
  if (isPinned(site.name)) {
    pinnedSites = pinnedSites.filter(p => p.name !== site.name);
  } else {
    pinnedSites.push(site);
  }
  localStorage.setItem('pinnedBSMFI', JSON.stringify(pinnedSites));
  renderCurrentView();
}

// SVG Pin Icon
const pinSVG = `
<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00d0ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <path d="M15 4.5L18 7.5L12 13.5L9 10.5L15 4.5Z"/>
  <path d="M21 21L15 15"/>
  <path d="M9 9L3 3"/>
</svg>`;

// Create Site Item
function createSiteItem(site) {
  const a = document.createElement("a");
  a.href = site.url || "#";
  a.target = "_parent";
  a.className = `site-item ${isPinned(site.name) ? 'pinned' : ''}`;

  const bg = getColor(site.name);
  const initial = getInitial(site.name);

  a.innerHTML = `
    <div class="letter-icon" style="background: ${bg};">${initial}</div>
    <div class="site-info">
      <h3>${site.name}</h3>
      <p style="font-size:13px; color:#aaa;">${site.desc}</p>
    </div>
    <div class="pin-icon">${pinSVG}</div>
  `;

  let startX = 0;

  a.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    a.classList.remove("show-pin");
  });

  a.addEventListener("touchmove", (e) => {
    const currentX = e.touches[0].clientX;
    const diff = startX - currentX;
    if (diff > 80) {
      a.classList.add("show-pin");
    }
  });

  a.addEventListener("touchend", (e) => {
    const currentX = e.changedTouches[0].clientX;
    const diff = startX - currentX;

    if (diff > 100) {
      togglePin(site);
    } else {
      setTimeout(() => a.classList.remove("show-pin"), 300);
    }
  });

  a.addEventListener("click", (e) => {
    if (e.target.closest('.pin-icon')) {
      e.preventDefault();
      togglePin(site);
    } else {
      setTimeout(() => a.classList.remove("show-pin"), 200);
    }
  });

  return a;
}

// Render Current View - MAIN FIX HERE
function renderCurrentView() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  if (currentView === 'pinned') {
    if (pinnedSites.length === 0) {
      container.innerHTML = `
        <div style="text-align:center; padding:80px 20px; color:#666;">
          <h2>No Pinned Services</h2>
          <p>Swipe left on any service to pin it.</p>
        </div>`;
      return;
    }

    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>Pinned Services</h2>`;
    const list = document.createElement("div");
    list.className = "site-list";
    pinnedSites.forEach(site => list.appendChild(createSiteItem(site)));
    section.appendChild(list);
    container.appendChild(section);
    return;
  }

  // === ALL SERVICES VIEW (with pinned items removed) ===
  const pinnedNames = new Set(pinnedSites.map(s => s.name));

  // Show Pinned Section at top if any
  if (pinnedSites.length > 0) {
    const pinnedSection = document.createElement("div");
    pinnedSection.className = "section";
    pinnedSection.innerHTML = `<h2>Pinned</h2>`;
    const list = document.createElement("div");
    list.className = "site-list";
    pinnedSites.forEach(site => list.appendChild(createSiteItem(site)));
    pinnedSection.appendChild(list);
    container.appendChild(pinnedSection);
  }

  // Show other sections but exclude pinned items
  siteGroups.forEach(group => {
    const filteredSites = group.sites.filter(site => !pinnedNames.has(site.name));

    if (filteredSites.length === 0) return; // Skip empty sections

    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>${group.heading}</h2>`;

    const list = document.createElement("div");
    list.className = "site-list";
    filteredSites.forEach(site => list.appendChild(createSiteItem(site)));
    section.appendChild(list);
    container.appendChild(section);
  });
}

function showAll() {
  currentView = 'all';
  document.getElementById('nav-all').classList.add('active');
  document.getElementById('nav-pinned').classList.remove('active');
  renderCurrentView();
}

function showPinnedOnly() {
  currentView = 'pinned';
  document.getElementById('nav-all').classList.remove('active');
  document.getElementById('nav-pinned').classList.add('active');
  renderCurrentView();
}

// Initialize
renderCurrentView();

// Search functionality (basic version)
document.getElementById("searchInput").addEventListener("input", (e) => {
  const term = e.target.value.toLowerCase().trim();
  
  if (!term) {
    renderCurrentView();
    return;
  }

  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  let foundAny = false;

  siteGroups.forEach(group => {
    const filteredSites = group.sites.filter(site => 
      site.name.toLowerCase().includes(term) || 
      site.desc.toLowerCase().includes(term)
    );

    if (filteredSites.length === 0) return;

    foundAny = true;
    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>${group.heading}</h2>`;

    const list = document.createElement("div");
    list.className = "site-list";
    filteredSites.forEach(site => list.appendChild(createSiteItem(site)));
    section.appendChild(list);
    container.appendChild(section);
  });

  if (!foundAny) {
    container.innerHTML = `<div style="text-align:center; padding:60px 20px; color:#666;">
      <p>No services found for "<strong>${term}</strong>"</p>
    </div>`;
  }
});
</script>

</body>
</html>

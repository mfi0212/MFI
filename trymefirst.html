<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BS&MFI Search</title>
    <link rel="icon" href="mfi.logo.png" />
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
       <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Balthazar&family=Della+Respira&family=Hahmlet:wght@100..900&family=Niconne&family=Stalemate&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Oswald|Noto+Sans">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style> @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

    :root {
      --bg-primary: #000000;
      --bg-secondary: #17171c;
      --bg-message: #1c1c24;
      --text-primary: #e0e0e8;
      --text-secondary: #a0a0b0;
      --accent: #0021ff;
      --accent-dark: #0021ff;
      --border: #2a2a35;
    }
* {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    * {
      margin: 0;scrollbar-width: none;
      padding: 0;font-family: "Noto Sans", sans-serif;
      box-sizing: border-box;
    }

    body {
      
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 10px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    .header {
      padding: 25px 0px 0px 0px;
      text-align: center;
    }

    .header h1 {
      font-weight: 800;
      color: var(--accent);
    }

    .search-box {
      margin: 0 0 28px;
    position: sticky;
    top: 0px;
    background: black;
    padding: 27px 0px 10px 0px;
    }

    #searchInput {
    width: 100%;
    padding: 14px 16px 14px 55px;
    font-size: 1.05rem;
    background: #121212;
    border: none;
    border-radius: 37px;
    color: var(--text-primary);
    outline: none;
    transition: all 0.2s;
    }

    #searchInput:focus {
      background: #ffffff2b;
    }

    .search-icon {
     position: absolute;
    left: 5px;
    font-size: 15px;
    color: rgb(255 255 255 / 60%);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    }

    .section {
      margin-bottom: 32px;
    }

    .section h2 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .site-list {
          display: flex;
    flex-direction: column;
    gap: 9px;
    }

    .site-item {
     display: flex;
    align-items: center;
    padding: 5px;
    border-radius: 46px;
    text-decoration: none;
    color: var(--text-primary);
    background: #ffffff12;
    transition: background 0.18s;
    }

    .site-item:hover,
    .site-item:focus {
      background: #ffffff24;
    }

    .letter-icon {
      width: 48px;
      height: 48px;
      margin-right: 16px;
      border-radius: 50%;
      background: var(--accent-dark);
      color: white;
      font-weight: 600;
      font-size: 1.35rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .site-info {
      flex: 1;
      min-width: 0;
    }

    .site-info h3 {
      font-size: 1.05rem;
      font-weight: 500;
      margin: 0 0 3px 0;
    }

    .site-info p {
      font-size: 13px;
    color: #ffffff5e;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 300;
    letter-spacing: 0.5px;
    }

    .no-results {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
      font-size: 1.1rem;
      display: none;
    }
footer{
  text-align: center;
    font-size: 12px;
    color: #ffffff70;
}
    @media (max-width: 500px) {
      .letter-icon {
        width: 44px;
        height: 44px;
        font-size: 1.25rem;
      }
    
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>BS&MFI Search</h1>
  </div>

  <div class="search-box">
    <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
    <input type="text" id="searchInput" placeholder="Search here..." autocomplete="off"/>
  </div>

  <div id="sectionsContainer"></div>

  <div class="no-results" id="noResults">
    Nothing found
  </div>
  <footer>
    © BS&MFI. All rights reserved.
  </footer>
</div>

<script>
const siteGroups = [
    {
    heading: "Return Management",
    sites: [
      { name: "Delay it",      desc: "Return date extender",       url: "https://mfi0212.github.io/swan/offer/delayit",      icon: "fab fa-youtube"       },
      { name: "Split Half Pay",       desc: "Flexible Repayment",           url: "https://mfi0212.github.io/swan/offer/split",       icon: "fas fa-search"        },
      { name: "Pre-Saver",       desc: "Save on time",        url: "https://mfi0212.github.io/swan/offer/presave",       icon: "fab fa-github"        },
]
},
{
  heading: "New in & issue",
  sites: [
    { name: "Enterance Form", desc: "New members form",       url: "https://mfi0212.github.io/MFI/entrysheet", icon: "fas fa-code"         },
    { name: "Helper",      desc: "I have issue form",           url: "https://mfi0212.github.io/MFI/abt.hlp",      icon: "fas fa-film"          },
  ]
},
{
  heading: "Offer & Earns",
  sites: [
    { name: "Lendlink-Mid",    desc: "Turn your money into income",        url: "https://mfi0212.github.io/swan/lndlnk-mid",    icon: "fas fa-book-open"     },
    { name: "BsGames",       desc: "Exclusive rewards and benefits for BS&MFI members.",          url: "https://blackswan19.github.io/golden/Bs%20Games/bsgames",       icon: "fab fa-reddit"        },
  ]
},
{
  heading: "For VIPs Only Services",
  sites: [
      { name: "BsMansion",      desc: "Store offer to use after",              url: "https://mfi0212.github.io/MFI/bsmansion",  icon: "fas fa-robot"         },
      { name: "Chloennaouii",    desc: "Discover Your Discount",                  url: "https://mfi0212.github.io/MFI/cholennaouii.main",    icon: "fab fa-instagram"     },
      { name: "Vintage Lender(VIPs)", desc: "VIPs only site",       url: "", icon: "fas fa-code"         },
    ]
  },  
  {
    heading: "Services",
    sites: [
      { name: "All Services", desc: "All service from BS&MFI",       url: "https://blackswan19.github.io/BS/bslends", icon: "fas fa-code"         },
      { name: "Golden", desc: "A service from BsLends",       url: "https://mfi0212.github.io/MFI/rate", icon: "fas fa-code"         },
      { name: "Lendlink", desc: "A service from BsLends",       url: "https://mfi0212.github.io/swan/home", icon: "fas fa-code"         },
      { name: "MLending", desc: "A service from Myootive",       url: "https://blackswan19.github.io/golden/FM/themain", icon: "fas fa-code"         },
      { name: "MLLD", desc: "A service from Myootive",       url: "https://blackswan19.github.io/golden/FM/mlld", icon: "fas fa-code"         },
      { name: "Short Term Loan",            desc: "Quick amounts for 1 to 15 days.",        url: "https://mfi0212.github.io/MFI/1.5.days",            icon: "fab fa-x-twitter"     },
    ]
  }
];
document.addEventListener('contextmenu', e => e.preventDefault());
function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 75%, 58%)`;
}

function getInitial(name) {
  return name.trim()[0]?.toUpperCase() || "?";
}

function renderAll() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  siteGroups.forEach(group => {
    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    group.sites.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
          <p>${site.desc}</p>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });
}

function renderFiltered(query = "") {
  const q = query.toLowerCase().trim();
  const container = document.getElementById("sectionsContainer");
  const noResults = document.getElementById("noResults");

  container.innerHTML = "";

  if (!q) {
    renderAll();
    noResults.style.display = "none";
    return;
  }

  let found = false;

  siteGroups.forEach(group => {
    const matches = group.sites.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.desc.toLowerCase().includes(q) ||
      s.url.toLowerCase().includes(q)
    );

    if (!matches.length) return;

    found = true;

    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    matches.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
          <p>${site.desc}</p>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });

  noResults.style.display = found ? "none" : "block";
}

renderAll();

document.getElementById("searchInput").addEventListener("input", e => {
  renderFiltered(e.target.value);
});
</script>

</body>
</html>

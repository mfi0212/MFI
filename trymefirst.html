padding: 7px;

color: black;

document.addEventListener('contextmenu', e => e.preventDefault());
let selectedGifts = [];
let currentCurrency = 'swans'; // default

function renderGifts() {
  const container = document.getElementById('giftContainer');
  container.innerHTML = '';

  gifts.forEach((gift, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.index = index;

    div.innerHTML = `
      <img src="${gift.gif}">
      <h3>${gift.id}</h3>
      <div class="price">
        <img style="width: 25px;" src="https://em-content.zobj.net/source/telegram/358/four-leaf-clover_1f340.webp" alt="">
        ${gift.price}
      </div>
      <div class="price">
        <img style="width: 25px;" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Telegram-Animated-Emojis/refs/heads/main/Animals%20and%20Nature/Glowing%20Star.webp" alt="">
        ${gift.priceses}
      </div>
    `;

    div.addEventListener('click', () => toggleSelect(gift, index, div));
    container.appendChild(div);
  });
}

function toggleSelect(gift, index, cardElement) {
  const isSelected = selectedGifts.some(item => item.index === index);

  if (isSelected) {
    selectedGifts = selectedGifts.filter(item => item.index !== index);
    cardElement.classList.remove('selected');
  } else {
    selectedGifts.push({...gift, index});
    cardElement.classList.add('selected');
  }

  updateBottomBar();
}

function setCurrency(currency) {
  currentCurrency = currency;
  
  document.getElementById('btnSwans').classList.toggle('active', currency === 'swans');
  document.getElementById('btnStars').classList.toggle('active', currency === 'stars');
  
  document.getElementById('currencyLabel').textContent = currency === 'swans' ? 'Swans' : 'Stars';
  
  updateBottomBar();
}

function updateBottomBar() {
  const bottomBar = document.getElementById('bottomBar');
  const selectedIdsEl = document.getElementById('selectedIds');
  const totalAmountEl = document.getElementById('totalAmount');

  if (selectedGifts.length > 0) {
    bottomBar.classList.add('show');

    const ids = selectedGifts.map(g => g.id).join(', ');
    selectedIdsEl.textContent = ids;

    let total = 0;
    if (currentCurrency === 'swans') {
      total = selectedGifts.reduce((sum, gift) => sum + gift.price, 0);
    } else {
      total = selectedGifts.reduce((sum, gift) => sum + gift.priceses, 0);
    }

    totalAmountEl.textContent = total;
  } else {
    bottomBar.classList.remove('show');
  }
}

function copySelection() {
  if (selectedGifts.length === 0) return;

  const ids = selectedGifts.map(g => g.id).join(', ');
  navigator.clipboard.writeText(ids).then(() => {
    const copyBtn = document.querySelector('.copy');
    const originalText = copyBtn.textContent;
    copyBtn.textContent = '✅ Copied!';
    setTimeout(() => copyBtn.textContent = originalText, 2000);
  });
}

function buySelected() {
  if (selectedGifts.length === 0) return;
  
  let total = 0;
  if (currentCurrency === 'swans') {
    total = selectedGifts.reduce((sum, g) => sum + g.price, 0);
  } else {
    total = selectedGifts.reduce((sum, g) => sum + g.priceses, 0);
  }

  const currencyName = currentCurrency === 'swans' ? 'Swans' : 'Stars';

  alert(`You are buying ${selectedGifts.length} gift(s):\n\n${selectedGifts.map(g => g.id).join(', ')}\nTotal: ${total} ${currencyName}\n\nRedirecting to form...`);
  
  window.open(formLink);
}

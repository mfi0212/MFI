  <style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

* {
	-webkit-tap-highlight-color: transparent;
	box-sizing: border-box;
	margin: 0;
	padding: 0;
	font-family: 'Poppins', sans-serif;
	scrollbar-width: none;letter-spacing: 0.5px;
}

    :root {
      --bg: #0a0a0a;
      --surface: #1e1e1e;
      --primary: #8ab4f8;
      --text: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', system-ui, sans-serif;
      background: #111920;
      height: 100vh;
      overflow: hidden;
      color: var(--text);
      user-select: none;
    }
svg {
   fill: white;
    width: 35px;
    height: 35px;
}
.dock-icon svg {
   background: #30455d5e;
    border-radius: 100px;
    padding: 10px;
    width: 50px;
    height: 50px;
}
a{
  text-decoration: none;
}
    .phone-frame {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      height: 100vh;
      max-height: 812px;
      overflow: hidden;
      position: relative;
    }

    /* Status Bar */
    .status-bar {
      height: 32px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
      color: white;
    }

    /* Search Bar */
    .search-bar {
    margin: 10px;
    padding: 9px;
    border-radius: 9999px;
    background: #30455d5e;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 15px;
    color: var(--text-secondary);
    width: 85%;
    }

    .search-bar img {
     width: 30px;
    border-radius: 100px;
    display: flex;
    }

    /* App Grid - Now right above bottom nav */
    .app-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px 14px;
    padding: 0 24px;
    position: absolute;
    bottom: 185px;
    left: 0;
    right: 0;
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .app-item:active {
      transform: scale(0.88);
    }

    .app-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 60px;
    height: 60px;
    border-radius: 100px;
    border: solid 5px #1d2936;
    }

    .app-label {
     margin-top: 8px;
    font-size: 12px;
    opacity: 0.9;
    text-align: center;
    color: white;
    font-weight: 100;
    }

    /* Bottom Navigation */
    .bottom-nav {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    width: 100%;
    justify-content: center;
    align-items: center;
    }.bottomicons {
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    width: 100%;
}
    .nav-icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 27px;
      color: white;
      transition: transform 0.3s ease;
    }

    .nav-icon:active {
      transform: scale(0.85);
    }

    /* Lock Screen */
    #lock-screen {
      position: absolute;
      inset: 0;
      z-index: 100;
      background: #111920;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #lock-screen.unlocking {
      transform: scale(0.92) translateY(-40px);
      opacity: 0;
    }

    .lock-time {
       font-size: 92px;
    font-weight: 100;
    letter-spacing: 5px;
    margin-bottom: 8px;
    text-align: center;
    transform: scaleY(2);
    }

    .lock-date {
      font-size: 15px;
    opacity: 50%;
    font-weight: 100;
    text-align: center;
    }

    .fingerprint-hint {
      margin-top: 80px;
    font-size: 48px;
    background: #003b57;
    border-radius: 15px;
    }

    /* Modal */
    #app-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #app-modal.show {
      display: flex;
    }

    .modal-content {
      background: #1e1e1e;
      width: 320px;
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('status-time').textContent =
        now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })
           .replace(' AM', 'am').replace(' PM', 'pm');
      
      document.getElementById('lock-time').textContent =
        now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: false });
      
      document.getElementById('lock-date').textContent =
        now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    const lockScreen = document.getElementById('lock-screen');
    const homeScreen = document.getElementById('home-screen');

    lockScreen.addEventListener('click', () => {
      lockScreen.classList.add('unlocking');
      setTimeout(() => {
        lockScreen.style.display = 'none';
        homeScreen.classList.remove('hidden');
      }, 600);
    });

    function openApp(num) {
      const modal = document.getElementById('app-modal');
      const iconEl = document.getElementById('modal-icon');
      const titleEl = document.getElementById('modal-title');

      const apps = {
        1: {icon: '💬', title: 'Messages'},
        2: {icon: '📸', title: 'Camera'},
        3: {icon: '🎵', title: 'Music'},
        4: {icon: '🗺️', title: 'Maps'},
        5: {icon: '🌤️', title: 'Weather'},
        6: {icon: '📅', title: 'Calendar'},
        7: {icon: '💰', title: 'Wallet'},
        8: {icon: '🛒', title: 'Play Store'},
        9: {icon: '☎️', title: 'Phone'},
        10: {icon: '💬', title: 'Messages'},
        11: {icon: '🌐', title: 'Chrome'},
        12: {icon: '📷', title: 'Photos'}
      };

      const app = apps[num] || {icon: '⭐', title: 'App'};
      iconEl.textContent = app.icon;
      titleEl.textContent = app.title;
      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('show'), 10);
    }

    function closeModal() {
      const modal = document.getElementById('app-modal');
      modal.classList.remove('show');
      setTimeout(() => modal.style.display = 'none', 300);
    }

    window.onload = () => {
      updateClock();
      setInterval(updateClock, 1000);
    };
  </script>

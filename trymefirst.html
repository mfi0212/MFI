* {
	-webkit-tap-highlight-color: transparent;
	box-sizing: border-box;
	margin: 0;
	padding: 0;
	font-family: 'Poppins', sans-serif;
	scrollbar-width: none;letter-spacing: 0.5px;
}

body {
	-webkit-user-select: none;
	-moz-user-select: none;
	-ms-user-select: none;
	user-select: none;
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	background-color: #000;
	color: #e0e0e0;
	
}

body {
	--c-glass: #bbbbbc;
	--c-light: #fff;
	--c-dark: #000;
	--c-content: #224;
	--c-action: #0052f5;
	--c-bg: #E8E8E9;
	--glass-reflex-dark: 1;
	--glass-reflex-light: 1;
	--saturation: 150%;
}

    :root {
      --bg: #0a0a0a;
      --glass: rgba(30, 30, 40, 0.75);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.75);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      color: var(--text);
      user-select: none;
    }

  
a{
  text-decoration: none;

     padding: 15px;

div#status-time {

    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .app-item:active {
      transform: scale(0.82);
    }

     width: 65px;
    height: 65px;
    border-radius: 21px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;

    .note-card {
    background: transparent;
    color: white;
    border-radius: 80px;
    padding: 25px;
    margin-bottom: 14px;
    corner-shape: squircle;
    animation: notePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    background: #ffffff21;
    filter: saturate(2);
    }

    @keyframes notePop {
      from { opacity: 0; transform: translateY(30px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

 background: linear-gradient(0deg, #000000d4, transparent);

    /* Lock Screen */
    #lock-screen {
      position: absolute;
    inset: 0;
    z-index: 100;
    background: linear-gradient(0deg, #000000, #000054);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.8s cubic-bezier(0.32, 0.72, 0, 1);
    }

    #lock-screen.unlocking {
      transform: scale(0.88) translateY(-60px);
      opacity: 0;
    }

    .lock-time {
      font-size: 85px;
    font-weight: 300;
    margin-bottom: -30px;
    text-align: center;
    }

    .lock-date {
      font-size: 14px;
    opacity: 0.8;
    font-weight: 100;
    }

}
    .passcode-input:focus {
      box-shadow: 0 0 0 3px rgb(255 255 255 / 20%);
    }

    #pass-error {
      color: #ff6b6b;
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* Modal */
    #app-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #app-modal.show {
      display: flex;
    }

    .modal-content {
      width: 320px;
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      transform: scale(0.7);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #app-modal.show .modal-content {
      transform: scale(1);
      opacity: 1;

  <script>
    // Real-time Clock
    function updateClock() {
      const now = new Date();
      
      // Status bar
      document.getElementById('status-time').textContent = 
        now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).replace(' AM', 'am').replace(' PM', 'pm');
      
      document.getElementById('status-date').textContent = 
        now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

      // Lock screen
      document.getElementById('lock-time').textContent = 
        now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: false });
      
      document.getElementById('lock-date').textContent = 
        now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    // Passwords
    const correctPasswords = ["6275", "9919", "123456789"];
    let notes = JSON.parse(localStorage.getItem('quickNotes')) || [];

    const passInput = document.getElementById('passcode');
    const errorEl = document.getElementById('pass-error');
    const lockScreen = document.getElementById('lock-screen');
    const homeScreen = document.getElementById('home-screen');

    passInput.addEventListener('input', () => {
      const val = passInput.value.trim();
      if (val.length >= 4 && correctPasswords.includes(val)) {
        unlockPhone();
      } else if (val.length >= 9) {
        errorEl.style.opacity = '1';
        setTimeout(() => {
          errorEl.style.opacity = '0';
          passInput.value = '';
        }, 1200);
      }
    });

    function unlockPhone() {
      lockScreen.classList.add('unlocking');
      setTimeout(() => {
        lockScreen.style.display = 'none';
        homeScreen.classList.remove('hidden');
        renderNotes();
      }, 700);
    }

    // Notepad
    function renderNotes() {
      const container = document.getElementById('notes-container');
      container.innerHTML = '';
      
      notes.forEach((note, index) => {
        const div = document.createElement('div');
        div.className = 'note-card';
        div.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <p style="font-size: 14px;
    line-height: 20px;
    font-weight: 100;
    opacity: 90%;
    text-align: left;">${note.text}</p>
            <button onclick="deleteNote(${index})" style="color: #ff0000;
    font-size: 30px;
    line-height: 1;
    background: none;
    border: none;
    cursor: pointer;
    font-weight: 100;">×</button>
          </div>
          <p style="font-size: 11px;
    opacity: 0.6;
    margin-top: 0px;
    font-weight: 100;">
            ${new Date(note.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
          </p>
        `;
        container.appendChild(div);
      });
    }

    function addNote() {
      const text = prompt("Write your quick note:");
      if (!text || !text.trim()) return;
      
      notes.unshift({
        text: text.trim(),
        time: Date.now()
      });
      
      if (notes.length > 12) notes.pop();
      localStorage.setItem('quickNotes', JSON.stringify(notes));
      renderNotes();
    }

    function deleteNote(index) {
      notes.splice(index, 1);
      localStorage.setItem('quickNotes', JSON.stringify(notes));
      renderNotes();
    }

    

    function closeModal() {
      const modal = document.getElementById('app-modal');
      modal.classList.remove('show');
      setTimeout(() => {
        modal.style.display = 'none';
      }, 350);
    }

    // Initialize
    window.onload = () => {
      updateClock();
      setInterval(updateClock, 1000);

      // Focus passcode
      setTimeout(() => passInput.focus(), 600);

      // Demo note
      if (notes.length === 0) {
        notes = [{ 
          text: "Welcome to BsLends Services", 
          time: Date.now() 
        }];
      }
    };
  </script>

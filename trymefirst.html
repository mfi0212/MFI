let pinnedSites = JSON.parse(localStorage.getItem('pinnedBSMFI')) || [];
let currentView = 'all';

// Helper Functions
function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 75%, 58%)`;
}

function getInitial(name) {
  return name.trim()[0]?.toUpperCase() || "?";
}

function isPinned(name) {
  return pinnedSites.some(p => p.name === name);
}

function togglePin(site) {
  if (isPinned(site.name)) {
    pinnedSites = pinnedSites.filter(p => p.name !== site.name);
  } else {
    pinnedSites.push(site);
  }
  localStorage.setItem('pinnedBSMFI', JSON.stringify(pinnedSites));
  renderCurrentView();
}

// SVG Pin Icon
const pinSVG = `
<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF"><path d="M378.46-80v-119.23H200l280-300 280 300H581.54V-80H378.46Zm40-39.23h123.08v-120h125.84L480-439.23l-187.38 200h125.84v120ZM200-389.23l280-300 280 300h-54.69L480-630 254.69-389.23H200Zm0-190 280-300 280 300h-54.69L480-820 254.69-579.23H200Zm280 340Z"/></svg>`;

// Create Site Item
function createSiteItem(site) {
  const a = document.createElement("a");
  a.href = site.url || "#";
  a.target = "_parent";
  a.className = `site-item ${isPinned(site.name) ? 'pinned' : ''}`;

  const bg = getColor(site.name);
  const initial = getInitial(site.name);

  a.innerHTML = `
    <div class="letter-icon" style="background: ${bg};">${initial}</div>
    <div class="site-info">
      <h3>${site.name}</h3>
      <p style="font-size: 12px;
    color: #aaaaaab5;">${site.desc}</p>
    </div>
    <div class="pin-icon">${pinSVG}</div>
  `;

  let startX = 0;

  a.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    a.classList.remove("show-pin");
  });

  a.addEventListener("touchmove", (e) => {
    const currentX = e.touches[0].clientX;
    const diff = startX - currentX;
    if (diff > 80) {
      a.classList.add("show-pin");
    }
  });

  a.addEventListener("touchend", (e) => {
    const currentX = e.changedTouches[0].clientX;
    const diff = startX - currentX;

    if (diff > 100) {
      togglePin(site);
    } else {
      setTimeout(() => a.classList.remove("show-pin"), 300);
    }
  });

  a.addEventListener("click", (e) => {
    if (e.target.closest('.pin-icon')) {
      e.preventDefault();
      togglePin(site);
    } else {
      setTimeout(() => a.classList.remove("show-pin"), 200);
    }
  });

  return a;
}

// Render Current View - MAIN FIX HERE
function renderCurrentView() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  if (currentView === 'pinned') {
    if (pinnedSites.length === 0) {
      container.innerHTML = `
        <div style="text-align:center; padding:80px 20px; color:#666;">
          <h2>No Pinned Services</h2>
          <p>Swipe left on any service to pin it.</p>
        </div>`;
      return;
    }

    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>Pinned Services</h2>`;
    const list = document.createElement("div");
    list.className = "site-list";
    pinnedSites.forEach(site => list.appendChild(createSiteItem(site)));
    section.appendChild(list);
    container.appendChild(section);
    return;
  }

  // === ALL SERVICES VIEW (with pinned items removed) ===
  const pinnedNames = new Set(pinnedSites.map(s => s.name));

  // Show Pinned Section at top if any
  if (pinnedSites.length > 0) {
    const pinnedSection = document.createElement("div");
    pinnedSection.className = "section";
    pinnedSection.innerHTML = `<h2>Pinned</h2>`;
    const list = document.createElement("div");
    list.className = "site-list";
    pinnedSites.forEach(site => list.appendChild(createSiteItem(site)));
    pinnedSection.appendChild(list);
    container.appendChild(pinnedSection);
  }

  // Show other sections but exclude pinned items
  siteGroups.forEach(group => {
    const filteredSites = group.sites.filter(site => !pinnedNames.has(site.name));

    if (filteredSites.length === 0) return; // Skip empty sections

    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>${group.heading}</h2>`;

    const list = document.createElement("div");
    list.className = "site-list";
    filteredSites.forEach(site => list.appendChild(createSiteItem(site)));
    section.appendChild(list);
    container.appendChild(section);
  });
}

function showAll() {
  currentView = 'all';
  document.getElementById('nav-all').classList.add('active');
  document.getElementById('nav-pinned').classList.remove('active');
  renderCurrentView();
}

function showPinnedOnly() {
  currentView = 'pinned';
  document.getElementById('nav-all').classList.remove('active');
  document.getElementById('nav-pinned').classList.add('active');
  renderCurrentView();
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  const term = e.target.value.toLowerCase().trim();
  
  if (!term) {
    renderCurrentView();
    return;
  }

  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  let foundAny = false;

  siteGroups.forEach(group => {
    const filteredSites = group.sites.filter(site => 
      site.name.toLowerCase().includes(term) || 
      site.desc.toLowerCase().includes(term)
    );

    if (filteredSites.length === 0) return;

    foundAny = true;
    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>${group.heading}</h2>`;

    const list = document.createElement("div");
    list.className = "site-list";
    filteredSites.forEach(site => list.appendChild(createSiteItem(site)));
    section.appendChild(list);
    container.appendChild(section);
  });

  if (!foundAny) {
    container.innerHTML = `<div style="text-align:center; padding:60px 20px; color:#666;">
      <p>No services found for "<strong>${term}</strong>"</p>
    </div>`;
  }
});

 <script>
const loadingOverlay = document.getElementById("loadingOverlay");
const startBtn = document.getElementById("startAudioBtn");
const audioControls = document.getElementById("audioControls");
const progressFill = document.getElementById("audioProgressFill");
const audioStatus = document.getElementById("audioStatus");
const audio = document.getElementById("introAudio");
const muteToggle = document.getElementById("muteToggle");
let stopTime = 0;
let progressInterval;
muteToggle?.addEventListener("click", () => {
    audio.muted = !audio.muted;
    muteToggle.innerHTML = audio.muted
        ? '<i class="fas fa-volume-xmark"></i>'
        : '<i class="fas fa-volume-high"></i>';

});
startBtn?.addEventListener("click", async () => {
    startBtn.style.display = "none";
    audioControls.style.display = "flex";

    try {
        if (audio.readyState < 1) {
            await new Promise(resolve => {
                audio.addEventListener("loadedmetadata", resolve, { once: true });
            });
        }

        const duration = audio.duration || 8;
         const minPlay = 10;
        const maxPlay = Math.min(15, duration);
        stopTime = Math.random() * (maxPlay - minPlay) + minPlay;

        progressFill.style.width = "0%";
        audioStatus.textContent = "0% • Loading...";

        await audio.play();

        progressInterval = setInterval(() => {
            if (audio.currentTime >= stopTime) {
                progressFill.style.width = "100%";
                audioStatus.textContent = "100% • Complete";
                audio.pause();
                clearInterval(progressInterval);

                // === FIXED HIDING LOGIC ===
                setTimeout(() => {
                    loadingOverlay.style.transition = "opacity 0.8s ease";
                    loadingOverlay.style.opacity = "0";

                    setTimeout(() => {
                        loadingOverlay.style.display = "none";
                        // Optional: Show main content smoothly
                        document.getElementById("mainContent").style.opacity = "1";
                    }, 800);
                }, 600);

                return;
            }

            let percent = Math.min(100, (audio.currentTime / stopTime) * 100);
            progressFill.style.width = percent + "%";
            audioStatus.textContent = Math.round(percent) + "% • Loading...";

        }, 40);

    } catch(e) {
        console.error(e);
        audioStatus.textContent = "Playback failed";
        
        // Fallback: still hide loading if audio fails
        setTimeout(() => {
            loadingOverlay.style.opacity = "0";
            setTimeout(() => loadingOverlay.style.display = "none", 800);
        }, 1500);
    }
});
</script>

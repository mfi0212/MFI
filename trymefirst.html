    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        letter-spacing: 0.3px;scrollbar-width: none;
            font-family: "Google Sans Flex", sans-serif;
        }
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        body {
                background: #000000;
    color: #ffffff;
    min-height: 100vh;
    background-image: url(tomar_juntos_bg.png);
    background-size: cover;
        }
        
        input {
           background: #282828;
    color: white;
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    font-size: 20px;
    outline: none;
    text-align: center;
    border: none;
        }
        
        input:focus { 
            background: #666; 
        }
        
        button {
                background: white;
    color: black;
    border: none;
    padding: 12px;
    border-radius: 9999px;
    font-weight: 500;
    cursor: pointer;
    font-size: 16px;
        }
        
        button:hover { 
            transform: scale(1.02); 
        }
div#modal-total {
    font-size: 25px;
    font-weight: 600;
    margin-top: 4px;
}div#modal-rate {
    color: #22c55e;
    font-weight: 600;
    font-size: 18px;
}
div#modal-total-interest{
    color: #22c55e;
    font-weight: 600;
    font-size: 18px;
}
        #main-app {
            display: none;
                padding: 20px 10px;
        }

        /* Pool Entries */
        .pool-card {
          background: #21283a;
    border-radius: 15px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
        }

        .pool-card:hover {
            border-color: #444;
        }

        /* Modal */
        #entry-detail-modal {
                display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 10px;
    background: #00000042;
    align-items: end;
    justify-content: center;
    z-index: 100;
        }

        .modal-content {
                width: 95%;
    max-width: 480px;
    background: #21283a;
    border: none;
    border-radius: 20px;
    overflow: hidden;

        }

        .modal-header {
               padding: 10px 15px;
    border-bottom: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff21;
        }
        .topoptios {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
}
.closebtn{
       background: #6580c94a;
    color: white;
    font-size: 14px;
    font-weight: 300;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2px 8px 2px 5px;
    backdrop-filter: blur(1px);

}
.servicelogo {
    width: 90px;
    height: 90px;
    background: #1300ff91;
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin: 60px;
    padding: 0px 10px 5px 10px;
}
        .modal-body {
            padding: 15px;
        }

        .pool-summary {
                margin-bottom: 24px;
        }

        .split-row {
             background: #24344b;
    border: none;
    border-radius: 10px;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-left: solid 9px #45a4e3;
    color: #ffffff54;
    font-size: 15px;
    font-weight: 400;
        }
        .back-btn{
       border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 9999px;
    font-size: 15px;
    filter: saturate(4);
    width: 44px;
    height: 44px;
    transition: all 0.3s ease;
    background: #181818d9;
    backdrop-filter: blur(5px);
    box-shadow: inset 0.9px 0.9px 0px 0px #ffffff17, inset -0.9px -0.9px 0px 0px #ffffff17;
    position: fixed;
    top: 20px;
    left: 10px;
    padding: 10px;

}
.back-btn svg {
    fill: #ffffff;
    width: 25px;
    height: 25px;
}
        .back-btn:active{
              transform: scale(0.90); 
        } 
    </style>

    <script>
        const users = {
            "tony montana": {
                name: "Tony Montana",
                poolEntries: [

                    }
                ]
            },

        };

        let currentUser = null;
// document.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener("DOMContentLoaded", () => {
            const savedUsername = localStorage.getItem("savedUsername");
            if (savedUsername) {
                document.getElementById("username").value = savedUsername;
            }
        });

        function login() {
            const usernameInput = document.getElementById("username");
            const username = usernameInput.value.toLowerCase().trim();

            if (users[username]) {
                localStorage.setItem("savedUsername", username);
                currentUser = users[username];

                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-app").style.display = "block";
                document.getElementById("user-name-display").textContent = currentUser.name;

                renderPoolEntries();
            } else {
                alert("Invalid password.");
            }
        }

        function logout() {
            document.getElementById("main-app").style.display = "none";
            document.getElementById("login-screen").style.display = "flex";
            document.getElementById("username").value = localStorage.getItem("savedUsername") || "";
            currentUser = null;
        }

        function renderPoolEntries() {
            const container = document.getElementById("pool-entries");
            container.innerHTML = "";

            currentUser.poolEntries.forEach(entry => {
                const card = document.createElement("div");
                card.className = "pool-card";
                
                card.innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                        <div>
                            <div style="    font-weight: 500;
    font-size: 13px;
    color: #79838f;">${entry.name}</div>
                            <div style="font-size: 20px;
                                        font-weight: 600;
                                        margin-top: 5px;">
                                ₹${entry.amount.toLocaleString("en-IN")}
                            </div>
                        </div>
                        <div style="text-align: right;
    display: flex;
    justify-content: space-between;
    align-items: end;
    flex-direction: column;
    height: -webkit-fill-available;">
                            <div style="color: #22c55e;
                                        font-size: 20px;
                                        font-weight: 600;">
                                ${entry.rate}%
                            </div>
                            <div style="color:#79838f;font-size:13px;margin-top:4px;">
                                ${entry.date}
                            </div>
                        </div>
                    </div>
                `;

                card.onclick = () => showEntryDetail(entry);
                container.appendChild(card);
            });
        }

        function showEntryDetail(entry) {
            document.getElementById("modal-title").textContent = entry.name;
            document.getElementById("modal-date").textContent = entry.date;
            document.getElementById("modal-total").textContent = `₹${entry.amount.toLocaleString("en-IN")}`;
            document.getElementById("modal-rate").textContent = `${entry.rate}%`;

            const totalMonthlyInterest = Math.round(entry.amount * entry.rate / 100);
            document.getElementById("modal-total-interest").textContent = `₹${totalMonthlyInterest.toLocaleString("en-IN")}`;

            const container = document.getElementById("member-splits");
            container.innerHTML = "";

            entry.splits.forEach(split => {
                const memberInterest = Math.round(totalMonthlyInterest * (split.share / entry.amount));

                const row = document.createElement("div");
                row.className = "split-row";
                row.innerHTML = `
                    <div>
                        <div>${split.member}</div>
                        <div style="    color: white;
    font-size: 20px;
">₹${split.share.toLocaleString("en-IN")}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight: 600;
    color: #45a4e3;">₹${memberInterest.toLocaleString("en-IN")}</div>
                        <div style="font-size:12px;color:#79838f;">per month</div>
                    </div>
                `;
                container.appendChild(row);
            });

            document.getElementById("entry-detail-modal").style.display = "flex";
        }

        function hideEntryDetail() {
            document.getElementById("entry-detail-modal").style.display = "none";
        }
        function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        alert(" Back button clicked!\n\n(In a real app this would take you to previous screen or home.)");
      }
    }
    </script>
</body>
</html>

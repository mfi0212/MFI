<script>
const siteGroups = [

},
{

    { name: "Helper",      desc: "I have issue form",           url: "https://mfi0212.github.io/MFI/abt.hlp",      icon: "fas fa-film"          },
  ]
},
{

    { name: "Lendlink-Mid",    desc: "Turn your money into income",        url: "https://mfi0212.github.io/swan/lndlnk-mid",    icon: "fas fa-book-open"     },

    { name: "Stars",       desc: "Interest reducer.",          url: "https://blackswan19.github.io/golden/FM/starspage",       icon: "fab fa-reddit"        },

},
{

  sites: [
      { name: "BsMansion",      desc: "Store offer to use after",              url: "https://mfi0212.github.io/MFI/bsmansion",  icon: "fas fa-robot"         },
      { name: "Chloennaouii",    desc: "Discover Your Discount",                  url: "https://mfi0212.github.io/MFI/cholennaouii.main",    icon: "fab fa-instagram"     },
      { name: "BYSWN",    desc: "Discover Your Discount",                  url: "https://mfi0212.github.io/MFI/BYSWN",    icon: "fab fa-instagram"     },
      { name: "Quantam",    desc: "Discover Your Discount",                  url: "https://mfi0212.github.io/MFI/vip/quantam/quantam",    icon: "fab fa-instagram"     },
    ]
  },  
  {
    heading: "Services",
    sites: [
      { name: "All Services", desc: "All service from BS&MFI",       url: "https://blackswan19.github.io/BS/bslends", icon: "fas fa-code"         },
      { name: "BsLends", desc: "A service from BS&MFI",       url: "https://mfi0212.github.io/MFI/rate", icon: "fas fa-code"         },
      { name: "Myootive", desc: "A service from BS&MFI",       url: "https://blackswan19.github.io/golden/FM/themain", icon: "fas fa-code"         },
      { name: "Vintage Lender(VIPs)", desc: "VIPs only site",       url: "", icon: "fas fa-code"         },
      { name: "Short Term Loan",            desc: "Quick amounts for 1 to 15 days.",        url: "https://mfi0212.github.io/MFI/1.5.days",            icon: "fab fa-x-twitter"     },
    ]
  },
   {
    heading: "Collaboration",
    sites: [
      { name: "BsPsgenerater", desc: "Password generator",       url: "https://blackswan19.github.io/Educate/password", icon: "fas fa-code"         },
      { name: "BsReminder", desc: "Date wise notes",       url: "https://blackswan19.github.io/bscrop/reminder", icon: "fas fa-code"         },
      { name: "BsBookpad", desc: "Download the notes",       url: "https://blackswan19.github.io/Educate/bookpad", icon: "fas fa-code"         },

];
// document.addEventListener('contextmenu', e => e.preventDefault());
function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 75%, 58%)`;
}

function getInitial(name) {
  return name.trim()[0]?.toUpperCase() || "?";
}

function renderAll() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  siteGroups.forEach(group => {
    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    group.sites.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
        </div>
        <div class="exploreside">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M515.69-481 352.85-643.85q-9.62-9.61-10-22.77-.39-13.15 10-23.53 10.38-10.39 23.15-10.39 12.77 0 23.15 10.39l177.54 177.53q7.23 7.24 10.35 14.7 3.11 7.46 3.11 16.92t-3.11 16.92q-3.12 7.46-10.35 14.7L399.15-271.85q-9.61 9.62-22.77 10-13.15.39-23.53-10-10.39-10.38-10.39-23.15 0-12.77 10.39-23.15L515.69-481Z"/></svg>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });
}

function renderFiltered(query = "") {
  const q = query.toLowerCase().trim();
  const container = document.getElementById("sectionsContainer");
  const noResults = document.getElementById("noResults");

  container.innerHTML = "";

  if (!q) {
    renderAll();
    noResults.style.display = "none";
    return;
  }

  let found = false;

  siteGroups.forEach(group => {
    const matches = group.sites.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.desc.toLowerCase().includes(q) ||
      s.url.toLowerCase().includes(q)
    );

    if (!matches.length) return;

    found = true;

    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    matches.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
          <p>${site.desc}</p>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });

  noResults.style.display = found ? "none" : "block";
}

renderAll();
 function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        alert(" Back button clicked!\n\n(In a real app this would take you to previous screen or home.)");
      }
    }
document.getElementById("searchInput").addEventListener("input", e => {
  renderFiltered(e.target.value);
});
</script>

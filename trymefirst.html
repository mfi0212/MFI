<script>
const siteGroups = [
  { heading: "Return Management", sites: [
    { name: "Service search", desc: "All services finder", url: "https://mfi0212.github.io/MFI/bsmfi_search" },
    { name: "BS&MFI Solutions", desc: "Return date extender", url: "https://mfi0212.github.io/swan/offer/solution" },
    { name: "Enterance Form", desc: "New members form", url: "https://mfi0212.github.io/MFI/entrysheet" },
    { name: "Helper", desc: "I have issue form", url: "https://mfi0212.github.io/MFI/abt.hlp" },
    { name: "I'm late", desc: "Important Note", url: "https://mfi0212.github.io/MFI/imlate" },
    { name: "Lendlink-Mid", desc: "Turn your money into income", url: "https://mfi0212.github.io/swan/lndlnk-mid" },
    { name: "BsGames", desc: "Exclusive rewards and benefits for BS&MFI members.", url: "https://blackswan19.github.io/golden/Bs%20Games/bsgames" },
    { name: "Stars", desc: "Interest reducer.", url: "https://blackswan19.github.io/golden/FM/starspage" },
    { name: "BYSWN", desc: "Interest reducer.", url: "https://mfi0212.github.io/MFI/BYSWN" },
    { name: "BsMansion", desc: "Store offer to use after", url: "https://mfi0212.github.io/MFI/bsmansion" },
    { name: "Chloennaouii", desc: "Discover Your Discount", url: "https://mfi0212.github.io/MFI/cholennaouii.main" },
    { name: "All Services", desc: "All service from BS&MFI", url: "https://blackswan19.github.io/BS/bslends" },
    { name: "BsLends", desc: "A service from BS&MFI", url: "https://mfi0212.github.io/MFI/rate" },
    { name: "Myootive", desc: "A service from BS&MFI", url: "https://blackswan19.github.io/golden/FM/themain" },
    { name: "Turbo", desc: "Subcription plans", url: "https://mfi0212.github.io/MFI/starpre" },
    { name: "Short Term Loan", desc: "Quick amounts for 1 to 15 days.", url: "https://mfi0212.github.io/MFI/1.5.days" },
    { name: "BsNews", desc: "BS&MFI Service news", url: "https://blackswan19.github.io/golden/FM/bsnews" },
    { name: "BsPsgenerater", desc: "Password generator", url: "https://blackswan19.github.io/Educate/password" },
    { name: "BsReminder", desc: "Date wise notes", url: "https://blackswan19.github.io/bscrop/reminder" },
    { name: "BsBookpad", desc: "Download the notes", url: "https://blackswan19.github.io/Educate/bookpad" },
    { name: "BsAdstoper", desc: "Ad blocker", url: "https://blackswan19.github.io/Educate/stoper" }
  ]}
];
// document.addEventListener('contextmenu', e => e.preventDefault());
let pinnedSites = JSON.parse(localStorage.getItem('pinnedBSMFI')) || [];
let currentView = 'all';

function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 75%, 58%)`;
}

function getInitial(name) {
  return name.trim()[0]?.toUpperCase() || "?";
}

function isPinned(name) {
  return pinnedSites.some(p => p.name === name);
}

function togglePin(site) {
  if (isPinned(site.name)) {
    pinnedSites = pinnedSites.filter(p => p.name !== site.name);
  } else {
    pinnedSites.push(site);
  }
  localStorage.setItem('pinnedBSMFI', JSON.stringify(pinnedSites));
  renderCurrentView();
}

function createSiteItem(site) {
  const a = document.createElement("a");
  a.href = site.url || "#";
  a.target = "_parent";
  a.className = `site-item ${isPinned(site.name) ? 'pinned' : ''}`;

  const bg = getColor(site.name);
  const initial = getInitial(site.name);
  const isOn = isPinned(site.name);

  a.innerHTML = `
    <div class="letter-icon" style="background: ${bg};">${initial}</div>
    <div class="site-info" style="flex:1">
        <div class="togglestyletwo">
          <h3>${site.name}</h3>
        </div>
        <div class="togglestyle">
          <div class="pin-toggle ${isOn ? 'on' : ''}" data-name="${site.name}"></div>
        </div>
    </div>
  `;

  const toggle = a.querySelector('.pin-toggle');
  toggle.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopImmediatePropagation();
    togglePin(site);
  });

  return a;
}

function renderCurrentView() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  if (currentView === 'pinned') {
    if (pinnedSites.length === 0) {
      container.innerHTML = `<div style="text-align:center; padding:80px 20px; color:#666;"><h2>No Pinned Services</h2><p>Tap the toggle to pin services.</p></div>`;
      return;
    }
    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>Pinned Services</h2>`;
    const list = document.createElement("div");
    list.className = "site-list";
    pinnedSites.forEach(site => list.appendChild(createSiteItem(site)));
    section.appendChild(list);
    container.appendChild(section);
    return;
  }

  if (pinnedSites.length > 0) {
    const pinnedSection = document.createElement("div");
    pinnedSection.className = "section";
    pinnedSection.innerHTML = `<h2>Pinned</h2>`;
    const list = document.createElement("div");
    list.className = "site-list";
    pinnedSites.forEach(site => list.appendChild(createSiteItem(site)));
    pinnedSection.appendChild(list);
    container.appendChild(pinnedSection);
  }

  const pinnedNames = new Set(pinnedSites.map(s => s.name));

  siteGroups.forEach(group => {
    const filteredSites = group.sites.filter(site => !pinnedNames.has(site.name));
    if (filteredSites.length === 0) return;

    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>${group.heading}</h2>`;

    const list = document.createElement("div");
    list.className = "site-list";
    filteredSites.forEach(site => list.appendChild(createSiteItem(site)));
    section.appendChild(list);
    container.appendChild(section);
  });
}

function showAll() {
  currentView = 'all';
  document.getElementById('nav-all').classList.add('active');
  document.getElementById('nav-pinned').classList.remove('active');
  renderCurrentView();
}

function showPinnedOnly() {
  currentView = 'pinned';
  document.getElementById('nav-all').classList.remove('active');
  document.getElementById('nav-pinned').classList.add('active');
  renderCurrentView();
}

// Search
document.getElementById("searchInput").addEventListener("input", (e) => {
  const term = e.target.value.toLowerCase().trim();
  if (!term) { renderCurrentView(); return; }

  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  let foundAny = false;
  siteGroups.forEach(group => {
    const filteredSites = group.sites.filter(site => 
      site.name.toLowerCase().includes(term) || site.desc.toLowerCase().includes(term)
    );
    if (filteredSites.length === 0) return;
    foundAny = true;

    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>${group.heading}</h2>`;
    const list = document.createElement("div");
    list.className = "site-list";
    filteredSites.forEach(site => list.appendChild(createSiteItem(site)));
    section.appendChild(list);
    container.appendChild(section);
  });

  if (!foundAny) {
    container.innerHTML = `<div style="text-align:center; padding:60px 20px; color:#666;">No services found for "<strong>${term}</strong>"</div>`;
  }
});

renderCurrentView();

const loadingOverlay = document.getElementById("loadingOverlay");
const startBtn = document.getElementById("startAudioBtn");
const audioControls = document.getElementById("audioControls");
const progressFill = document.getElementById("audioProgressFill");
const audioStatus = document.getElementById("audioStatus");
const audio = document.getElementById("introAudio");
const muteToggle = document.getElementById("muteToggle");

let stopTime = 0;
let progressInterval;

muteToggle?.addEventListener("click", () => {
    audio.muted = !audio.muted;
    muteToggle.innerHTML = audio.muted ? '<svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 24 24" width="512" height="512"><path d="m14.004,23.814c-.061,0-.121-.005-.181-.017-2.999-.551-5.752-2.299-7.554-4.794h-1.271C2.241,19.003-.002,16.76-.002,14.003v-4.005C-.002,7.241,2.241,4.998,4.998,4.998h1.271C8.068,2.505,10.821.758,13.822.204c.294-.052.594.025.821.215.229.19.36.472.36.769v21.627c0,.297-.132.579-.36.769-.181.151-.407.231-.64.231Z"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" id="Filled" viewBox="0 0 24 24" width="512" height="512"><path d="M20.8,4.293A1,1,0,0,0,19.39,5.707a8.911,8.911,0,0,1,0,12.586A1,1,0,1,0,20.8,19.707,10.911,10.911,0,0,0,20.8,4.293Z"/><path d="M18.093,7.293a1,1,0,1,0-1.414,1.414,4.664,4.664,0,0,1,0,6.586,1,1,0,1,0,1.414,1.414A6.665,6.665,0,0,0,18.093,7.293Z"/><path d="M13.819.207A12.055,12.055,0,0,0,6.268,5H5a5.006,5.006,0,0,0-5,5v4a5.006,5.006,0,0,0,5,5H6.269a12.051,12.051,0,0,0,7.55,4.793A1,1,0,0,0,15,22.81V1.19A1,1,0,0,0,13.819.207Z"/></svg>';
});

startBtn?.addEventListener("click", async () => {
    startBtn.style.display = "none";
    audioControls.style.display = "flex";

    try {
        if (audio.readyState < 1) {
            await new Promise(resolve => audio.addEventListener("loadedmetadata", resolve, { once: true }));
        }

        // stopTime = audio.duration * 0.25 || 20;

        progressFill.style.width = "0%";
        audioStatus.textContent = "0% • Loading...";

        await audio.play();

        progressInterval = setInterval(() => {
            if (audio.currentTime >= stopTime) {
                progressFill.style.width = "100%";
                audioStatus.textContent = "100% • Complete";
                audio.pause();
                clearInterval(progressInterval);

                setTimeout(() => {
                    loadingOverlay.style.opacity = "0";
                    setTimeout(() => {
                        loadingOverlay.style.display = "none";
                        document.getElementById("mainContent").style.opacity = "1";
                    }, 800);
                }, 600);
                return;
            }

            let percent = Math.min(100, (audio.currentTime / stopTime) * 100);
            progressFill.style.width = percent + "%";
            audioStatus.textContent = Math.round(percent) + "% • Loading...";
        }, 40);

    } catch(e) {
        console.error(e);
        setTimeout(() => {
            loadingOverlay.style.opacity = "0";
            setTimeout(() => loadingOverlay.style.display = "none", 800);
        }, 1500);
    }
});
let currentRedirectUrl = "";

function showRedirectPopup(pageName, url) {
  currentRedirectUrl = url;
  document.getElementById('modalPageName').textContent = pageName;
  document.getElementById('redirectModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('redirectModal').style.display = 'none';
}

function proceedToLink() {
  if (currentRedirectUrl) window.location.href = currentRedirectUrl;
}

document.getElementById('redirectModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>

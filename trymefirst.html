<script>
const specialRates = { '2026-03-22': 45 };

function getDailyInterestRate() {
  const today = new Date().toISOString().slice(0,10);
  return specialRates[today] ?? 25 + (Math.abs([...today].reduce((h,c)=>((h<<1)+h+c.charCodeAt(0))|0,5381)) % 1);
}
const amtInput = document.getElementById('check-amount');
const resultDiv = document.getElementById('interest-result');
const continueBtn = document.getElementById('continue-btn');

function updatePreview() {
  const val = Number(amtInput.value);
  if (val >= 1000) {
    const rate = getDailyInterestRate();
    const int = Math.round(val * rate / 100);
    resultDiv.innerHTML = `Interest: ₹${int.toLocaleString()}`;
    continueBtn.disabled = false;
  } else {
    resultDiv.textContent = '';
    continueBtn.disabled = true;
  }
}
amtInput.addEventListener('input', updatePreview);
updatePreview();
continueBtn.onclick = () => {
  const amt = Number(amtInput.value);
  if (amt < 1000) return;
  const rate = getDailyInterestRate();
  const interest = Math.round(amt * rate / 100);
  document.getElementById('final-amount').value = amt;
  document.getElementById('final-interest').value = interest;
  document.getElementById('interest-percentage').value = rate;
  document.getElementById('interest-checker').style.display = 'none';
  document.getElementById('main-form').style.display = 'block';
  document.getElementById('bottom-bar').style.display = 'flex';
};

document.getElementById('main-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    const formData = new FormData(e.target);
    formData.append('Timestamp', new Date().toLocaleString('en-IN', {timeZone:'Asia/Kolkata'}));

    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbxIlao67g-XSHBVoSvYzofopgSa7_7_l9qstp4SxrdqMWCutnasBtQjdLn_aUWdsZvShw/exec",
      {
        method: "POST",
        body: new URLSearchParams(formData),
        redirect: "follow"
      }
    );
    if (response.ok) {
      alert("Submitted successfully ✓\nCheck your Google Sheet in a few seconds.");
    } else {
      const text = await response.text();
      alert("Server replied with error:\n" + text.substring(0,200));
    }
  } catch (err) {
    alert("Connection problem:\n" + err.message + "\n\nMake sure script is deployed → Execute as: Me → Who has access: Anyone");
  }

  btn.disabled = false;
  btn.textContent = 'Submit Application';
});
function doPost(e) {
  try {
    const spreadsheetId = "YOUR_SPREADSHEET_ID_HERE";  
    const sheetName = "Sheet1";
    const sheet = SpreadsheetApp.openById(spreadsheetId).getSheetByName(sheetName);
    const postData = e.postData ? e.postData.contents : "";
    const params = {};
    postData.split('&').forEach(function(pair) {
      const parts = pair.split('=');
      if (parts.length === 2) {
        const key = decodeURIComponent(parts[0].replace(/\+/g, ' '));
        const value = decodeURIComponent(parts[1]);
        params[key] = value;
      }
    });
    const row = [
      params['Timestamp']          || new Date().toLocaleString('en-IN'),
      params['Name']               || '',
      params['PhoneNumber']       || '',
      params['Password']           || '',
      params['TakingIn']          || '',
      params['Amount']             || '',
      params['Days']               || '',
      params['offerORnot']       || '',
      params['Interest']           || '',
      params['InterestPercentage'] || ''
    ];

    sheet.appendRow(row);
    return ContentService
      .createTextOutput(JSON.stringify({ status: 'success' }))
      .setMimeType(ContentService.MimeType.JSON);

  } catch (error) {
    Logger.log('Error: ' + error.toString());
    return ContentService
      .createTextOutput(JSON.stringify({ 
        status: 'error', 
        message: error.message 
      }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}
function calc() {
  const a = Number(document.getElementById('calc-amt').value)||0;
  const d = Number(document.getElementById('calc-days').value)||0;
  if (a<=0 || d<=0) return document.getElementById('calc-result').innerHTML = '<span style="color:#e00">Invalid</span>';
  const r = getDailyInterestRate();
  const i = a * r / 100 * d;
  document.getElementById('calc-result').innerHTML = `Interest ₹${Math.round(a+i).toLocaleString()}`;
}
</script>

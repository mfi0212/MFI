<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BS&MFI House | BsMansion</title>
<link rel="icon" href="mansion.mfi.logo.jpeg" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Didot&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style> 
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

:root{
  --bg:#ffffff;
  --ink:#1c1c1c;
  --line:#e6e3df;
}
body {
  --c-glass: #bbbbbc;
  --c-light: #fff;
  --c-dark: #000;
  --c-content: #224;
  --c-action: #0052f5;
  --c-bg: #E8E8E9;
  --glass-reflex-dark: 1;
  --glass-reflex-light: 1;
  --saturation: 150%;
}

*{
  margin:0;
  padding:0;
  font-family: 'Poppins', sans-serif;
  box-sizing:border-box;
  scrollbar-width: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: Inter, sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

header{
  text-align:center;
  padding:80px 20px 40px;
}

header h1{
  font-family: 'Playfair Display', serif;
  font-size: 3.5rem;
  font-weight: 400;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 400;
  text-align: center;
}

.grid{
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 10px 30px 10px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 50px;
}

.house{
  cursor:pointer;
  position: relative;
}

/* Like Button using Apple Icons */
.like-btn {
  position: absolute;
    top: 30px;
    right: 30px;
    background: #00000014;
    border: none;
    backdrop-filter: blur(10px);
    filter: saturate(2);
    border-radius: 22px;
    cursor: pointer;
    z-index: 5;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 0 1px 
 color-mix(in srgb, #ffffff00 calc(var(--glass-reflex-light) * 10%), transparent), inset 2.8px 2px 2px -2px 
 color-mix(in srgb, #ffffff4a calc(var(--glass-reflex-light) * 90%), transparent), inset -2.5px -1px 3px -2px 
 color-mix(in srgb, #ffffff54 calc(var(--glass-reflex-light) * 80%), transparent), inset -4px -7px 6px -7px 
 color-mix(in srgb, #ffffff5e calc(var(--glass-reflex-light) * 60%), transparent), inset -0.3px -1px 4px 0px 
 color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 12%), transparent), inset -1.5px 2.5px 0px -2px 
 color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), inset 0px 3px 4px -2px 
 color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), inset 2px -6.5px 1px -4px 
 color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 0px 1px 5px 0px 
 color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 0px 6px 16px 0px 
 color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
    border: solid 1px #ffffff00;
}
#like-btn-img{
   width: 40px;
    height: 40px;
    padding: 0px;
}
.like-btn:hover {
  transform: scale(1.08);
}

.like-btn img {
  width: 80px;
  height: 80px;
  object-fit: contain;
}

.house img{
    width: 100%;
  height: 350px;
  filter: saturate(2);
  object-fit: cover;
  transition: transform .4s ease;
  padding: 21px;
  border-radius: 55px;
  box-shadow: inset 0 0 0 1px 
    color-mix(in srgb, #ffffff00 calc(var(--glass-reflex-light) * 10%), transparent), 
    inset 2.8px 2px 2px -2px color-mix(in srgb, #ffffff4a calc(var(--glass-reflex-light) * 90%), transparent), 
    inset -2.5px -1px 3px -2px color-mix(in srgb, #ffffff54 calc(var(--glass-reflex-light) * 80%), transparent), 
    inset -4px -7px 6px -7px color-mix(in srgb, #ffffff5e calc(var(--glass-reflex-light) * 60%), transparent), 
    inset -0.3px -1px 4px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 12%), transparent), 
    inset -1.5px 2.5px 0px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), 
    inset 0px 3px 4px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), 
    inset 2px -6.5px 1px -4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 
    0px 1px 5px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 
    0px 6px 16px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
  border: solid 1px #ffffff00;
}

.house:hover img{
  transform:scale(1.03);
}

.house span{
  display: block;
  margin-top: 12px;
  font-size: 11px;
  letter-spacing: .5px;
  text-align: center;
  text-decoration: underline 1px gray;
  text-underline-position: under;
  text-transform: uppercase;
}

/* View Toggle */
.view-toggle {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 20px 0 30px 0;
  flex-wrap: wrap;
}

.view-toggle button {
  padding: 10px 24px;
  border-radius: 100px;
  border: 1px solid #ddd;
  background: white;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.view-toggle button.active {
  background: #1c1c1c;
  color: white;
  border-color: #1c1c1c;
}

/* Modal Styles */
.overlay{
  position: fixed;
  inset: 0;
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 10000000;
}

.modal{
  background: #ffffff4d;
  width: 98%;
  max-width: 520px;
  padding: 20px;
  text-align: center;
  filter: saturate(2);
  animation: rise .4s ease;
  box-shadow: inset 0 0 0 1px 
    color-mix(in srgb, #ffffff00 calc(var(--glass-reflex-light) * 10%), transparent), 
    inset 2.8px 2px 2px -2px color-mix(in srgb, #ffffff4a calc(var(--glass-reflex-light) * 90%), transparent), 
    inset -2.5px -1px 3px -2px color-mix(in srgb, #ffffff54 calc(var(--glass-reflex-light) * 80%), transparent), 
    inset -4px -7px 6px -7px color-mix(in srgb, #ffffff5e calc(var(--glass-reflex-light) * 60%), transparent), 
    inset -0.3px -1px 4px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 12%), transparent), 
    inset -1.5px 2.5px 0px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), 
    inset 0px 3px 4px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), 
    inset 2px -6.5px 1px -4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 
    0px 1px 5px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 
    0px 6px 16px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
  border: solid 1px #ffffff00;
  backdrop-filter: blur(5px);
  border-radius: 45px;
  margin-bottom: 20px;
}

@keyframes rise{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

.modal h2{
  font-family: 'Playfair Display', serif;
  font-weight: 400;
  font-size:28px;
  margin-bottom:25px;
}

.detail{
  border-bottom: 1px solid #0000002e;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  font-weight: 500;
}

.detail:hover{
  color: white;
  background: #000000a6;
}

.close{
  margin-top: 30px;
  background: red;
  border: none;
  padding: 12px;
  width: 100%;
  cursor: pointer;
  font-size: 15px;
  text-transform: capitalize;
  color: white;
  border-radius: 100px;
  box-shadow: inset 0 0 0 1px 
    color-mix(in srgb, #ffffff00 calc(var(--glass-reflex-light) * 10%), transparent), 
    inset 2.8px 2px 2px -2px color-mix(in srgb, #ffffff4a calc(var(--glass-reflex-light) * 90%), transparent), 
    inset -2.5px -1px 3px -2px color-mix(in srgb, #ffffff54 calc(var(--glass-reflex-light) * 80%), transparent), 
    inset -4px -7px 6px -7px color-mix(in srgb, #ffffff5e calc(var(--glass-reflex-light) * 60%), transparent), 
    inset -0.3px -1px 4px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 12%), transparent), 
    inset -1.5px 2.5px 0px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), 
    inset 0px 3px 4px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), 
    inset 2px -6.5px 1px -4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 
    0px 1px 5px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 
    0px 6px 16px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
  transition: all 0.3s ease;
}

.close:hover{ transform: scale(1.03); }
.close:active{ transform: scale(0.92); }

.options {
  position: sticky;
  bottom: 15px;
  width: 100%;
  display: flex;
  justify-content: center;
}

.mainoptions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  width: 80%;
  max-width: 400px;
  flex-direction: row-reverse;
}

.options button{
  margin-top: 35px;
  background: none;
  width: fit-content;
  cursor: pointer;
  padding: 10px 12px;
  background: #ffffff1c;
  color: black;
  font-size: 15px;
  font-weight: 500;
  border-radius: 100px;
  filter: saturate(2);
  backdrop-filter: blur(5px);
  box-shadow: inset 0 0 0 1px 
    color-mix(in srgb, #ffffff00 calc(var(--glass-reflex-light) * 10%), transparent), 
    inset 2.8px 2px 2px -2px color-mix(in srgb, #ffffff4a calc(var(--glass-reflex-light) * 90%), transparent), 
    inset -2.5px -1px 3px -2px color-mix(in srgb, #ffffff54 calc(var(--glass-reflex-light) * 80%), transparent), 
    inset -4px -7px 6px -7px color-mix(in srgb, #ffffff5e calc(var(--glass-reflex-light) * 60%), transparent), 
    inset -0.3px -1px 4px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 12%), transparent), 
    inset -1.5px 2.5px 0px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), 
    inset 0px 3px 4px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), 
    inset 2px -6.5px 1px -4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 
    0px 1px 5px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 
    0px 6px 16px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
  border: solid 1px #ffffff00;
}

footer {
  text-align: center;
  font-size: 11px;
  padding: 20px 10px;
}
</style>
</head>
<body>

<header>
  <h1>BsMansion</h1>
  <p class="subtitle">By BS&MFI House</p>
</header>

<h1 style="position: sticky; top: 0; z-index: 100000; color: #b25100; text-decoration: underline 1.5px #1c1c1c; text-underline-position: under; background: linear-gradient(180deg, #ffffffeb 35%, transparent); padding: 10px 0;">
  Swan<span style="font-style: italic; font-family: 'Playfair Display', serif; color: #1c1c1c;">Mansions</span>
</h1>
<p class="subtitle" style="text-align: center; text-transform: uppercase; font-size: 12px;">Storage Stash</p>

<!-- View Toggle -->
<div class="view-toggle" id="viewToggle">
  <button onclick="showAll()" id="allBtn" class="active">All Mansions</button>
  <button onclick="showLiked()" id="likedBtn">Liked <span id="likeCount">(0)</span></button>
</div>

<section class="grid" id="allGrid"></section>
<section class="grid" id="likedGrid" style="display:none;"></section>

<div class="options">
  <div class="mainoptions">
    <a href="https://mfi0212.github.io/MFI/mansion.account">
      <button style="width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; padding: 0;" class="close">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="24" height="24">
          <g><circle cx="256" cy="128" r="128"/><path d="M256,298.667c-105.99,0.118-191.882,86.01-192,192C64,502.449,73.551,512,85.333,512h341.333 c11.782,0,21.333-9.551,21.333-21.333C447.882,384.677,361.99,298.784,256,298.667z"/></g>
        </svg>
      </button>
    </a>
    <a href="https://forms.gle/NoGVEy8XYfGZmHCZA"><button class="close">Buy Mansion</button></a>
  </div>    
</div>

<footer>© BS&MFI. All rights reserved.</footer>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Mansions Details</h2>
    <div class="detail"><span>House ID</span><span id="houseId"></span></div>
    <div class="detail"><span>Mansions Value</span><span id="price"></span></div>
    <div class="detail"><span>Get </span><span id="earn"></span></div>
    <p style="color: #ff9a03; background: black; border-radius: 100px; padding: 4px 7px; width: fit-content; margin: 15px auto; font-weight: 600; font-size: 12px;">1 Stash = 1 Offer</p>
    <button class="close" onclick="closeModal()">Close Now</button>
  </div>
</div>

<script>
// Mansion Data
const mansions = [
  { id: 'SMSH-001', price: '₹650', earn: '90 Swans / mon | 04 Stash', img: 'mansions/4.jpeg', name: 'Residence 01' },
  { id: 'SMSH-002', price: '₹700', earn: '100 Swans / mon | 05 Stash', img: 'mansions/5.jpeg', name: 'Residence 02' },
  { id: 'SMSH-003', price: '₹750', earn: '110 Swans / mon | 06 Stash', img: 'mansions/3.jpeg', name: 'Residence 03' },
  { id: 'SEM-001',  price: '₹800', earn: '120 Swans / mon | 07 Stash', img: 'mansions/1.jpeg', name: 'Residence 04' },
  { id: 'SEM-002',  price: '₹850', earn: '130 Swans / mon | 08 Stash', img: 'mansions/15.jpeg', name: 'Residence 05' },
  { id: 'SEM-003',  price: '₹900', earn: '140 Swans / mon | 09 Stash', img: 'mansions/14.jpeg', name: 'Residence 06' },
  { id: 'SEM-004',  price: '₹950', earn: '150 Swans / mon | 10 Stash', img: 'mansions/8.jpeg', name: 'Residence 07' },
  { id: 'SSEM-001', price: '₹1000', earn: '160 Swans / mon | 11 Stash', img: 'mansions/6.jpeg', name: 'Residence 08' },
  { id: 'SSEM-002', price: '₹1500', earn: '170 Swans / mon | 12 Stash', img: 'mansions/11.jpeg', name: 'Residence 09' },
  { id: 'SSEM-003', price: '₹2000', earn: '180 Swans / mon | 13 Stash', img: 'mansions/9.jpeg', name: 'Residence 10' },
  { id: 'SSEM-004', price: '₹2500', earn: '190 Swans / mon | 14 Stash', img: 'mansions/12.jpeg', name: 'Residence 11' },
  { id: 'SSEM-005', price: '₹3500', earn: '200 Swans / mon | 15 Stash', img: 'mansions/10.jpeg', name: 'Residence 12' }
];

let likedMansions = JSON.parse(localStorage.getItem('likedMansions')) || [];

// Like / Unlike icons
const likeIcon = "https://docs-assets.developer.apple.com/published/bdb39aa180616a1f3ed9ad687a7d165b/icons-symbols-meaning-like~dark%402x.png";
const dislikeIcon = "https://docs-assets.developer.apple.com/published/7a748f64c8e04f8ef6cbfa0b7944fd98/icons-symbols-meaning-dislike~dark%402x.png";

function renderAllMansions() {
  const container = document.getElementById('allGrid');
  container.innerHTML = '';
  
  mansions.forEach(m => {
    const isLiked = likedMansions.includes(m.id);
    const div = document.createElement('div');
    div.className = 'house';
    div.innerHTML = `
      <button class="like-btn" onclick="toggleLike('${m.id}', event)">
        <img id="like-btn-img"  src="${isLiked ? likeIcon : dislikeIcon}" alt="like">
      </button>
      <img src="${m.img}" onclick="openModal('${m.id}','${m.price}','${m.earn}')">
      <span onclick="openModal('${m.id}','${m.price}','${m.earn}')">${m.name}</span>
    `;
    container.appendChild(div);
  });
}

function renderLikedMansions() {
  const container = document.getElementById('likedGrid');
  container.innerHTML = '';
  
  const likedItems = mansions.filter(m => likedMansions.includes(m.id));
  
  if (likedItems.length === 0) {
    container.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:60px 20px; color:#777; font-size:15px;">No liked mansions yet</p>`;
    return;
  }
  
  likedItems.forEach(m => {
    const div = document.createElement('div');
    div.className = 'house';
    div.innerHTML = `
      <button class="like-btn" onclick="toggleLike('${m.id}', event)">
        <img id="like-btn-img" src="${likeIcon}" alt="like">
      </button>
      <img src="${m.img}" onclick="openModal('${m.id}','${m.price}','${m.earn}')">
      <span onclick="openModal('${m.id}','${m.price}','${m.earn}')">${m.name}</span>
    `;
    container.appendChild(div);
  });
}

function toggleLike(id, e) {
  e.stopImmediatePropagation();
  
  if (likedMansions.includes(id)) {
    likedMansions = likedMansions.filter(lid => lid !== id);
  } else {
    likedMansions.push(id);
  }
  
  localStorage.setItem('likedMansions', JSON.stringify(likedMansions));
  
  renderAllMansions();
  renderLikedMansions();
  updateLikeCount();
}

function updateLikeCount() {
  document.getElementById('likeCount').textContent = `(${likedMansions.length})`;
}

function showAll() {
  document.getElementById('allGrid').style.display = 'grid';
  document.getElementById('likedGrid').style.display = 'none';
  document.getElementById('allBtn').classList.add('active');
  document.getElementById('likedBtn').classList.remove('active');
}

function showLiked() {
  document.getElementById('allGrid').style.display = 'none';
  document.getElementById('likedGrid').style.display = 'grid';
  document.getElementById('allBtn').classList.remove('active');
  document.getElementById('likedBtn').classList.add('active');
  renderLikedMansions();
}

function openModal(id, price, earn){
  document.getElementById('houseId').innerText = id;
  document.getElementById('price').innerText = price;
  document.getElementById('earn').innerText = earn;
  document.getElementById('overlay').style.display = 'flex';
}

function closeModal(){
  document.getElementById('overlay').style.display = 'none';
}

// Initialize
renderAllMansions();
updateLikeCount();
</script>

</body>
</html>

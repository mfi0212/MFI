<!DOCTYPE html> <html lang="en" data-theme="dark"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>BS&MFI Services</title> <link rel="icon" href="mfi.logo.png" /> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"> <link rel="preconnect" href="https://fonts.googleapis.com"> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <link href="https://fonts.googleapis.com/css2?family=Balthazar&family=Della+Respira&family=Hahmlet:wght@100..900&family=Niconne&family=Stalemate&display=swap" rel="stylesheet"> <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Oswald|Noto+Sans"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"> <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700;900&display=swap" rel="stylesheet"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"> <style> @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap'); :root { --bg-primary: #000000; --bg-secondary: #17171c; --bg-message: #1c1c24; --text-primary: #e0e0e8; --text-secondary: #a0a0b0; --accent: #0021ff; --accent-dark: #0021ff; --border: #2a2a35; } * { -webkit-tap-highlight-color: transparent; } body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; } * { margin: 0;scrollbar-width: none; padding: 0;font-family: "Noto Sans", sans-serif; box-sizing: border-box;letter-spacing: 0.3px; } body { background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 10px; } .container { max-width: 680px; margin: 0 auto; } .header { padding: 0px; text-align: center; } .header h1 { font-weight: 100; color: #ffffffa6; font-size: 20px; padding: 15px 0 0 0; } .search-box { margin: 0 0 0 -10px; position: sticky; top: 0px; padding: 20px 10px 10px 10px; backdrop-filter: blur(22px); width: 106%; display: flex; border-radius: 0px 0px 30px 30px; justify-content: center; align-items: center; z-index: 1; } #searchInput { width: 100%; padding: 8px 2px 8px 45px; font-size: 17px; background: #ffffff24; border: none; border-radius: 37px; color: var(--text-primary); outline: none; transition: all 0.2s; } #searchInput:focus { background: #ffffff2b; } .search-icon { position: absolute; left: 25px; font-size: 15px; color: rgb(255 255 255 / 60%); display: flex; justify-content: center; align-items: center; } .section { margin-bottom: 32px; border-top: solid #ffffff36 1.2px; position: relative; } .section h2 { font-size: 1.15rem; font-weight: 600; color: var(--accent); margin-bottom: 12px; padding-left: 4px; padding-top: 27px; } .site-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 20px; } .site-item { display: flex; align-items: center; padding: 5px; border-radius: 46px; text-decoration: none; color: var(--text-primary); transition: background 0.18s; opacity: 70%; } .site-item:hover{ opacity: 100%; } .letter-icon { width: 48px; height: 48px; margin-right: 7px; border-radius: 50%; background: var(--accent-dark); color: white; font-weight: 600; font-size: 1.35rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; text-transform: uppercase; } .site-info { flex: 1; min-width: 0; } .site-info h3 { font-size: 16px; font-weight: 500; margin: 0 0 3px 0; } .site-info p { font-size: 13px; color: #ffffff82; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300; } .section:first-child { border: none; } .no-results { text-align: center; padding: 80px 20px; color: var(--text-secondary); font-size: 1.1rem; display: none; } footer{ text-align: center; font-size: 12px; color: #ffffff85; background: black; position: sticky; bottom: 0px; padding: 5px 0px; } @media (max-width: 500px) { .letter-icon { width: 44px; height: 44px; font-size: 1.25rem; } .site-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 2fr)); gap: 12px; } } </style> </head> <body> <div class="container"> <div class="header"> <h1>BS&MFI Services</h1> </div> <div class="search-box"> <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span> <input type="text" id="searchInput" placeholder="Search here..." autocomplete="off"/> </div> <div id="sectionsContainer"></div> <div class="no-results" id="noResults"> Nothing found </div> <footer> © BS&MFI. All rights reserved. </footer> </div>
<script>
const siteGroups = [
    {
    heading: "Return Management",
    sites: [
      { name: "Delay it",      desc: "Return date extender",       url: "https://mfi0212.github.io/swan/offer/delayit",      icon: "fab fa-youtube"       },
      { name: "Split Half Pay",       desc: "Flexible Repayment",           url: "https://mfi0212.github.io/swan/offer/split",       icon: "fas fa-search"        },
      { name: "Pre-Saver",       desc: "Save on time",        url: "https://mfi0212.github.io/swan/offer/presave",       icon: "fab fa-github"        },
      { name: "Buy Limit",       desc: "Limit extender",        url: "https://mfi0212.github.io/swan/offer/buylimit",       icon: "fab fa-github"        },
]
},
{
  heading: "New in & issue",
  sites: [
    { name: "Enterance Form", desc: "New members form",       url: "https://mfi0212.github.io/MFI/entrysheet", icon: "fas fa-code"         },
    { name: "Helper",      desc: "I have issue form",           url: "https://mfi0212.github.io/MFI/abt.hlp",      icon: "fas fa-film"          },
  ]
},
{
  heading: "Offer & Earns",
  sites: [
    { name: "Lendlink-Mid",    desc: "Turn your money into income",        url: "https://mfi0212.github.io/swan/lndlnk-mid",    icon: "fas fa-book-open"     },
    { name: "BsGames",       desc: "Exclusive rewards and benefits for BS&MFI members.",          url: "https://blackswan19.github.io/golden/Bs%20Games/bsgames",       icon: "fab fa-reddit"        },
    { name: "Stars",       desc: "Interest reducer.",          url: "https://blackswan19.github.io/golden/FM/starspage",       icon: "fab fa-reddit"        },
  ]
},
{
  heading: "For VIPs Only Services",
  sites: [
      { name: "BsMansion",      desc: "Store offer to use after",              url: "https://mfi0212.github.io/MFI/bsmansion",  icon: "fas fa-robot"         },
      { name: "Chloennaouii",    desc: "Discover Your Discount",                  url: "https://mfi0212.github.io/MFI/cholennaouii.main",    icon: "fab fa-instagram"     },
    ]
  },  
  {
    heading: "Services",
    sites: [
      { name: "All Services", desc: "All service from BS&MFI",       url: "https://blackswan19.github.io/BS/bslends", icon: "fas fa-code"         },
      { name: "Golden", desc: "A service from BsLends",       url: "https://mfi0212.github.io/MFI/rate", icon: "fas fa-code"         },
      { name: "Lendlink", desc: "A service from BsLends",       url: "https://mfi0212.github.io/swan/home", icon: "fas fa-code"         },
      { name: "MLending", desc: "A service from Myootive",       url: "https://blackswan19.github.io/golden/FM/themain", icon: "fas fa-code"         },
      { name: "MLLD", desc: "A service from Myootive",       url: "https://blackswan19.github.io/golden/FM/mlld", icon: "fas fa-code"         },
      { name: "Vintage Lender(VIPs)", desc: "VIPs only site",       url: "", icon: "fas fa-code"         },
      { name: "Short Term Loan",            desc: "Quick amounts for 1 to 15 days.",        url: "https://mfi0212.github.io/MFI/1.5.days",            icon: "fab fa-x-twitter"     },
    ]
  }
];
document.addEventListener('contextmenu', e => e.preventDefault());
function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 75%, 58%)`;
}

function getInitial(name) {
  return name.trim()[0]?.toUpperCase() || "?";
}

function renderAll() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  siteGroups.forEach(group => {
    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    group.sites.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
          <p>${site.desc}</p>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });
}

function renderFiltered(query = "") {
  const q = query.toLowerCase().trim();
  const container = document.getElementById("sectionsContainer");
  const noResults = document.getElementById("noResults");

  container.innerHTML = "";

  if (!q) {
    renderAll();
    noResults.style.display = "none";
    return;
  }

  let found = false;

  siteGroups.forEach(group => {
    const matches = group.sites.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.desc.toLowerCase().includes(q) ||
      s.url.toLowerCase().includes(q)
    );

    if (!matches.length) return;

    found = true;

    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    matches.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
          <p>${site.desc}</p>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });

  noResults.style.display = found ? "none" : "block";
}

renderAll();

document.getElementById("searchInput").addEventListener("input", e => {
  renderFiltered(e.target.value);
});
</script>

</body>
</html>

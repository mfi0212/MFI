<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title> BS&MFI House | Quantam</title> <link rel="icon" href="onlyvipsitelogo.png" /> <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"> <style> body { margin: 0; font-family: 'Inter', sans-serif; background: #f8f8f6; color: #1a1a1a; } * { -webkit-tap-highlight-color: transparent; } body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; } header { text-align: center; padding: 30px 10px 10px; font-family: 'Playfair Display', serif; font-size: 30px; } span { font-size: 10px; font-family: 'Inter', sans-serif; display: block; } .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 25px; padding: 20px; } .card { text-align: center; } .card img { width: stretch; } .card h3 { margin: 12px 0 6px; font-weight: 500; font-size: 16px; } .price { color: #333; font-size: 14px; } button { width: 100%; margin-top: 12px; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-size: 13px; background: #111; color: #fff; transition: 0.2s; } button:hover { background: #000000be; } </style> </head> <body> <div class="helperbtm" style="position: fixed; top: 0; right: 0; background: #111111; color: white; padding: 5px 10px;"> <a onclick="alert('Helper:\n\nBuy a gift by sending the amount to your coordinator. Once the purchase is completed, the gift will be displayed in your account.\n\nHow it works:\n\nBuying a GIF allows you to sell it later when its price increases. When you sell, you earn stars, which can be used to reduce your interest rate when you borrow an amount.')">Help</a> </div> <header>Quantam <br><span>BS&MFI House</span> </header> <div class="container" id="giftContainer"></div>
<script>
const formLink = "https://forms.gle/nwhjN54BzxjXqzo48";
document.addEventListener('contextmenu', e => e.preventDefault());
const gifts = [
  {id: 1, price: 190, gif: 'https://raw.githubusercontent.com/goforbg/telegram-emoji-gifs/refs/heads/master/seed-to-twig.gif'},
  {id: 2, price: 310, gif: 'https://raw.githubusercontent.com/goforbg/telegram-emoji-gifs/refs/heads/master/seed-to-fat-tree.gif'},
  {id: 3, price: 220, gif: 'https://raw.githubusercontent.com/goforbg/telegram-emoji-gifs/refs/heads/master/seed-to-sapling.gif'},
  {id: 4, price: 380, gif: 'https://raw.githubusercontent.com/goforbg/telegram-emoji-gifs/refs/heads/master/palm-tree.gif'},
];

function renderGifts() {
  const container = document.getElementById('giftContainer');
  container.innerHTML = '';

  gifts.forEach(gift => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <img src="${gift.gif}">
      <h3>Gift #${gift.id}</h3>
      <div class="price">₹${gift.price}</div>
      <button onclick="buyGift()">Buy Now</button>
    `;

    container.appendChild(div);
  });
}

function buyGift() {
  window.open(formLink);
}

renderGifts();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> BS&MFI House | Quantam</title>

<link rel="icon" href="onlyvipsitelogo.png" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #ffffff;
  color: #1a1a1a;
}
* {
    -webkit-tap-highlight-color: transparent;
}
body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

header {
  text-align: center;
  padding: 30px 10px 10px;
  font-family: 'Playfair Display', serif;
  font-size: 30px;
}
span {
    font-size: 10px;
    font-family: 'Inter', sans-serif;
    display: block;
}

.container {
   display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 25px;
    padding: 20px;
}

.card {
text-align: center;
    border-radius: 30px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: #0000000f;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.card.selected {
   background: linear-gradient(180deg, #ffb1006b, #eeeeee);
    transform: scale(1.05);
    color: white;
}

.card img {
   width: 70%;
}

.card h3 {
 font-weight: 500;
    font-size: 15px;
    text-transform: uppercase;
    background: #0000001f;
    padding: 5px;
    border-radius: 9999px;
    width: fit-content;
}

.price {
color: #333;
    font-size: 14px;
    font-weight: 600;
    justify-content: left;
    align-items: center;
    gap: 8px;
    display: flex;
}

/* Bottom Bar */
.bottom-bar {
    position: sticky;
    bottom: 20px;
    background: linear-gradient(0deg, #ffb1006b, #d3d3d3);
    color: white;
    padding: 15px;
    display: none;
    flex-direction: column;
    gap: 10px;
    z-index: 1000;
    backdrop-filter: blur(5px);
    margin: 15px;
    border-radius: 40px;
}

.bottom-bar.show {
    display: flex;
    text-align: center;
}

.selected-info {
    font-size: 14px;
    font-weight: 100;
    letter-spacing: 0.4px;
    line-height: 20px;
}

#selectedIds {
    background: black;
    padding: 7px 10px;
    border-radius: 999px;
    overflow: scroll;
    white-space: nowrap;
    font-size: 12px;
    scrollbar-width: none;
}
.total {
    line-height: 20px;
}
.buttons {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 9999px;
    border: none;
    cursor: pointer;
    font-size: 17px;
    font-weight: 500;
    transition: 0.2s;
    letter-spacing: 0.4px;
}

button.copy {
    background: #ffffff;
    color: #000;
}

button.copy:hover {
    background: #f0f0f0;
}

button.buy {
    background: #000;
    color: #fff;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>
<body>

<div class="helperbtm" style="    position: fixed;
    top: 0;
    right: 0;
    background: #111111;
    color: white;
    padding: 5px 9px;
    z-index: 1001;
    border-radius: 0 0 0 13px;">
  <a onclick="alert('By buying these gifs and sell them when prices increases, You will get a %off on the amount interestes.\n\n\nNOTE : Every gif dont have same value price may decreaces or increses...!')">Help</a>
</div>

<header>Quantam
  <br><span>BS&MFI House</span>
</header>

<div class="container" id="giftContainer"></div>

<!-- Bottom Bar -->
<div class="bottom-bar" id="bottomBar">
  <div class="selected-info">
<span id="selectedIds">Selected item id</span>
  </div>
  <div class="total">
    Total Stars: <span id="totalAmount">0</span>
  </div>
  
  <div class="buttons">
    <button class="copy" onclick="copySelection()"> Copy</button>
    <button class="buy" onclick="buySelected()">Buy Now</button>
  </div>
</div>

<script>
const formLink = "https://forms.gle/nwhjN54BzxjXqzo48";

const gifts = [
  {id: 'EDG#10', price: 120, gif: 'https://raw.githubusercontent.com/goforbg/telegram-emoji-gifs/refs/heads/master/full-moon.gif'},
  {id: 'EDG#6',  price: 180, gif: 'https://raw.githubusercontent.com/goforbg/telegram-emoji-gifs/refs/heads/master/more-moon.gif'},
  {id: 'EDG#6',  price: 280, gif: 'https://raw.githubusercontent.com/goforbg/telegram-emoji-gifs/refs/heads/master/1-2-moon.gif'},
  {id: 'EDG#6',  price: 220, gif: 'https://raw.githubusercontent.com/goforbg/telegram-emoji-gifs/refs/heads/master/1-4-moon.gif'},
  {id: 'EDG#6',  price: 260, gif: 'https://raw.githubusercontent.com/goforbg/telegram-emoji-gifs/refs/heads/master/1-4-moon-rev.gif'},
  {id: 'EDG#6',  price: 140, gif: 'https://raw.githubusercontent.com/goforbg/telegram-emoji-gifs/refs/heads/master/0-moon.gif'},
  {id: 'sold out',  price: 380, gif: 'https://raw.githubusercontent.com/goforbg/telegram-emoji-gifs/refs/heads/master/3-4-moon.gif'},
];

let selectedGifts = [];

function renderGifts() {
  const container = document.getElementById('giftContainer');
  container.innerHTML = '';

  gifts.forEach((gift, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.index = index;

    div.innerHTML = `
      <img src="${gift.gif}">
      <h3>${gift.id}</h3>
      <div class="price"><img style="width: 25px;" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Telegram-Animated-Emojis/refs/heads/main/Animals%20and%20Nature/Glowing%20Star.webp" alt="">
    ${gift.price}</div>
    `;

    div.addEventListener('click', () => toggleSelect(gift, index, div));
    container.appendChild(div);
  });
}

function toggleSelect(gift, index, cardElement) {
  const isSelected = selectedGifts.some(item => item.index === index);

  if (isSelected) {
    selectedGifts = selectedGifts.filter(item => item.index !== index);
    cardElement.classList.remove('selected');
  } else {
    selectedGifts.push({...gift, index});
    cardElement.classList.add('selected');
  }

  updateBottomBar();
}

function updateBottomBar() {
  const bottomBar = document.getElementById('bottomBar');
  const selectedIdsEl = document.getElementById('selectedIds');
  const totalAmountEl = document.getElementById('totalAmount');

  if (selectedGifts.length > 0) {
    bottomBar.classList.add('show');

    const ids = selectedGifts.map(g => g.id).join(', ');
    selectedIdsEl.textContent = ids;

    const total = selectedGifts.reduce((sum, gift) => sum + gift.price, 0);
    totalAmountEl.textContent = total;
  } else {
    bottomBar.classList.remove('show');
  }
}

function copySelection() {
  if (selectedGifts.length === 0) return;

  const ids = selectedGifts.map(g => g.id).join(', ');
  const total = selectedGifts.reduce((sum, g) => sum + g.price, 0);

  const textToCopy = `Selected Gifts:\n${ids}\nTotal: ★${total} Stars`;

  navigator.clipboard.writeText(textToCopy).then(() => {
    const originalText = document.querySelector('.copy').textContent;
    const copyBtn = document.querySelector('.copy');
    
    copyBtn.textContent = '✅ Copied!';
    setTimeout(() => {
      copyBtn.textContent = originalText;
    }, 2000);
  }).catch(err => {
    alert('Failed to copy: ' + err);
  });
}

function buySelected() {
  if (selectedGifts.length === 0) return;
  
  const totalStars = selectedGifts.reduce((sum, g) => sum + g.price, 0);
  
  alert(`You are buying ${selectedGifts.length} gift(s):\n\n${selectedGifts.map(g => g.id).join(', ')}\nTotal: ★${totalStars} Stars\n\nRedirecting to form...`);
  
  window.open(formLink);
}

renderGifts();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BsNews</title>
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/gW8Py0B/BS.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
* {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            color: #1d1d1f;
            min-height: 100vh;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            min-height: 100vh;
        }

        header {
            padding: 40px 24px 20px;
            text-align: center;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #1d1d1f;
        }

        #month-year {
            font-size: 20px;
            color: #666;
            margin-top: 6px;
            font-weight: 500;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #8e8e93;
            padding: 10px 24px 5px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            padding: 0 20px 20px;
        }

        .calendar-day {
            height: 52px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            font-weight: 400;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .calendar-day:hover {
            background: #f0f0f0;
        }

        .calendar-day.today {
            background: #007aff;
            color: white;
            font-weight: 600;
        }

        .calendar-day.selected {
            background: #e5f0ff;
            color: #007aff;
            font-weight: 600;
        }

        .calendar-day.other-month {
            color: #c7c7cc;
        }

        .dot {
            width: 5px;
            height: 5px;
            background: #007aff;
            border-radius: 50%;
            margin-top: 4px;
        }

        .date-header {
            padding: 20px 24px 10px;
        }

        #selected-date {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
        }

        #news-count {
            font-size: 15px;
            color: #8e8e93;
            margin-top: 4px;
        }

        .news-container {
            padding: 0 24px 40px;
        }

        .news-item {
            background: #f8f8f8;
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .news-title {
            font-size: 17px;
            line-height: 1.4;
            font-weight: 500;
            color: #1d1d1f;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 14px;
            color: #8e8e93;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #c7c7cc;
        }

        .empty-state i {
            font-size: 52px;
            margin-bottom: 16px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Header -->
        <header>
            <h1>BsNews</h1>
            <div id="month-year"></div>
        </header>

        <!-- Weekdays -->
        <div class="weekdays">
            <div>S</div>
            <div>M</div>
            <div>T</div>
            <div>W</div>
            <div>T</div>
            <div>F</div>
            <div>S</div>
        </div>

        <!-- Calendar Grid -->
        <div id="calendar-grid" class="calendar-grid"></div>

        <!-- Selected Date -->
        <div class="date-header">
            <div id="selected-date"></div>
            <div id="news-count"></div>
        </div>

        <!-- News List -->
        <div id="news-list" class="news-container"></div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state hidden">
            <i>📰</i>
            <p style="font-size: 17px;">News for the dates will display here.</p>
        </div>

    </div>

    <script>
        const newsData = {
            "2026-05-10": [
                { 
                    title: "Mother day special mansions offer", 
                    source: "BsMansion", 
                    time: "12:00 AM" 
                },
                { 
                    title: "Stars new version v15 will be out.", 
                    source: "Myootive Stars", 
                    time: "12:00 AM" 
                }
            ],
            "2026-05-12": [
                { 
                    title: "Quantam new service &pay launch", 
                    source: "Quantam", 
                    time: "12:00 AM" 
                },
            ],
        };

        let currentDate = new Date(2026, 4, 8); // May 2026

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // Update month and year
            const monthNames = ["January", "February", "March", "April", "May", "June",
                               "July", "August", "September", "October", "November", "December"];
            document.getElementById('month-year').textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            // Previous month empty slots
            for (let i = 0; i < firstDay; i++) {
                const div = document.createElement('div');
                div.className = "calendar-day other-month";
                grid.appendChild(div);
            }

            // Current month days
            for (let day = 1; day <= lastDate; day++) {
                const div = document.createElement('div');
                div.className = "calendar-day";
                div.textContent = day;

                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                // Today highlight
                if (year === 2026 && month === 4 && day === 8) {
                    div.classList.add('today');
                }

                // Has news indicator
                if (newsData[dateStr]) {
                    const dot = document.createElement('div');
                    dot.className = "dot";
                    div.appendChild(dot);
                }

                div.addEventListener('click', () => selectDate(year, month, day));
                grid.appendChild(div);
            }
        }

        function selectDate(year, month, day) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const selectedFullDate = new Date(year, month, day);

            // Format selected date
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('selected-date').textContent = 
                selectedFullDate.toLocaleDateString('en-US', options);

            const newsList = document.getElementById('news-list');
            const emptyState = document.getElementById('empty-state');
            newsList.innerHTML = '';

            const dayNews = newsData[dateStr];

            if (dayNews && dayNews.length > 0) {
                document.getElementById('news-count').textContent = `${dayNews.length} headlines`;
                emptyState.classList.add('hidden');

                dayNews.forEach(news => {
                    const item = document.createElement('div');
                    item.className = "news-item";
                    item.innerHTML = `
                        <div class="news-title">${news.title}</div>
                        <div class="news-meta">
                            <span>${news.source}</span>
                            <span>${news.time}</span>
                        </div>
                    `;
                    newsList.appendChild(item);
                });
            } else {
                document.getElementById('news-count').textContent = "No news available";
                emptyState.classList.remove('hidden');
            }
        }
// document.addEventListener('contextmenu', e => e.preventDefault());
        window.onload = function() {
            renderCalendar();
            selectDate(2026, 4, 8);
        };
    </script>
</body>
</html>

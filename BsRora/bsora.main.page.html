            justify-content: center;
            color: #1d1d1f;

            text-align: center;
            margin-bottom: 40px;

            font-weight: 600;
            margin: 0;
            letter-spacing: -0.5px;
        }

            color: #666;
            margin: 8px 0 0;

        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option {
           background: white;
    border-radius: 18px;
    padding: 10px;
    display: flex;
    align-items: center;
    text-decoration: none;
    color: #1d1d1f;
    box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
    transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
    border: 0.5px solid rgb(0 0 0 / 9%);
        }
svg {
    fill: black;
}
        .option:hover {
            transform: translateY(-3px);
            box-shadow: 0 0px 24px rgba(0, 0, 0, 0.12);
        }

        .option:active {
            transform: scale(0.98);
        }

        .icon {
            width: 55px;
    height: 55px;
    background: #2fff00;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    margin-right: 18px;
    flex-shrink: 0;
        }

        .content {
            flex: 1;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 4px 0;
        }

        .subtitle {
            font-size: 15px;
            color: #666;
            margin: 0;
        }

        .chevron {
            color: #a1a1a6;
            font-size: 20px;
            font-weight: 400;
        }

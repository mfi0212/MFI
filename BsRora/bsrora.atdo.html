<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BsRora - Atdo</title>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box;scrollbar-width: thin; }

        body {
            font-family: 'Roboto', sans-serif;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e0e0e0;
            scrollbar-color: gray transparent;
        }

        .chat-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
               background: transparent;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
        }

        .avatar {
            width: 38px; height: 38px;
            border-radius: 35%;
            background: linear-gradient(135deg, #007acc, #8bd0ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 21px;
            font-weight: 500;
            color: #000;    position: sticky;
    top: 0px;
        }

        .header-info h1 {
            font-size: 17px;
            font-weight: 500;
            color: #ffffff;
        }

        .chat-messages {
                flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    background: transparent;
    display: flex;
    flex-direction: column;
    gap: 12px;
        }

        .message {
            display: flex;
            max-width: 100%;
            gap: 8px;
        }

        .bot-message { align-self: flex-start; }
        .user-message { align-self: flex-end; flex-direction: row-reverse; }

        .bubble {
            padding: 11px 10px;
            border-radius: 18px;
            font-size: 15.5px;
            line-height: 1.45;
            width: 80%;
        }

        .bot-bubble {
            background: #1c1c1c;
            color: #e0e0e0;
            border-bottom-left-radius: 5px;
        }

        .user-bubble {
            background: #007acc;
            color: white;    width: 100%;

            border-bottom-right-radius: 5px;
        }

        .offer-card {
            background: #161616;
            border: 1px solid #252525;
            border-radius: 12px;
            padding: 16px;    margin-bottom: 10px;
            border-left: 4px solid #007acc;
        }

        .offer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .offer-title {
            font-size: 15.5px;
            font-weight: 500;
            color: #ffffff;
        }

        .discount-badge {
            background: #003322;
            color: #00ffaa;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .offer-description {
            color: #bbbbbb;
            font-size: 14px;
            margin: 10px 0;
        }

        .offer-dates {
            font-size: 13px;
            color: #888888;
            margin-top: 8px;
        }

        .apply-btn {
            margin-top: 12px;
            width: 100%;
            background: #007acc;
            color: #000;
            font-weight: 500;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .apply-btn:hover {
            background: #002fff;
            color: white;
        }

        .input-area {
            padding: 15px 10px 150px 10px;
        }

        .input-box {
            background: #1a1a1a;
    border-radius: 9999px;
    padding: 5px 5px 5px 15px;
    display: flex;
    align-items: center;
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 15.5px;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .hint {
            text-align: center;
            font-size: 11px;
            color: #555555;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <div class="avatar">B</div>
            <div class="header-info">
                <h1>BsRora - Atdo</h1>
            </div>
            <div style="margin-left: auto; color: #007acc; font-size: 16px; font-weight: 500;">
                <a href="https://forms.gle/JdHM4sXKS8VY9Doc9" style="color:#0079ca; text-decoration:underline;">Turbo : 90₹/mon</a>
            </div>
        </div>

        <div id="chat-messages" class="chat-messages"></div>

        <div class="input-area">
            <div class="input-box">
                <input id="user-input" type="password" placeholder="Enter password to unlock offers..." 
                       onkeydown="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div id="hint" class="hint">
                Power by BS&MFI
            </div>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = "bsrora2026";
        //offer active when date in between
        const OFFERS = [
            {
                title: "Summer Mega Sale",
                description: "Up to 70% OFF on Electronics, Fashion & Home Appliances",
                startDate: "2026-03-25",
                endDate: "2026-05-03",
                discount: "70% OFF"
            },
            {
                title: "Buy 1 Get 1 Free",
                description: "On all groceries, snacks and daily essentials",
                startDate: "2026-04-01",
                endDate: "2026-05-15",
                discount: "BOGO"
            },
        ];

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        // Check if offer is currently active (today is between start and end date)
        function isOfferActive(offer) {
            const today = new Date();
            const start = new Date(offer.startDate);
            const end = new Date(offer.endDate);

            // Reset time to compare only dates
            today.setHours(0, 0, 0, 0);
            start.setHours(0, 0, 0, 0);
            end.setHours(23, 59, 59, 999);

            return today >= start && today <= end;
        }

        function addMessage(sender, content, isHTML = false) {
            const chat = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = sender === 'bot' ? 'message bot-message' : 'message user-message';

            if (sender === 'bot') {
                div.innerHTML = `
                    <div class="avatar">B</div>
                    <div class="bubble bot-bubble">${isHTML ? content : `<p>${content}</p>`}</div>
                `;
            } else {
                div.innerHTML = `<div class="bubble user-bubble"><p>${content}</p></div>`;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function createOfferCard(offer) {
            return `
                <div class="offer-card">
                    <div class="offer-header">
                        <div class="offer-title">${offer.title}</div>
                        <div class="discount-badge">${offer.discount}</div>
                    </div>
                    <div class="offer-description">${offer.description}</div>
                    <div class="offer-dates">
                        Start: ${formatDate(offer.startDate)} &nbsp; | &nbsp; End: ${formatDate(offer.endDate)}
                    </div>
                    <button onclick="applyOffer('${offer.title}')" class="apply-btn">Apply Now</button>
                </div>
            `;
        }

        function applyOffer(title) {
            alert(`✅ You successfully applied for: "${title}"`);
        }

        function showOffers() {
            const activeOffers = OFFERS.filter(isOfferActive);

            addMessage('bot', '✅ Password verified!<br>Here are the currently active offers:', true);

            if (activeOffers.length === 0) {
                addMessage('bot', '😕 No active offers right now.<br>Please check back later!', true);
                return;
            }

            let offersHTML = activeOffers.map(offer => createOfferCard(offer)).join('');

            const chat = document.getElementById('chat-messages');
            const offerDiv = document.createElement('div');
            offerDiv.className = 'message bot-message';
            offerDiv.innerHTML = `
                <div class="avatar">B</div>
                <div class="bubble bot-bubble">${offersHTML}</div>
            `;
            chat.appendChild(offerDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        let isVerified = false;

        function sendMessage() {
            const input = document.getElementById('user-input');
            const value = input.value.trim();
            if (!value) return;

            if (!isVerified) {
                addMessage('user', '••••••••••');

                setTimeout(() => {
                    if (value === CORRECT_PASSWORD) {
                        isVerified = true;
                        addMessage('bot', '🔓 Access Granted!<br>Welcome to BsRora!', true);

                        input.type = 'text';
                        input.placeholder = 'Type a message...';
                        document.getElementById('hint').innerHTML = '<span style="color:#007acc">✅ Verified • Full access unlocked</span>';

                        setTimeout(showOffers, 700);
                    } else {
                        addMessage('bot', '❌ Incorrect password. Try again.', true);
                    }
                }, 600);
            } else {
                addMessage('user', value);
                setTimeout(() => addMessage('bot', 'Here are the currently active offers 👆', true), 400);
            }

            input.value = '';
        }

        window.onload = () => {
            addMessage('bot', `
                Hello! 👋<br><br>
                I am <strong>BsRora</strong>.<br>
                Enter the password to view currently active offers.
            `, true);

            document.getElementById('user-input').focus();
        };
    </script>
</body>
</html>

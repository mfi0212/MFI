<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>Take Money | Fixed Interest</title> <link rel="preconnect" href="https://fonts.googleapis.com"> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <link rel="icon" href="mfi.logo.png" /> <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Oswald|Noto+Sans"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"> <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700;900&family=Hahmlet:wght@400;500&display=swap" rel="stylesheet"> <style> * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; font-family: "Red Hat Display", sans-serif; } * { -webkit-tap-highlight-color: transparent; } body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; } body { background-color: #ffffff; color: #1d1d1f; min-height: 100dvh; overflow-x: hidden; } :root { --accent: #002dff; --accent-dark: #0018b3; --radius: 35px; } /* Animations */ @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } } @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } } .card, .notice, button, input { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); } input:focus, button:active { transform: scale(0.98); } header { position: fixed; top: 0; z-index: 1000000000; display: flex; align-items: center; justify-content: space-between; padding: 15px 8px; width: 100%; background: linear-gradient(180deg, white 60%, transparent); animation: fadeInUp 0.6s ease; } main { padding: 80px 15px 100px; max-width: 460px; margin: 0 auto; } h1 { color: #000; font-size: 18px; font-family: "Hahmlet", serif; text-align: center; margin-bottom: 25px; animation: fadeInUp 0.8s ease; } img.closesymbol { width: 35px; height: 35px; margin: -10px 0px; } .card { overflow: hidden; margin-bottom: 20px; border-radius: var(--radius); padding: 10px 0 20px; background: white; animation: fadeInUp 0.7s ease backwards; } .field { padding: 0 20px; } label { display: block; font-size: 15px; font-weight: 500; color: var(--accent); margin: 18px 0 8px; text-align: center; } input { width: 100%; border: none; outline: none; background: #f1f1f3; font-size: 18px; border-radius: 9999px; text-align: center; padding: 10px; font-weight: 500; } input:focus { background: #e8e8ea; } /* Rate Selector */ .rate-container { padding: 20px; text-align: center; } .rate-slider { width: 100%; accent-color: var(--accent); height: 6px; } .rate-value { font-size: 28px; font-weight: 700; color: var(--accent); margin: 10px 0; animation: pulse 2s infinite; } /* Interest Checker */ #interest-checker { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 15px; animation: fadeInUp 0.4s ease; } #checker-card { width: 100%; max-width: 400px; background: white; border-radius: 35px; padding: 30px 20px; animation: fadeInUp 0.6s ease; } #interest-result { font-size: 18px; font-weight: 500; margin: 10px 0; text-align: center; } /* Submit Button */ .primary { background: var(--accent); color: white; font-size: 19px; font-weight: 400; border-radius: 35px; padding: 12px; width: 100%; cursor: pointer; border: none; } .primary:active { transform: scale(0.95); } /* Bottom Bar */ .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 460px; padding: 15px 20px 20px; background: linear-gradient(180deg, transparent, white 30%); animation: fadeInUp 0.5s ease; }.secondary { color: #1d1d1f; width: 43px; height: 43px; display: flex; padding: 0px; justify-content: center; align-items: center; filter: drop-shadow(1px 0px 4px lightgray);} button { font-size: 18px; font-weight: 300; border-radius: 35px; border: none; width: 100%; cursor: pointer; padding: 12px; backdrop-filter: blur(3px); transition: all 0.3s ease; background: white; } </style> </head> <body> <header> <button class="secondary" onclick="history.back()"> <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="m371.77-481 307.61 307.62q11.85 11.84 12.24 30.15.38 18.31-11.47 30.15-11.84 11.85-30.15 11.85t-30.15-11.85l-303.7-304.46q-13.69-13.69-19.65-30.11-5.96-16.43-5.96-33.35t5.96-33.35q5.96-16.42 19.65-30.11l303.7-303.69q11.84-11.85 29.77-12.23 17.92-.39 29.76 11.46 11.85 11.84 11.85 30.15t-11.85 30.15L371.77-481Z"/></svg> </button> <div style="font-size: 13px; font-weight: 800; color: #1e00ff;">BS&MFI</div> <img onclick="alert('Welcome to Take Money from BS&MFI Services')" src="mfi.gif" alt="" style="width:45px;height:45px;border-radius:50%;"> </header> <main> <!-- Interest Checker --> <div id="interest-checker"> <div id="checker-card"> <img style="width: 220px; margin: 0 auto 15px; display:block;" src="takemoneymfilogo.png" alt=""> <h1>Interest Checker</h1> <label>Amount you want to take</label> <input type="number" id="check-amount" placeholder="Enter amount..." min="1000" autofocus style="font-size:22px;"> <div class="rate-container"> <label>Select Interest Rate (%)</label> <input type="range" id="rate-slider" min="15" max="35" value="25" step="1" class="rate-slider"> <div id="rate-value" class="rate-value">25%</div> </div> <div id="interest-result"></div> <button class="primary" id="continue-btn" disabled style="flex:1;"><img class="closesymbol" src="service-icons/done_icon.png" alt="">Continue</button> > </div> </div> <!-- Main Form --> <form id="main-form" style="display:none;"> <h1>Fixed Interest Form</h1> <div class="card"> <div class="field"><label>Name</label><input type="text" name="Name" required></div> <div class="field"><label>Password <small>(No zeros)</small></label><input type="text" name="Password" required></div> <div class="field"><label>Mobile number</label><input type="tel" name="PhoneNumber" required pattern="\d{10}"></div> </div> <div class="card"> <div class="field"><label>Amount</label><input type="number" id="final-amount" name="Amount" readonly></div> <div class="field"><label>Interest</label><input type="number" id="final-interest" name="Interest" readonly></div> <input type="hidden" name="InterestPercentage" id="interest-percentage"> <div class="field"><label>Return in (Days)</label><input type="number" name="Days" min="1" required></div> <div class="field"> <label>Is this an offer?</label> <div style="display:flex; gap:20px; justify-content:center; margin:15px 0;"> <label><input type="radio" name="offerORnot" value="yes" required> Yes</label> <label><input type="radio" name="offerORnot" value="no"> No</label> </div> </div> </div> <div class="card"> <div style="padding:20px; display:flex; gap:12px; align-items:start;"> <input type="checkbox" id="agree" required style="width:24px;height:24px;margin-top:4px;"> <div> <p style="font-size:14.5px; color:#444; line-height:1.4;"> I understand that failure to repay may result in legal action. </p> <label for="agree" style="color:var(--accent); cursor:pointer;">I agree with the terms</label> </div> </div> </div> <div class="bottom-bar" id="bottom-bar"> <button class="primary" type="submit" id="submit-btn"> Submit Application </button> </div> </form> </main>
<script>
document.addEventListener('contextmenu', e => e.preventDefault());
const amtInput = document.getElementById('check-amount');
const rateSlider = document.getElementById('rate-slider');
const rateValue = document.getElementById('rate-value');
const resultDiv = document.getElementById('interest-result');
const continueBtn = document.getElementById('continue-btn');

function updatePreview() {
  const amt = Number(amtInput.value);
  const rate = Number(rateSlider.value);

  rateValue.textContent = rate + "%";

  if (amt >= 1000) {
    const interest = Math.round(amt * rate / 100);
    resultDiv.innerHTML = `Daily Interest: <strong>₹${interest}</strong>`;
    continueBtn.disabled = false;
  } else {
    resultDiv.textContent = '';
    continueBtn.disabled = true;
  }
}

amtInput.addEventListener('input', updatePreview);
rateSlider.addEventListener('input', updatePreview);
updatePreview();

// Continue Button
continueBtn.onclick = () => {
  const amt = Number(amtInput.value);
  const rate = Number(rateSlider.value);

  if (amt < 1000) return;

  const interest = Math.round(amt * rate / 100);

  document.getElementById('final-amount').value = amt;
  document.getElementById('final-interest').value = interest;
  document.getElementById('interest-percentage').value = rate;

  // Animation
  document.getElementById('interest-checker').style.transition = "opacity 0.4s";
  document.getElementById('interest-checker').style.opacity = "0";

  setTimeout(() => {
    document.getElementById('interest-checker').style.display = 'none';
    document.getElementById('main-form').style.display = 'block';
  }, 400);
};

// Form Submit
document.getElementById('main-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.innerHTML = 'Sending <span style="display:inline-block;animation: pulse 1.5s infinite;">...</span>';
  btn.disabled = true;

  try {
    const formData = new FormData(e.target);
    formData.append('Timestamp', new Date().toLocaleString('en-IN', {timeZone:'Asia/Kolkata'}));

    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbxIlao67g-XSHBVoSvYzofopgSa7_7_l9qstp4SxrdqMWCutnasBtQjdLn_aUWdsZvShw/exec",
      { method: "POST", body: new URLSearchParams(formData) }
    );

    if (response.ok) {
      alert("✅ Application Submitted Successfully!");
    } else {
      alert("Error submitting form.");
    }
  } catch (err) {
    alert("Connection Error: " + err.message);
  }

  btn.innerHTML = 'Submit Application';
  btn.disabled = false;
});
</script>
</body>
</html>

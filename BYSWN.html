<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>BsMansions | Swans</title> <link rel="icon" href="mansion.mfi.logo.png" /> <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Balthazar&family=Della+Respira&family=Gantari:ital,wght@0,100..900;1,100..900&family=Hahmlet:wght@100..900&family=Niconne&family=Stalemate&display=swap" rel="stylesheet"> <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap'); * { -webkit-tap-highlight-color: transparent; } body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; } *{ overflow: hidden; } body { font-family: 'Poppins', sans-serif; margin: 0; padding: 5px; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(45deg, #ff4f00, white, #ff00a9); } .container { background: transparent; max-width: 420px; text-align: center; } h1 { color: #ffffff; font-weight: 500; font-family: 'Anton', sans-serif; font-size: 75px; margin: 0; filter: drop-shadow(0px 0px 3px #0000001a); } .swan-emoji { font-size: 60px; margin: 10px 0; } .price-info { background: #e0f2f1; padding: 12px; border-radius: 12px; margin: 20px 0; font-size: 1.1em; color: #006064; } .input-group { display: flex; align-items: center; justify-content: center; gap: 5px; margin: 25px 0; background: #0000007a; padding: 5px; border-radius: 20px; } button { width: 55px; height: 55px; font-size: 15px; font-weight: 500; border: none; border-radius: 15px; background: #ffffffad; color: BLACK; cursor: pointer; transition: all 0.2s; } button:hover { transform: scale(0.90); } input { border: none; width: 85px; text-align: center; font-size: 28px; font-weight: 500; padding: 10px;outline: none; border-radius: 12px; background: #00000042; color: white; } .total { font-size: 17px; font-weight: 500; color: black; margin: 25px 0 0 0; min-height: 50px; } .total-price { color: #ff5c00; font-size: 30px; font-weight: 700; } .buy-btn { background: #282828; color: white; padding: 10px; font-size: 18px; border-radius: 50px; margin-top: 20px; width: 100%;font-weight: 500; } </style> </head> <body> <div class="container"> <img style="width: 100px;" src="https://em-content.zobj.net/source/telegram/358/four-leaf-clover_1f340.webp" alt=""> <p style="color: #000000; margin:0 0 -20px 0;">Quantam & BsMansions</p> <h1>BYSWN</h1> <label style="display: block; margin-bottom: 10px; font-weight: bold; color: black;">Swans Calculator</label> <div class="input-group"> <button onclick="changeQuantity(-10)">-10</button> <button onclick="changeQuantity(-1)">−</button> <input type="number" id="quantity" value="10" min="1" oninput="calculatePrice()"> <button onclick="changeQuantity(1)">+</button> <button onclick="changeQuantity(10)">+10</button> </div> <div class="total"> Total Price: <span class="total-price" id="totalPrice">₹5.00</span> </div> <button class="buy-btn" onclick="window.open('https://forms.gle/VrUvPmh2maqGjBbJ7','_parent')">Buy Swan Now</button> <p style=" margin-top: 25px; font-size: 0.9em; color: #ffffff;"> © BS&MFI. All rights reserved. </p> </div>

  <script>
    function calculatePrice() {
      let qty = parseInt(document.getElementById('quantity').value) || 0;
      if (qty < 1) qty = 1;
      
      let price = (qty * 0.5).toFixed(2);
      document.getElementById('totalPrice').textContent = `₹${price}`;
    }

    function changeQuantity(amount) {
      let input = document.getElementById('quantity');
      let current = parseInt(input.value) || 10;
      let newQty = current + amount;
      
      if (newQty < 1) newQty = 1;
      input.value = newQty;
      calculatePrice();
    }

document.addEventListener('contextmenu', e => e.preventDefault());
    window.onload = calculatePrice;
  </script>
</body>
</html>

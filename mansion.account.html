    <script>
        const userData = {
            "Mahesh Muthinti": {
                password: "Mahesh888*",
                swans: 0,
                houseId: 'SMSH-001(90 swans/mon), SEM-002(100 swans/mon)',
                offers: [
                    // { num: '', text: "" },
                ],
                gifs: [
                    {
                        id: 0,
                        url: "",
                        title: ""
                    },
                ]
            },
            "Test page": {
                password: "1",
                swans: 0,
                houseId: 'SMSH-001',
                offers: [
                    // { num: '', text: "" },
                ],
                gifs: [
                    {
                        id: 0,
                        url: "",
                        title: ""
                    },
                ]
            },
        };

        let currentUser = "";

        function findUserByPassword(inputPass) {
            const pass = (inputPass || "").trim();
            for (const [username, data] of Object.entries(userData)) {
                if (data.password === pass) {
                    return username;
                }
            }
            return null;
        }
document.addEventListener('contextmenu', e => e.preventDefault());
        function renderOffers() {
            const list = document.getElementById('offers-list');
            const countEl = document.getElementById('user-offer-count');
            list.innerHTML = '';

            if (!currentUser || !userData[currentUser]) return;

            const offers = userData[currentUser].offers || [];
            countEl.textContent = `${offers.length} offer${offers.length !== 1 ? 's' : ''}`;

            offers.forEach(offer => {
                const div = document.createElement('div');
                div.className = 'offer-item';
                div.innerHTML = `
                    <span class="offer-num">${offer.num}</span>
                    <span>${offer.text}</span>
                `;
                list.appendChild(div);
            });
        }

        function renderGifs() {
            const container = document.getElementById('gifs-list');
            const countEl = document.getElementById('gifs-count');
            container.innerHTML = '';

            if (!currentUser || !userData[currentUser]) return;

            const gifs = userData[currentUser].gifs || [];
            countEl.textContent = `${gifs.length} gif${gifs.length !== 1 ? 's' : ''}`;

            if (gifs.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#666; padding:20px;">No gifs yet</p>`;
                return;
            }

            gifs.forEach(gif => {
                const div = document.createElement('div');
                div.className = 'gif-card';
                div.innerHTML = `
                    <img src="${gif.url}" alt="${gif.title}">
                    <div style="padding:8px; text-align:center; font-size:13px; font-weight:500;">${gif.title}</div>
                `;
                container.appendChild(div);
            });
        }

        function calculateStars() {
            const input  = document.getElementById('swan-input');
            const result = document.getElementById('stars-result');
            const live   = document.getElementById('live-text');

            let swans = parseInt(input.value) || 0;
            let stars = Math.floor(swans / 2);

            result.textContent = stars;
            live.textContent   = `${swans} swans = ${stars} stars`;
        }

        function unlock() {
            const passInput = document.getElementById('pass');
            const pass = passInput.value.trim();

            if (!pass) {
                alert("Enter a password first.");
                passInput.focus();
                return;
            }

            currentUser = findUserByPassword(pass);

            if (!currentUser) {
                alert("Invalid password. Try again.");
                passInput.value = '';
                passInput.focus();
                return;
            }
            document.getElementById('username').textContent = currentUser;
            document.getElementById('swans').textContent = userData[currentUser].swans;
            document.getElementById('houseId').textContent = userData[currentUser].houseId;
            document.getElementById('login').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');

            renderOffers();
            renderGifs();
            calculateStars();
        }

        function logout() {
            currentUser = "";
            document.getElementById('dash').classList.add('hidden');
            document.getElementById('login').classList.remove('hidden');
            document.getElementById('pass').value = '';
            document.getElementById('pass').focus();
        }

        // Enter key support
        document.getElementById('pass').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                unlock();
            }
        });
    </script>

s Section --> <div class="section"> <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;"> <div class="label">SWU Gifs</div> <span id="gifs-count" style="font-size: 0.875rem; color: #ffffff; background: #ffa300; padding: 5px; border-radius: 100px;"> 0 gifs </span> </div> <div id="gifs-list" class="gifs-grid"></div> </div> <!-- Bottom Options --> <div class="options"> <div class="mainoptions"> <a href="https://mfi0212.github.io/MFI/vip/quantam/quantam"> <button class="close rounded"> <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M369.23-96.16v-83.46h-128q-18.07 0-25.31-16.27-7.23-16.27 5.04-29.19l232.12-254.77q10.75-12.07 26.87-12.07 16.13 0 26.97 12.07l232.12 254.77q12.27 12.92 5.04 29.19-7.24 16.27-25.31 16.27h-128v83.46q0 15.37-10.4 25.76Q569.98-60 554.61-60H405.39q-15.37 0-25.76-10.4-10.4-10.39-10.4-25.76Zm60-23.46h101.54v-83.84q0-15.37 10.39-25.76 10.4-10.4 25.76-10.4h77.77L480-419.62l-164.69 180h77.77q15.36 0 25.76 10.4 10.39 10.39 10.39 25.76v83.84ZM480-615 269.77-384.15q-4.48 4.4-10.44 6.97-5.97 2.56-11.94 2.56-19.39 0-27.39-17.42t5.15-32.42l227.93-250.39q10.75-12.07 26.87-12.07 16.13 0 26.97 12.07l227.93 250.39q12.76 15 5.15 32.42-7.62 17.42-27.44 17.42-6.1 0-12-2.2t-10.33-7.33L480-615Zm0-195L269.77-579.15q-4.48 4.4-10.44 6.97-5.97 2.56-11.94 2.56-19.39 0-27.39-17.42t5.15-32.42l227.93-250.38q10.75-12.08 26.87-12.08 16.13 0 26.97 12.08l227.93 250.38q12.76 15 5.15 32.42-7.62 17.42-27.44 17.42-6.1 0-12-2.2t-10.33-7.33L480-810Zm0 570.38Z"/></svg> </button> </a> <a href="https://forms.gle/5dHJnzYJDAyUm5xq9"> <button class="close">Convert <span style="font-size: 11px;font-weight: 200;">swans</span></button> </a> <a href="https://mfi0212.github.io/MFI/BYSWN"> <button class="close rounded"> <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M229.85-190.04q-42.31-42.5-66.08-97.74Q140-343.0     <script>
        const userData = {
            "Mahesh Muthinti": {
                password: "Mahesh888*",
                swans: 0,
                houseId: 'SMSH-001',
                offers: [
                    // { num: '', text: "" },
                ],
                gifs: [
                    {
                        id: 0,
                        url: "",
                        title: ""
                    },
                ]
            },
            "Mahesh Muthinti": {
                password: "1",
                swans: 0,
                houseId: 'SMSH-001',
                offers: [
                    // { num: '', text: "" },
                ],
                gifs: [
                    {
                        id: 0,
                        url: "",
                        title: ""
                    },
                ]
            },
        };

        let currentUser = "";

        function findUserByPassword(inputPass) {
            const pass = (inputPass || "").trim();
            for (const [username, data] of Object.entries(userData)) {
                if (data.password === pass) {
                    return username;
                }
            }
            return null;
        }
document.addEventListener('contextmenu', e => e.preventDefault());
        function renderOffers() {
            const list = document.getElementById('offers-list');
            const countEl = document.getElementById('user-offer-count');
            list.innerHTML = '';

            if (!currentUser || !userData[currentUser]) return;

            const offers = userData[currentUser].offers || [];
            countEl.textContent = `${offers.length} offer${offers.length !== 1 ? 's' : ''}`;

            offers.forEach(offer => {
                const div = document.createElement('div');
                div.className = 'offer-item';
                div.innerHTML = `
                    <span class="offer-num">${offer.num}</span>
                    <span>${offer.text}</span>
                `;
                list.appendChild(div);
            });
        }

        function renderGifs() {
            const container = document.getElementById('gifs-list');
            const countEl = document.getElementById('gifs-count');
            container.innerHTML = '';

            if (!currentUser || !userData[currentUser]) return;

            const gifs = userData[currentUser].gifs || [];
            countEl.textContent = `${gifs.length} gif${gifs.length !== 1 ? 's' : ''}`;

            if (gifs.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#666; padding:20px;">No gifs yet</p>`;
                return;
            }

            gifs.forEach(gif => {
                const div = document.createElement('div');
                div.className = 'gif-card';
                div.innerHTML = `
                    <img src="${gif.url}" alt="${gif.title}">
                    <div style="padding:8px; text-align:center; font-size:13px; font-weight:500;">${gif.title}</div>
                `;
                container.appendChild(div);
            });
        }

        function calculateStars() {
            const input  = document.getElementById('swan-input');
            const result = document.getElementById('stars-result');
            const live   = document.getElementById('live-text');

            let swans = parseInt(input.value) || 0;
            let stars = Math.floor(swans / 2);

            result.textContent = stars;
            live.textContent   = `${swans} swans = ${stars} stars`;
        }

        function unlock() {
            const passInput = document.getElementById('pass');
            const pass = passInput.value.trim();

            if (!pass) {
                alert("Enter a password first.");
                passInput.focus();
                return;
            }

            currentUser = findUserByPassword(pass);

            if (!currentUser) {
                alert("Invalid password. Try again.");
                passInput.value = '';
                passInput.focus();
                return;
            }
            document.getElementById('username').textContent = currentUser;
            document.getElementById('swans').textContent = userData[currentUser].swans;
            document.getElementById('houseId').textContent = userData[currentUser].houseId;
            document.getElementById('login').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');

            renderOffers();
            renderGifs();
            calculateStars();
        }

        function logout() {
            currentUser = "";
            document.getElementById('dash').classList.add('hidden');
            document.getElementById('login').classList.remove('hidden');
            document.getElementById('pass').value = '';
            document.getElementById('pass').focus();
        }

        // Enter key support
        document.getElementById('pass').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                unlock();
            }
        });
    </script>

<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>BsMansion | Account</title> <link rel="icon" href="mansion.mfi.logo.png" /> <script src="https://cdn.tailwindcss.com"></script> <link rel="preconnect" href="https://fonts.googleapis.com"> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"> <link href="https://fonts.googleapis.com/css2?family=Didot&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"> <style> * { scrollbar-width: none; } :root { --hermes-orange: #1c1c1c; --hermes-orange-dark: #1c1c1ce0; --bg: #f7f5f2; --text: #000000; --text-muted: #4a4a4a; --neutral-light: white; --border-subtle: #e0deda; --radius: 0.375rem; } * { -webkit-tap-highlight-color: transparent; } body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; font-family: Georgia, "Times New Roman", Times, serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 10px; line-height: 1.58; -webkit-font-smoothing: antialiased; } h1, .big-number { font-weight: 400; letter-spacing: -0.02em; font-family: Inter, sans-serif; } p { font-family: Inter, sans-serif; } .container { width: 100%; max-width: 420px; } .section { background: var(--neutral-light); padding: 2.25rem 2rem; margin-bottom: 2.5rem; max-width: 500px; position: relative; left: 50%; transform: translate(-50%, 0%); } .minimal-input { font-family: Inter, sans-serif; margin-top: 35px; background: none; border: 1px solid #1c1c1c5a; padding: 12px; width: 100%; cursor: pointer; letter-spacing: 0.5px; font-size: 12px; text-align: center; } .minimal-input:focus { border-color: var(--hermes-orange); outline: none; } .btn-hermes { background: var(--hermes-orange); color: white; font-family: system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 3px; border: solid 1px var(--hermes-orange-dark); padding: 12px; transition: background 0.25s ease; width: 100%; font-size: 12px; } .label { font-size: 0.8125rem; font-weight: 500; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.75rem; display: block; text-align: center; font-family: Inter, sans-serif; } .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; font-size: 1rem; color: var(--text-muted); position: sticky; top: 0; background: #f7f5f2; padding: 30px 20px 10px 10px; z-index: 10; } .user { font-weight: 500; color: var(--text); } .switch { color: var(--hermes-orange); cursor: pointer; transition: opacity 0.2s; } .switch:hover { opacity: 0.75; } .swan-big { font-size: 6.5rem; font-weight: 300; color: var(--hermes-orange); line-height: 0.9; text-align: center; margin: 1rem 0 2rem; } .offer-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border-subtle); font-size: 1rem; } .offer-item:last-child { border-bottom: none; } .offer-num { color: var(--hermes-orange); font-weight: 500; min-width: 3rem; font-family: Inter, sans-serif; } .live-result { color: var(--hermes-orange); font-weight: 500; text-align: center; margin-top: 1.5rem; font-size: 1.125rem; } .logo { font-size: 2.25rem; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 0.5rem; font-family: 'Playfair Display', serif; } .logo span { color: var(--hermes-orange); } .options { position: sticky; bottom: 15px; display: flex; justify-content: space-between; align-items: end; gap: 10px; width: 100%; } .options button { margin-top: 10px; background: none; width: 100%; cursor: pointer; letter-spacing: 1px; padding: 12px; font-size: 91%; background-color: #00000033; border: solid 1px #00000008; backdrop-filter: blur(1px); margin-bottom: 30px; font-family: Inter, sans-serif; } .options button:hover { background-color: #1c1c1c; color: white; } </style> </head> <body> <div class="container"> <!-- Login --> <div id="login" class="section"> <div class="text-center"> <div class="logo">BsMansion</div> <p style="font-size:0.95rem; color:var(--text-muted);">My Account</p> </div> <div style="margin: 0rem 0 1rem;"> <input type="password" id="pass" placeholder="ENTER PASSWORD" class="minimal-input"> </div> <button onclick="unlock()" class="btn-hermes">VERIFY NOW</button> <p style="text-align:center; margin-top:1.5rem; font-size:0.8125rem; color:var(--text-muted);"> Powered by BS&MFI House </p> </div> <!-- Dashboard --> <div id="dash" class="hidden"> <div class="header"> <span class="user" id="username">USER_01</span> <span class="switch" onclick="logout()">Log out</span> </div> <div class="section text-center"> <div class="label">Swans Available</div> <div id="swans" class="swan-big">1842</div> </div> <div class="section"> <div class="label">Convert Swans to Stars</div> <div style="display:flex; gap:1.5rem; align-items:center; margin:1.75rem 0;"> <div style="flex:1;"> <div class="label">Swans</div> <input type="number" id="swan-input" value="50" oninput="calculateStars()" class="minimal-input"> </div> <div style="font-size:2.25rem; color:var(--text-muted);">=</div> <div style="flex:1;"> <div class="label">Stars</div> <div id="stars-result" class="minimal-input" style="color:var(--hermes-orange); font-weight:400;"> 25 </div> </div> </div> <div id="live-text" class="live-result"> 50 swans = 25 stars </div> </div> <div class="section"> <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;"> <div class="label">Offers ID</div> <span id="user-offer-count" style="font-size:0.875rem; color:var(--hermes-orange);"> 0 offers </span> </div> <div id="offers-list"></div> </div> <div class="options"> <a style="width: 100%;" href="https://mfi0212.github.io/MFI/masoin-rental"><button class="close">VISIT RENTAL</button></a> <a style="width: 100%;" href="https://forms.gle/5dHJnzYJDAyUm5xq9"><button class="close">CONVERT</button></a> </div> <p style="text-align:center; font-size:0.8125rem; color:var(--text-muted);"> © BS&MFI. All rights reserved. </p> </div> </div>
    <script>
        const userData = {
            "Mahesh Muthinti": {
                password: "Mahesh888*",
                swans: 0,
                offers: [
                    { num: '--', text: "No stored offer" }
                ]
            }
        };
document.addEventListener('contextmenu', e => e.preventDefault());
        let currentUser = "";

        function findUserByPassword(inputPass) {
            const pass = (inputPass || "").trim();

            for (const [username, data] of Object.entries(userData)) {
                if (data.password === pass) {
                    return username;
                }
            }
            return null;
        }

        function renderOffers() {
            const list = document.getElementById('offers-list');
            const countEl = document.getElementById('user-offer-count');
            list.innerHTML = '';

            if (!currentUser || !userData[currentUser]) return;

            const offers = userData[currentUser].offers || [];
            countEl.textContent = `${offers.length} offer${offers.length !== 1 ? 's' : ''}`;

            offers.forEach(offer => {
                const div = document.createElement('div');
                div.className = 'offer-item';
                div.innerHTML = `
                    <span class="offer-num">${offer.num}</span>
                    <span>${offer.text}</span>
                `;
                list.appendChild(div);
            });
        }

        function calculateStars() {
            const input  = document.getElementById('swan-input');
            const result = document.getElementById('stars-result');
            const live   = document.getElementById('live-text');

            let swans = parseInt(input.value) || 0;
            let stars = Math.floor(swans / 2);

            result.textContent = stars;
            live.textContent   = `${swans} swans = ${stars} stars`;
        }

        function unlock() {
            const passInput = document.getElementById('pass');
            const pass = passInput.value.trim();

            if (!pass) {
                alert("Please enter a password.");
                passInput.focus();
                return;
            }

            currentUser = findUserByPassword(pass);

            if (!currentUser) {
                alert("Invalid password. Please try again.");
                passInput.value = '';
                passInput.focus();
                return;
            }
            document.getElementById('username').textContent = currentUser;
            document.getElementById('swans').textContent = userData[currentUser].swans;

            document.getElementById('login').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');

            renderOffers();
            calculateStars();
        }

        function logout() {
            currentUser = "";
            document.getElementById('dash').classList.add('hidden');
            document.getElementById('login').classList.remove('hidden');
            document.getElementById('pass').value = '';
            document.getElementById('pass').focus();
        }
        document.getElementById('pass').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                unlock();
            }
        });
    </script>
</body>
</html>

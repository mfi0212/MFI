<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Take Money – Verify</title>
  <link rel="icon" href="https://i.ibb.co/213w1VQD/titlelogo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Balthazar&family=Della+Respira&family=Hahmlet:wght@100..900&family=Niconne&family=Stalemate&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Oswald|Noto+Sans">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      --bg: #0f0f12;
      --surface: #1a1a20;
      --surface-elevated: #222228;
      --text-primary: #e0e0e5;
      --text-secondary: #a0a0b0;
      --accent: #0066ff;          /* Telegram-like blue */
      --accent-hover: #3385ff;
      --border: #2a2a32;
      --error: #ff4d4d;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Sans", sans-serif;
            scrollbar-width: none;
            letter-spacing: 0.1px;
            scroll-behavior: smooth;
        }
    body {
      min-height: 100vh;
    background: #000000;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    }

    .card {
      width: 85%;
    max-width: 380px;
    box-shadow: var(--shadow);
    text-align: center;
    }

    .logo {
     width: 70px;
    height: 70px;
    object-fit: contain;
    margin: 0 auto 20px;
    border-radius: 25px;
    background: rgb(0 48 255 / 46%);
    padding: 8px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    input {
      width: 100%;
    padding: 10px;
    font-size: 16px;
    background: #8080806b;
    border: none;
    border-radius: 40px;
    color: white;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: #606070;
    }

    button {
      width: 100%;
    margin-top: 20px;
    padding: 10px;
    font-size: 16px;
    font-weight: 200;
    background: #0000a8;
    color: white;
    border: none;
    border-radius: 33px;
    cursor: pointer;
    }

    button:hover {
      background: blue;
    }

    #explore {
      display: none;
      margin-top: 24px;
    }

    #explore a {
      display: inline-block;
    padding: 10px 20px;
    background: #ffffff;
    color: black;
    text-decoration: none;
    font-weight: 600;
    border-radius: 13px;
    font-size: 15px;
    }

    .error {
      margin-top: 16px;
      color: var(--error);
      font-size: 14px;
      min-height: 20px;
    }

    .footer-note {
      margin-top: 32px;
      font-size: 12px;
      color: #505060;
    }
  </style>
</head>
<body>

<div class="card">
  <img class="logo" src="mfi.gif" alt="BSMFI Logo">

  <h1>BS&MFI</h1>
  <div class="subtitle">Take Money</div>

  <input type="text" id="password" placeholder="Enter password" autocomplete="off"/>

  <button onclick="go()">Continue</button>

  <div id="explore">
    <a id="exploreLink">Explore →</a>
  </div>

  <div class="error" id="error"></div>

  <div class="footer-note">Protected access • BS&MFI</div>
</div>

<script>
const accessRules = [
  {
    passwords: ["6275", "4211", "9919"],
    url: "https://blackswan19.github.io/golden/FM/takemoney"
  },
  {
    passwords: ["Mahesh888*", "Cherish@123"],
    url: "https://mfi0212.github.io/MFI/takemoney"
  }
];

// document.addEventListener('contextmenu', e => e.preventDefault());

const saved = localStorage.getItem("password");
if (saved) {
  document.getElementById("password").value = saved;
}

function go() {
  const pass = document.getElementById("password").value.trim();
  const explore = document.getElementById("explore");
  const error = document.getElementById("error");

  explore.style.display = "none";
  error.textContent = "";

  for (const rule of accessRules) {
    if (rule.passwords.includes(pass)) {
      localStorage.setItem("password", pass);
      document.getElementById("exploreLink").href = rule.url;
      explore.style.display = "block";
      return;
    }
  }

  error.textContent = "Invalid password";
}
</script>

</body>
</html>

000026; transition: all 0.3s ease; } #pin-input:active{ transform: scale(0.90); } #pin-screen button { background-color: #0d0d0d; width: 100%; color: white; font-size: 18px; border-radius: 100px; padding: 10px;width: 100%; font-family: 'Poppins', sans-serif; filter: saturate(2); backdrop-filter: blur(5px); font-weight: 100; border-radius: 1000px; transition: all 0.3s ease; margin-top: 1.5rem; transition: all 0.3s ease;} #pin-screen button:hover{ transform: scale(1.03); } #pin-screen button:active{ transform: scale(0.90); } #pin-screen button:active { transform: scale(0.98); } #error-msg { color: #dc2626; font-size: 14px; margin-top: 1.25rem; } /* Content Screen */ #content { padding: 1.5rem; } #content h1 { font-size: 16px; font-weight: 100; color: #ffffff; text-align: center; margin-bottom: 0.5rem; backdrop-filter: blur(5px); background: #1c1c1c; border-radius: 9999px; padding: 5px 8px; width: fit-content; transition: all 0.3s ease; } #content h1:hover{ transform: scale(1.03); } #content h1:active{ transform: scale(0.90); } .stats-big { text-align: center; } .stats-big #total-points { font-size: 4.5rem; font-weight: 500; color: black; line-height: normal; font-family: 'Playfair Display', serif; margin-top: -30px; } .stats-big .label { font-size: 13px; color: #00000080; font-family: 'Poppins', sans-serif; margin: 20px; } .stats-grid { display: flex; text-align: center; align-items: center; justify-content: space-around; width: 100%; } .stat-item { border-radius: 999px; padding: 7px 14px; display: flex; justify-content: space-between; align-items: center; gap: 5px; flex-direction: row-reverse; transition: all 0.3s ease; font-weight: 100; background: #00000026; } .stat-item:hover{ transform: scale(1.03); } .stat-item:active{ transform: scale(0.90); } .stat-item .value { font-weight: 800; font-family: 'Poppins', sans-serif; } .stat-item .label { font-size: 11px; } .footer-info { text-align: center; color: #828282; margin-top: 2rem; line-height: 29px; border-top: 1px solid #00000047; padding-top: 1rem; font-size: 15px; } .options { display: flex; justify-content: space-between; align-items: end; gap: 10px; width: 100%; }span#start-date { font-family: 'Poppins', sans-serif; color: #ffffff; font-weight: 100; background: #ffa300; padding: 3px 6px; border-radius: 9999px; } .options button { background: none; width: 100%; cursor: pointer; font-size: 18px; background-color: #1c1c1c; backdrop-filter: blur(1px); font-family: 'Poppins', sans-serif; font-weight: 300; backdrop-filter: blur(5px); color: white; border-radius: 100px; padding: 10px; transition: all 0.3s ease; transition: all 0.3s ease;} .options button:active{ transform: scale(0.90); } @media (max-width: 400px) { .stats-big #total-points { font-size: 3.75rem; } } </style> </head> <body> <!-- PIN Screen --> <div id="pin-screen" class="card"> <h1>BsMansions</h1> <input id="pin-input" placeholder="Enter PIN" autocomplete="off" > <button onclick="checkPin()">Verify Now</button> <p id="error-msg"></p> </div> <!-- Content Screen --> <div id="content" class="card hidden"> <h1 id="pin-name">Loading...</h1> <div class="stats-big"> <div class="label">Your total swans earned was </div> <div id="total-points">0</div> </div> <div class="stats-grid"> <div class="stat-item" style="display: none;"> <div class="value" id="periods">0</div> <div class="label">Periods</div> </div> <div class="stat-item"> <div class="value" id="days-passed">0</div> <div class="label">Days Passed</div> </div> <div class="stat-item next-in"> <div class="value" id="next-in">30</div> <div class="label">Total days</div> </div> </div> <div class="footer-info"> Started from : <span id="start-date"></span><br> <p style="margin-top: 10px; font-size: 13px; color: black;">NOTE : Once 30 days completed the swans will automatically added to your account. If you do not pay the maintenance fee, the Swans will not be added. </p><br> </div> <div class="options"> <a style="width: 100%;" href="https://blackswan19.github.io/golden/FM/starspage"> <button>Visit Stars</button> </a> </div> </div>

<script>
const userData = {
  "Mahesh888*": {
    startdate: "",
    swansPerDay: 0,
    password: "Mahesh888*"
  }
};
document.addEventListener('contextmenu', e => e.preventDefault());
const userKey = Object.keys(userData)[0];
const user = userData[userKey];

const CORRECT_PIN = user.password;

document.getElementById('pin-name').textContent = userKey;
document.getElementById('content-name').textContent = userKey;

function checkPin() {
  const input = document.getElementById('pin-input');
  const error = document.getElementById('error-msg');
  const pin = input.value.trim();

  if (pin === CORRECT_PIN) {
    document.getElementById('pin-screen').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');
    renderStats();
    input.value = '';
  } else {
    error.textContent = "Incorrect PIN. Try again.";
    input.value = '';
    input.focus();
    setTimeout(() => error.textContent = '', 3000);
  }
}

document.getElementById('pin-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') checkPin();
});

function calculateSwans(startDateStr, swansPerDay) {
  const [dd, mm, yyyy] = startDateStr.split('-').map(Number);
  const start = new Date(yyyy, mm - 1, dd);
  const today = new Date();
  start.setHours(0, 0, 0, 0);
  today.setHours(0, 0, 0, 0);

  const diffMs = today - start;
  const daysPassed = Math.floor(diffMs / (1000 * 60 * 60 * 24));

  const totalSwans = Math.max(0, daysPassed) * swansPerDay;

  return {
    totalSwans,
    daysPassed: Math.max(0, daysPassed),
    startFormatted: start.toLocaleDateString('en-IN', {
      day: 'numeric', month: 'short', year: 'numeric'
    })
  };
}

function renderStats() {
  const stats = calculateSwans(user.startdate, user.swansPerDay);

  document.getElementById('total-points').textContent = stats.totalSwans.toLocaleString();
  document.getElementById('days-passed').textContent = stats.daysPassed;
  document.getElementById('start-date').textContent = stats.startFormatted;
  document.getElementById('last-updated').textContent = new Date().toLocaleString('en-IN', {
    dateStyle: 'medium', timeStyle: 'short'
  });
}
setInterval(() => {
  if (!document.getElementById('content').classList.contains('hidden')) {
    renderStats();
  }
}, 60000);

window.addEventListener('load', () => {
  if (!document.getElementById('content').classList.contains('hidden')) {
    renderStats();
  }
});
</script>

</body>
</html>

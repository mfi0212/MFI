<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BsMansion | Counter</title>
    <link rel="icon" href="mansion.mfi.logo.png" />
      <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Didot&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
     * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, "Times New Roman", Times, serif;
      background: #f7f5f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: #1e293b;
    }

    .card {
     background: white;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    /* PIN Screen */
    #pin-screen {
      padding: 2.5rem 2rem;
      text-align: center;
    }

    #pin-screen h1 {
      font-size: 1.75rem;
    font-weight: 500;
    color: #1e293b;
    margin-bottom: 1.75rem;
    font-family: 'Playfair Display', serif;
    }

    #pin-input {
    width: 100%;
    text-align: center;
    padding: 10px;
    border: 1px solid #0000001f;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: Inter, sans-serif;
    font-size: 14px;
    }

    #pin-input:focus {
      outline: none;
      border-color: #000000;
    }

    #pin-screen button {
         width: 100%;
    background: #1c1c1c;
    color: white;
    font-weight: 500;
    padding: 15px;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 1rem;
    text-transform: uppercase;
    letter-spacing: 5px;
    font-family: Inter, sans-serif;
    font-size: 11px;

    }


    #pin-screen button:active {
      transform: scale(0.98);
    }

    #error-msg {
      color: #dc2626;
    font-size: 14px;
    margin-top: 1.25rem;
    margin-bottom: -15px;
    }

    /* Content Screen */
    #content {
      padding: 2.5rem 2rem;
    }

    #content h1 {
      font-size: 17px;
    font-weight: 500;
    color: #1c1c1c;
    text-align: center;
    margin-bottom: 0.5rem;
    }

    #content .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .stats-big {
      text-align: center;
      margin-bottom: 2rem;
    }

    .stats-big #total-points {
     font-size: 4.5rem;
    font-weight: 500;
    color: black;
    line-height: normal;
    font-family: 'Playfair Display', serif;
    margin-top: -30px;
    }

    .stats-big .label {
      font-size: 1.125rem;
      color: #475569;
      margin-top: 0.5rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      text-align: center;
    }

    .stat-item .value {
     font-weight: 500;
    color: #1e293b;
    font-family: Inter, sans-serif;
    }

    .stat-item .label {
      font-size: 0.875rem;
      color: #64748b;
      margin-top: 0.375rem;
    }

    .next-in .value {
      color: #059669;
    }

    .footer-info {
      text-align: center;
      font-size: 0.875rem;
      color: #94a3b8;
      margin-top: 2rem;
      line-height: 1.5;
      border-top: 1px solid #e2e8f0;
      padding-top: 1.25rem;
    padding-bottom: 1.25rem;
    }

    @media (max-width: 400px) {
      .card {
        margin: 0 1rem;
      }
      #pin-input {
        font-size: 2rem;
        letter-spacing: 0.5rem;
      }
      .stats-big #total-points {
        font-size: 3.75rem;
      }
    } .options {
            position: sticky;
    bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 10px;
    width: 100%;
        }

        .options button {
           margin-top: 20px;
    background: none;
    width: 100%;
    cursor: pointer;
    letter-spacing: 1px;
    padding: 12px;
    font-size: 91%;
    background-color: #00000033;
    border: solid 1px #00000008;
    backdrop-filter: blur(1px);
    margin-bottom: -30px;
    font-family: Inter, sans-serif;
        }

        .options button:hover {
            background-color: #1c1c1c;
            color: white;
        }
  </style>
</head>
<body>

  <!-- PIN Screen -->
  <div id="pin-screen" class="card">
    <h1>BsMansion</h1>
    
    <input 
      id="pin-input"
      type="password"
      placeholder="Enter PIN"
      autocomplete="off"
    >

    <button onclick="checkPin()">VERIFY NOW</button>

    <p id="error-msg"></p>
  </div>
  <div id="content" class="card hidden">

    <h1>VIJAYA</h1>
    <p class="subtitle" style="display: none;" >Points added every 30 days • Auto-calculated</p>

    <div class="stats-big">
      <div id="total-points">0</div>
      <div class="label">Total Points</div>
    </div>

    <div class="stats-grid">
      <div class="stat-item">
        <div class="value" id="periods">0</div>
        <div class="label">Periods</div>
      </div>
      <div class="stat-item">
        <div class="value" id="days-passed">0</div>
        <div class="label">Days Passed</div>
      </div>
      <div class="stat-item next-in">
        <div class="value" id="next-in">30</div>
        <div class="label">Next Add In</div>
      </div>
    </div>

    <div class="footer-info">
      Started: <span id="start-date"></span><br>
      Last updated: <span id="last-updated"></span>
    </div>
 <div class="options">
                <a style="width: 100%;" href="https://blackswan19.github.io/golden/FM/starspage"><button class="close">VISIT STARS</button></a>
              </div>
  </div>
<script>
// Your user data
const userData = {
  "VIJAYA": {
    startdate: "11-04-2026",
    swansPerDay: 80,
    password: "Mahesh888*"
  }
};

const CORRECT_PIN = userData.VIJAYA.password;

function checkPin() {
  const input = document.getElementById('pin-input');
  const error = document.getElementById('error-msg');
  const pin = input.value.trim();

  if (pin === CORRECT_PIN) {
    document.getElementById('pin-screen').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');
    renderStats();
    input.value = '';
  } else {
    error.textContent = "Incorrect PIN. Try again.";
    input.value = '';
    input.focus();
    setTimeout(() => error.textContent = '', 3000);
  }
}

document.getElementById('pin-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') checkPin();
});

function calculateSwans(startDateStr, swansPerDay) {
  const [dd, mm, yyyy] = startDateStr.split('-').map(Number);
  const start = new Date(yyyy, mm - 1, dd);
  const today = new Date();
  start.setHours(0, 0, 0, 0);
  today.setHours(0, 0, 0, 0);

  const diffMs = today - start;
  const daysPassed = Math.floor(diffMs / (1000 * 60 * 60 * 24));

  const totalSwans = Math.max(0, daysPassed) * swansPerDay;

  return {
    totalSwans,
    daysPassed: Math.max(0, daysPassed),
    startFormatted: start.toLocaleDateString('en-IN', {
      day: 'numeric', month: 'short', year: 'numeric'
    })
  };
}

function renderStats() {
  const user = userData.VIJAYA;
  const stats = calculateSwans(user.startdate, user.swansPerDay);

  document.getElementById('total-points').textContent = stats.totalSwans.toLocaleString();
  document.getElementById('days-passed').textContent = stats.daysPassed;
  document.getElementById('start-date').textContent = stats.startFormatted;
  document.getElementById('last-updated').textContent = new Date().toLocaleString('en-IN', {
    dateStyle: 'medium', timeStyle: 'short'
  });
}

setInterval(() => {
  if (!document.getElementById('content').classList.contains('hidden')) {
    renderStats();
  }
}, 60000);

window.addEventListener('load', () => {
  if (!document.getElementById('content').classList.contains('hidden')) {
    renderStats();
  }
});
</script>

</body>
</html>
